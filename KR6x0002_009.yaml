body:
  text: 第九瞻波犍度一一爾時佛世尊住瞻波國迦迦池邊爾時于迦尸國有婆娑婆村住處有比丘迦葉姓者為執事心生思念如何能令未來善美比丘來已來善美比丘令安樂久住令此處得隆盛增長廣大耶因而戮力爾時有多數比丘于迦尸國遊行到婆娑婆村迦葉姓比丘見彼諸比丘從遠方來見而設牀座置洗足水足台足布迎之而取鉢衣問要水耶供洗浴供粥嚼食噉食時彼諸客比丘心生思念此住處比丘賢能也供洗浴亦供粥嚼食噉食我等于此處婆娑婆村居住時彼諸客比丘乃于是處婆娑婆村居住二時迦葉姓比丘心生思念此諸客比丘遠來疲倦既息前不辨往來食處今能辨往來為他人盡壽戮力實難乞求于眾人之間亦甚不快我當不再供粥嚼食噉食矣乃不戮力奉彼粥嚼食噉食矣時彼諸客比丘心生思念前住此處比丘供洗浴供粥嚼食噉食彼今不再奉粥嚼食噉食矣此住處比丘邪惡我等舉此住處比丘三時彼諸客比丘集會言迦葉姓比丘曰前汝供洗浴供粥嚼食噉食汝今不供粥嚼食噉食矣汝墮罪汝見此罪耶于我不見罪時彼諸比丘以不見罪舉迦葉姓比丘時迦葉姓比丘心生思念我不知此罪耶非罪耶我犯耶不犯耶我應被舉耶不應被舉耶如法耶非如法耶有過耶無過耶應理耶不應理耶我當往瞻波以此事請問世尊四時迦葉姓比丘收藏臥具牀座持鉢衣向瞻波國而去順次詣瞻波國世尊住處詣而敬禮世尊坐于一面佛世尊與諸客比丘俱相致問是常法也時世尊言迦葉姓比丘曰比丘忍耶足耶遠路而來不疲倦耶比丘汝由何處來耶世尊忍世尊足我由道路而來不疲倦五于迦尸國有婆娑婆村世尊我乃是其住處比丘為執事思念如何能使未來善美比丘來已來善美比丘令能安樂住使此住處得隆盛增長廣大耶因而戮力時有多數比丘于迦尸國遊行至婆娑婆村我見彼諸比丘從遠方而來乃至時我生思念問世尊為此故我來也六比丘此非罪也不成罪汝非犯也無犯不舉汝也非被舉舉汝者非如法也有過也不應理也比丘汝往彼婆娑婆村居住唯唯迦葉姓比丘應諾世尊即從座而起敬禮世尊右繞向婆娑婆村而去七時彼諸客比丘于後生悔生追悔我等有不利無得利我等有惡得無善得何以故我等無事無因舉清淨無罪比丘故也我等當往瞻波國于世尊處以過白過時彼諸客比丘收藏臥具牀座持鉢衣向瞻波國而去順次詣瞻波國世尊住處詣而敬禮世尊坐于一面佛世尊與諸客比丘俱相致候是常法也時世尊言彼諸比丘曰諸比丘忍耶足耶由道路而來疲倦耶諸比丘汝等由何處來耶世尊忍世尊足我等由道路來不疲倦于迦尸國有婆娑婆村世尊我等從彼處來也八諸比丘汝等舉彼住處比丘耶然諸比丘依何事何因耶世尊無事無因也佛世尊呵責之曰諸比丘不相合不隨順不相稱非沙門法不相應非事也諸愚人汝等如何無事無因舉清淨無罪比丘耶諸愚人如此非令未信者得信也呵責說法告諸比丘曰諸比丘不得無事無因舉清淨無罪比丘舉者墮惡作九時彼諸比丘即從座起偏袒上衣以頭面禮世尊足白世尊言我等為過失所侵猶如愚者癡者不善者所以我等無事無因舉清淨無罪比丘故也世尊若爾請以我等之過為過而受之為未來律儀故諸比丘汝等實為過失所侵猶如愚者癡者不善者所以汝等無事無因舉清淨無垢比丘故也諸比丘汝等以過為過而見之如法悔過故我受此以過為過而見之如法悔過以資未來律儀者于聖者律為增長也二一時瞻波國諸比丘如此作羯磨謂作非法別眾羯磨作非法和合羯磨作如法別眾羯磨作似法別眾羯磨作似法和合羯磨以一人舉一人以一人舉二人以一人舉多人以一人舉僧伽以二人舉一人以二人舉二人以二人舉多人以二人舉僧伽以多人舉一人以多人舉二人以多人舉多人以多人舉僧伽以僧伽舉僧伽二少欲諸比丘忿怒非難如何瞻波國諸比丘如此作羯磨作非法別眾羯磨作似法和合羯磨以一人舉一人以僧伽舉僧伽耶時彼諸比丘以此事白世尊世尊曰諸比丘瞻波國諸比丘如此作羯磨作非法別眾羯磨以僧伽舉僧伽真實否世尊真實也佛世尊呵責諸比丘彼諸愚人所為不相合不隨順不相稱非沙門法不相應非事也諸比丘如何彼諸愚人如此作羯磨作非法別眾羯磨以僧伽舉僧伽耶諸比丘如此非使未信者得信也呵責說法告諸比丘曰三諸比丘非法別眾羯磨不成羯磨不得作非法和合羯磨不成羯磨不得作似法和合羯磨不成羯磨不得作以一人舉一人不成羯磨不得作以僧伽舉僧伽不成羯磨不得作四諸比丘羯磨有四謂非法別眾羯磨非法和合羯磨如法別眾羯磨如法和合羯磨也諸比丘此中非法別眾羯磨諸比丘此非法與別眾有過不應理之羯磨也諸比丘不得作如此羯磨而不許如此羯磨諸比丘此中非法和合羯磨諸比丘此非法故有過不許諸比丘此中如法別眾羯磨諸比丘此別眾故有過不許諸比丘此中如法和合羯磨諸比丘此如法與和合故無過應理之羯磨也諸比丘應作如此羯磨而許如此羯磨諸比丘因此故于此處我等如此作如法和合羯磨如此諸比丘應當學三一爾時六群比丘如此作羯磨謂作非法別眾羯磨作非法和合羯磨作如法別眾羯磨作似法別眾羯磨作似法和合羯磨作無表白有唱說羯磨作無唱說有表白羯磨作無表白無唱說羯磨作違法羯磨作違律羯磨作違師教羯磨作受呵責羯磨作非法羯磨作有過羯磨作不應理羯磨少欲諸比丘忿怒非難為何六群比丘作如此羯磨作非法別眾羯磨作受呵責非法有過不應理羯磨耶時彼諸比丘以此事白世尊世尊曰諸比丘六群比丘作如此羯磨作非法別眾羯磨作受呵責非法有過不應理羯磨真實耶世尊真實也乃至呵責說法已告諸比丘曰二諸比丘非法別眾羯磨不成羯磨不得作似法和合羯磨不成羯磨不得作諸比丘無表白有唱說羯磨不成羯磨不得作諸比丘無唱說有表白羯磨不成羯磨不得作諸比丘無表白無唱說羯磨不成羯磨不得作諸比丘違法羯磨不成羯磨不得作諸比丘違律羯磨不成羯磨不得作諸比丘違師教羯磨不成羯磨不得作諸比丘受呵責非法有過不應理之羯磨不成羯磨不得作三諸比丘羯磨有六謂非法羯磨別眾羯磨和合羯磨似法別眾羯磨似法和合羯磨如法和合羯磨也諸比丘何為非法羯磨耶諸比丘白二羯磨以一白而作羯磨羯磨不唱說非法羯磨也諸比丘白二羯磨以二白作羯磨羯磨不唱說非法羯磨也諸比丘白二羯磨以一羯磨說而作羯磨不表白者非法羯磨也諸比丘白二羯磨以二羯磨說而作羯磨不表白者非法羯磨也四諸比丘白四羯磨以一白而作羯磨羯磨不唱說非法羯磨也諸比丘白四羯磨以二表白而作羯磨以三表白而作羯磨以四表白而作羯磨羯磨不唱說非法羯磨也諸比丘白四羯磨以一羯磨說而作羯磨以二羯磨說而作羯磨以三羯磨說而作羯磨以四羯磨說而作羯磨不表白者非法羯磨也諸比丘如此名為非法羯磨也五諸比丘何為別眾羯磨耶諸比丘白二羯磨所需比丘未到應與清淨欲者未與清淨欲現前比丘呵責此別眾羯磨也諸比丘白二羯磨所需比丘已至應與清淨欲者未與清淨欲現前比丘呵責此別眾羯磨也諸比丘白二羯磨所需之比丘已至應與清淨欲者已與清淨欲現前比丘呵責此別眾羯磨也諸比丘白四羯磨別眾羯磨也諸比丘如此名為別眾羯磨也六諸比丘何為和合羯磨耶諸比丘白二羯磨所需比丘已至應與清淨欲者已與清淨欲現前比丘不呵責此和合羯磨也諸比丘白四羯磨不呵責此和合羯磨也諸比丘如此名為和合羯磨也七諸比丘何為似法別眾羯磨耶諸比丘白二羯磨先羯磨唱說後表白所需比丘未來應與清淨欲者未與清淨欲現前比丘呵責此似法別眾羯磨也諸比丘白二羯磨先羯磨唱說後表白所需比丘已至應與清淨欲者未與清淨欲現前比丘呵責此似法別眾羯磨也諸比丘白二羯磨先羯磨唱說後表白所需比丘已至應與清淨欲者已與清淨欲現前比丘呵責此似法別眾羯磨也諸比丘白四羯磨似法別眾羯磨也諸比丘如此名為似法別眾羯磨八諸比丘何為似法和合羯磨耶諸比丘白二羯磨先羯磨唱說後表白所需比丘已至應與清淨欲者已與清淨欲現前比丘不呵責此似法和合羯磨也諸比丘白四不呵責此似法和合羯磨也諸比丘如此名為似法和合羯磨九諸比丘何為如法和合羯磨耶諸比丘白二羯磨先表白後以一羯磨說而作羯磨所須比丘已至應與清淨欲者已與清淨欲現前比丘不呵責此如法和合羯磨也諸比丘白四羯磨先表白後以三羯磨說而作羯磨所需比丘已至應與清淨欲者已與清淨欲現前比丘不呵責此如法和合羯磨也諸比丘如此名為如法和合羯磨四一僧伽有五謂四比丘僧伽五比丘僧伽十比丘僧伽二十比丘僧伽過二十比丘僧伽也諸比丘此中四比丘僧伽除授戒自恣出罪三羯磨其餘得作一切如法和合羯磨諸比丘此中五比丘僧伽于中國除授戒與出罪二羯磨其餘得作一切如法和合羯磨諸比丘此中十比丘僧伽除出罪一羯磨其餘得作一切如法和合羯磨諸比丘此中二十比丘僧伽得作一切如法和合羯磨也二諸比丘四人眾應作羯磨時以比丘尼為第四人而作羯磨不成羯磨不得作諸比丘四人眾應作羯磨時以式叉摩那為第四人以沙彌為第四人以沙彌尼為第四人以棄學者為第四人以犯極罪者為第四人以因不見罪而被舉者為第四人以因不懺悔罪而被舉罪者為第四人以因不捨棄惡見而被舉者為第四人以黃門為第四人以賊住者為第四人以歸外道者為第四人以畜生為第四人以殺母者為第四人以殺父者為第四人以殺阿羅漢者為第四人以污比丘尼者為第四人以破和合僧者為第四人以出佛身血者為第四人以二根者為第四人以異住處者為第四人以異境界者為第四人以神通在虛空者為第四人以由僧伽受羯磨者為第四人而作羯磨不成羯磨不得作四人眾可作終三諸比丘五人眾應作羯磨時以比丘尼為第五人而作羯磨不成羯磨不得作以由僧伽受羯磨者為第五人而作羯磨不成羯磨不得作五人眾可作終四諸比丘十人眾應作羯磨時以比丘尼為第十人而作羯磨不成羯磨不得作以由僧伽受羯磨者為第十人而作羯磨不成羯磨不得作十人眾可作終五諸比丘二十人眾應作羯磨時以比丘尼為第二十人而作羯磨不成羯磨不得作以由僧伽受羯磨者為第二十人而作羯磨不成羯磨不得作二十人眾可作終六諸比丘以別住者為第四人而與別住作本日治與摩那埵以彼為第二十人而作出罪者不成羯磨不得作諸比丘以應受本日治之者為第四人而與別住作本日治與摩那埵以彼為第二十人而作出罪者不成羯磨不得作諸比丘以應受摩那埵之人為第四人而與別住作本日治與摩那埵以彼為第二十人而作出罪者不成羯磨不得作諸比丘以行摩那埵者為第四人而與別住作本日治與摩那埵以彼為第二十人而作出罪不成羯磨不得作諸比丘以應受出罪者為第四人而與別住作本日治與摩那埵以彼為第二十人而作出罪者不成羯磨不得作七諸比丘于僧伽中一類人之呵責應受一類人之呵責不應受諸比丘于僧伽中如何之人呵責不應受耶諸比丘于僧伽中比丘尼之呵責不應受諸比丘于僧伽中式叉摩那之呵責沙彌之沙彌尼之棄學者之犯極罪者之發狂者之