十臘者授具足戒三二一爾時諸比丘于和尚離去還俗死亡歸于外道時無阿闍梨無人教導教誡上衣下裳不齊整威儀不具足而往乞食彼等于眾人施食時同第一大犍度二五一四世尊真實也呵責而說法告諸比丘諸比丘許有阿闍梨諸比丘阿闍梨視侍者當如兒子侍者視阿闍梨當如父親若如此互相恭敬尊敬和合而住則當增益廣大此法與律也諸比丘若屆十臘前依止而住屆十臘者許為依止二諸比丘請阿闍梨者當如是行應偏袒右肩禮足蹲踞合掌如此唱言為我作阿闍梨我依止具壽為我作阿闍梨我依止具壽若彼曰善哉諾唯相應以信心勉之或以身報或以言報或以身言報者可作阿闍梨若不以身報不以言報不以身言報者不得為阿闍梨三諸比丘侍者于阿闍梨應正奉事正奉事者當如此晨起後應脫履偏袒上衣奉楊枝奉漱水設坐具若有粥者應洗鉢奉粥食粥已時奉水取鉢于下方洗不令毀壞妥善洗濯而收藏之同第一大犍度二五八二四和尚改為阿闍梨弟子改為侍者若阿闍梨患病但有生命時應近侍以待快癒奉事阿闍梨品終三三一諸比丘阿闍梨于侍者應正行承事正承事者應如此諸比丘阿闍梨應依說示質問教導教誡攝護攝受弟子若阿闍梨有鉢弟子無鉢時阿闍梨應以自鉢與弟子或令他人以鉢與弟子若阿闍梨有上衣同第一大犍度二六一一一和尚改為阿闍梨弟子改為侍者若侍者患病但有生命時應近侍以待快癒承事侍者終誦品六終三四一爾時諸侍者于阿闍梨不正奉事同第一大犍度二七一八和尚改為阿闍梨弟子改為侍者不擯出者無違越三五一爾時諸比丘愚癡暗昧言我十臘也我十臘也與人依止故有阿闍梨愚癡而侍者賢能有阿闍梨暗昧而侍者聰明有阿闍梨少聞而侍者多聞有阿闍梨劣慧而侍者具慧諸少欲比丘忿怒非難如何諸比丘愚癡暗昧言我十臘也我十臘也與人依止耶有阿闍梨愚癡侍者具慧二時彼諸比丘以此事白世尊世尊曰諸比丘諸比丘愚癡暗昧言我十臘也我十臘也與人依止事真實否世尊真實也佛世尊呵責而說法告諸比丘曰諸比丘愚癡暗昧者不得與人依止與依止者墮惡作諸比丘許聰明賢能比丘十臘或過十臘者許與人依止三六一爾時諸比丘于阿闍梨離去還俗死亡歸依外道時不知是否喪失和尚依止彼等以此事白世尊世尊曰諸比丘喪失和尚依止有五和尚離去還俗死亡歸依外道與命令諸比丘如此五者成喪失和尚依止諸比丘失阿闍梨依止有六阿闍梨離去還俗死亡歸依外道與命令此等為五又或與和尚同住一處諸比丘如此六者為失阿闍梨依止二諸比丘具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂不具足無學戒蘊不具足無學定蘊不具足無學慧蘊不具足無學解脫蘊不具足無學解脫知見蘊諸比丘具足如此五分之比丘不得授具足戒不得與依止不得蓄沙彌三諸比丘具足五分之比丘得授具足戒得與依止得蓄沙彌謂具足無學戒蘊具足無學解脫知見蘊諸比丘具足如此五分之比丘得授具足戒得與依止得蓄沙彌四諸比丘具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂自不具足無學戒蘊亦使他人不具足無學戒蘊自不具足解脫知見蘊而亦使他人不具足無學解脫知見蘊諸比丘具足如此五分之比丘不得授具足戒不得與依止不得蓄沙彌五諸比丘具足五分之比丘得授具足戒與依止蓄沙彌謂自具足無學戒蘊亦使人具足無學戒蘊自具足無學解脫知見蘊而亦使人具足無學解脫知見蘊諸比丘具足如此五分之比丘得授具足戒與依止蓄沙彌六諸比丘具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂不信無慚無愧懈怠失念諸比丘具足如此五分之比丘不得授具足戒不得與依止不得蓄沙彌七諸比丘具足五分之比丘得授具足戒與依止蓄沙彌謂有信有慚有愧精進不失念諸比丘具足如此五分之比丘得授具足戒與依止蓄沙彌八諸比丘又具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂于增上戒破戒于增上行破行于增上見破見寡聞劣慧諸比丘具足如此五分之比丘不得授具足戒不得與依止不得蓄沙彌九諸比丘具足五分之比丘得授具足戒與依止蓄沙彌謂于增上戒不破戒于增上行不破行于增上見不破見多聞具慧諸比丘具足如此五分之比丘得授具足戒與依止蓄沙彌一諸比丘又具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂侍者或弟子生病不能自近侍或使他人近侍之生不欣喜不能自除或使他人除之生惡作不能依法自滅或使他人滅之不知犯不知出罪諸比丘具足如此五分之比丘不得授具足戒不得與依止不得蓄沙彌也一一諸比丘具足五分之比丘得授具足戒與依止蓄沙彌謂侍者或弟子生病能自近侍或使他人近侍之生不欣喜能自除或使他人除之生惡作能依法自滅或使他人滅之知犯知出罪諸比丘具足如此五分之比丘得授具足戒與依止蓄沙彌一二諸比丘又具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂不能令侍者或弟子學增上行儀之學不能令于調順初梵行學不能令于調順增上法不能令于調順增上律不能令于依法自離或令他人滅離諸比丘具足如此五分之比丘不得授具足戒不得與依止不得蓄沙彌一三諸比丘具足五分之比丘得授具足戒與依止蓄沙彌謂能使侍者或弟子學增上行儀之學能令彼等調順初梵行學能令調順增上法學能令于調順增上律學能令依法自離或令他人滅離諸比丘具足如此五分之比丘得授具足戒與依止蓄沙彌一四諸比丘又具足五分之比丘不得授具足戒不得與依止不得蓄沙彌謂不知犯不知不犯不