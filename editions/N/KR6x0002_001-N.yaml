言具壽阿說示曰唯多少請說唯說其義我所希求唯義而已何用有多文句五時具壽阿說示為梵志舍利弗說此法門諸法因緣生如來說其因諸法滅亦然是大沙門說時梵志舍利弗聞此法門得遠塵離垢法眼謂凡有集法者皆有此滅法彼又言曰若唯有此亦足為正法汝等已悟無憂處其為我等經多那由多劫中所不曾見者六時梵志舍利弗至梵志目犍連處梵志目犍連見梵志舍利弗從遠方來見而言梵志舍利弗曰汝諸根澄清汝膚色清淨皎潔汝得不死否然得不死矣如何得不死耶七我今見比丘阿說示步行王舍城乞食彼心慶樂若即若離若瞻若顧若屈若伸眼向地上具足威儀見而我生思念若世間有阿羅漢或阿羅漢道具足者此乃其比丘中一人我應至此比丘處請問汝依誰出家耶以誰為師愛樂誰教法耶八時我生思念此比丘行入民家乞食故今非問時我當隨此比丘後彼知希求者所需之道時阿說示于王舍城乞食取施食而還時我至比丘阿說示處至已與比丘阿說示交談慶慰歡喜感銘之言立于一面我立于一面言比丘阿說示曰汝諸根澄清汝膚色清淨皎潔汝依誰出家耶以誰為師愛樂誰教法耶九有從釋種出出家之大沙門釋子我依世尊出家以彼世尊為師愛樂彼世尊教法具壽尊師教法者何彼教示者何耶我尚幼稚出家日淺新入此法與律我不能廣延示法但能略說其義多少請說唯說其義我所希求唯義而已何用有多文句一時比丘阿說示教示此法門諸法因緣生如來說其因諸法滅亦然是大沙門說時梵志目犍連聞此法門得遠塵離垢法眼謂凡有集法者皆有此滅法彼又言曰若唯有此亦足為正法汝等已悟無憂處其為我等經多那由多劫中所不曾見者二四一時梵志目犍連言梵志舍利弗曰我等往世尊處以彼世尊為我等師此處有二百五十梵志依止我等瞻仰我等而住此處且告彼等令隨其所思而行時舍利弗目犍連至諸梵志處至已告諸梵志曰我等至世尊處以彼世尊為我等師我等依止具壽瞻仰具壽而住此處若具壽于大沙門處行梵行者我等皆于大沙門處行諸梵行二時舍利弗目犍連至梵志刪若處至已言梵志刪若曰我等往世尊處以彼世尊為我等師止勿往我等三人並領此眾舍利弗目犍連再次乃至三次言梵志刪若曰我等往世尊處以彼世尊為我等師止勿往我等三人並領此眾三時舍利弗目犍連率二百五十梵志到竹林梵志刪若于是處口吐熱血世尊見舍利弗目犍連從遠方來見已告諸比丘曰彼處來二友乃拘律陀優波提舍也彼等成我聲聞一對上首雙賢也二人于甚深智境滅執得無上解脫而到竹林時師授二人記別來此處二友乃拘律陀優波提舍也彼等成我聲聞一對上首雙賢也四時舍利弗目犍連詣世尊住處詣已以頭面禮世尊足白世尊曰我等唯願于世尊處出家得具足戒世尊曰來諸比丘所善說者法為正滅苦盡故行梵行此為彼等具壽具足戒五爾時摩竭國諸有名族姓子于世尊處行梵行眾人忿怒非難沙門瞿曇來奪我子沙門瞿曇來奪我夫沙門瞿曇來斷絕我族姓今彼令千螺髻梵志出家令二百五十刪若梵志出家令摩竭國諸有名族姓子于沙門瞿曇處修梵行又見諸比丘以如此偈句非難來此摩竭國義利巴奢大沙門已誘刪若徒眾矣今復誘何人六諸比丘聞彼眾人忿怒非難時諸比丘以此事白世尊世尊曰諸比丘此聲應不久存唯存七日而已七日過後當消滅矣是故諸比丘若以偈難汝等曰來此摩竭國義利巴奢大沙門已誘刪若徒眾矣今復何誰人汝等即以偈反難之大雄如來尊正法誘循循以法誘智者何生嫉妒心七爾時眾人見諸比丘以如此偈非難來此摩竭國義利巴奢大沙門已誘刪若徒眾矣今復誘何人諸比丘即以如此偈反難大雄如來尊正法誘循循以法誘智者何生嫉妒心眾人知沙門釋子以法而不以非法誘導此非難聲唯存七日七日過後則消滅矣舍利弗目犍連出家因緣終誦品四終二五一爾時諸比丘無和尚教導教誡上衣下裳皆不整齊威儀不具而往乞食彼等于眾人供食時于噉食上出鉢于嚼食上出鉢于味食上出鉢于飲料上出鉢自定汁飯而求食于食堂亦出大聲高聲而住二眾人忿怒非難如何諸沙門釋子上衣下裳皆不整齊威儀不具而往乞食眾人供食時于噉食上出鉢于嚼食上出鉢于味食上出鉢于飲料上出鉢自定汁飯而求食于食堂亦大聲高聲而住如婆羅門食時之婆羅門耶三諸比丘聞彼眾人忿怒非難諸比丘中少欲知足懷慚知悔而好學者忿怒非難如何諸比丘上衣下裳皆不整齊威儀不具足而往乞食眾人供食時于軟食上出鉢于嚼食上出鉢于味食上出鉢于飲料上出鉢自定汁飯而求食于食堂亦出高聲大聲而住耶四時彼諸比丘以此事白世尊時世尊由此因緣于此時機令集會比丘眾問諸比丘曰諸比丘比丘等上衣下裳俱不整齊威儀不具而往乞食眾人供食時于軟食上出鉢于嚼食上出鉢于味食上出鉢于飲料上出鉢自定汁飯而求食于食堂亦出高聲大聲而住真實否世尊真實也五時佛世尊呵責曰諸比丘此等愚人所為非也非隨順非相應非沙門之法非威儀不應為諸比丘如何此等愚人之上衣下裳俱不整齊威儀不具而往乞食眾人供食時于噉食上出鉢于嚼食上出鉢于味食上出鉢于飲料上出鉢自定汁飯而求食于食堂亦出高聲大聲而住耶諸比丘此非令未信者生信已信者有所增益且令未信者不信若已信者所以離反者也六時世尊以諸多方便呵責彼等比丘說示難扶養難教養多欲不知足參與眾中懈怠之非以諸多方便說示易扶養易教養少欲知足漸損好頭陀行行信心損減障礙精進為諸比丘說其相應隨順法以告諸比丘曰諸比丘我許有和尚