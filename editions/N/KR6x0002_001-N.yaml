被割截者大指被割截者腱被割截者手如蛇頭者佝僂者侏儒者癭者受烙印刑者受笞刑者被標記罪狀者象皮病者惡疾者毀辱眾者瞎子瘤手跛者半身不遂者殘廢者老弱者盲者瘂者聾者盲瘂者盲聾者聾瘂者盲聾瘂者出家彼等以此事白世尊世尊曰二諸比丘不得令手被割截者出家不得令足被割截者出家不得令盲聾瘂者出家令出家者墮惡作不得令出家之三十二種人品終餘財誦品終七二一爾時六群比丘與無恥者依止彼等以此事白世尊世尊曰諸比丘不得與無恥者依止與者墮惡作爾時諸比丘依止諸無恥者而住不久成為無恥惡比丘彼等以此事白世尊世尊曰諸比丘不得依止諸無恥者而住依止而住者墮惡作二時諸比丘心生思念世尊規定不得與無恥者依止不得依止無恥者而住我等如何知有恥及無恥耶彼等以此事白世尊世尊曰諸比丘許待四五日以知比丘習性七三一爾時有一比丘在拘薩羅國遊行旅途中時彼比丘心生思念世尊規定無依止不得住我應依止而在旅途中我應如何為之耶彼等以此事白世尊世尊曰諸比丘旅遊途上比丘不得依止時許無依止而住二爾時有二比丘在拘薩羅國遊行旅途上彼等至一住處而于是處有一比丘生病時彼比丘心生思念世尊規定無依止不得住我應覓依止但有病我應如何為之耶彼等以此事白世尊世尊曰諸比丘病比丘不得依止時許無依止而住三時彼看病比丘心生思念世尊規定無依止不得住我應作依止但此比丘有病我應如何為之耶彼等以此事白世尊世尊曰諸比丘看病比丘不得依止時許無依止而住四爾時有一比丘住森林于其坐臥處得安穩時彼比丘心生思念世尊規定無依止不得住我應尋得依止但住森林而于此坐臥處得安穩我應如何為之耶彼等以此事白世尊世尊曰諸比丘于森林安穩住之比丘不得依止時許無依止而住但與依止相應者來應依止而住七四一爾時有願從具壽摩訶迦葉受具足戒者時具壽摩訶迦葉遣使言具壽阿難曰阿難來為此人誦具足戒文具壽阿難曰我不能唱長老名長老乃我所尊重者故也彼等以此事白世尊世尊曰諸比丘許唯稱姓誦具足戒文二爾時有二人願從具壽摩訶迦葉受具足戒彼等爭言我先受具足戒我先受具足戒彼等以此事白世尊世尊曰諸比丘許一次誦文而與二人同授具足戒三爾時有甚多願從長老受具足戒者彼等爭言我先受具足戒我先受具足戒諸長老言我等一次誦文而悉與授具足戒彼等以此事白世尊世尊曰諸比丘許一次誦文而與二人或三人悉授具足戒但應依同一和尚不得依其他和尚七五一爾時具壽鳩摩羅迦葉從入胎算至二十歲受具足戒時具壽鳩摩羅迦葉心生思念世尊規定未滿二十歲者不得受具足戒而我從入胎算起滿二十歲我算受具足戒或不算受具足戒耶彼等以此事白世尊世尊曰諸比丘于母胎生第一心而現第一識由此有生諸比丘許從入胎算至二十歲授具足戒七六一爾時受具足戒者有癩癰疹肺病癲狂等病彼等以此事白世尊世尊曰諸比丘許授具足戒者詢問障法諸比丘詢問時應如此為謂汝有癩癰疹肺病癲狂等病否汝是人否是男人否自在否非負債者否非王臣否父母許否滿二十歲否鉢衣圓滿否何名耶和尚之名為何耶二爾時諸比丘對願受具足戒者未與教誡而問障法願受具足戒者困惑羞愧不能答彼等以此事白世尊世尊曰諸比丘許先教誡而後問障法三于其僧伽中行教誡願受具足戒者困惑羞愧不能答彼等以此事白世尊世尊曰諸比丘許于一邊教誡之後問障法諸比丘教誡者應如此為之應先令選擇和尚選和尚後應示鉢衣曰此是汝鉢此是僧伽梨此是鬱多羅僧此是安陀會往立彼處四有愚癡暗昧者與教誡願受具足戒者受教誡時困惑羞愧而不能答彼等以此事白世尊世尊曰諸比丘愚癡暗昧者不得與教誡與教誡者墮惡作諸比丘許聰明賢能之比丘與教誡五有未當選者與教誡彼等以此事白世尊世尊曰諸比丘未當選者不得與教誡與教誡者墮惡作諸比丘許當選者與教誡諸比丘選時應如此為之或選自己或選他人如何選自己耶聰明賢能比丘應告僧伽言諸大德請聽我言某甲願從具壽某甲受具足戒若僧伽機熟者當與我教誡某甲如此選己也六如何選他耶聰明賢能比丘應告僧伽曰諸大德請聽我言某甲願從具壽某甲受具足戒若僧伽機熟者當令某甲與教誡某甲如此選他也七當選比丘應至願受具足戒者處言彼曰某甲請聽今汝語真時語實時于僧伽詢問時有應言有無應言無勿困惑勿羞愧當如此問汝汝有病否和尚之名為何耶八教誡者及受者相偕而來不得相偕而來教誡者應先來告僧伽言諸大德請聽我言某甲願從具壽某甲受具足戒我與彼教誡已若僧伽機熟者令某甲來應言請來即偏袒上衣禮諸比丘足蹲踞合掌請受具足戒我請僧伽授具足戒僧伽哀愍濟度我二次三次我請僧伽授具足戒僧伽哀愍濟度我九聰明賢能比丘應告僧伽言諸大德請聽我言此處某甲願從具壽某甲受具足戒若僧伽機熟者我問某甲障法某甲請聽今乃汝語真時語實時也我問汝事有應言有無應言無汝有病否和尚之名為何耶一聰明賢能比丘應告僧伽言諸大德請聽我言此處某甲願從具壽受具足戒無有障法鉢衣完備某甲請僧伽以某甲為和尚授具足戒若僧伽機熟者僧伽應以某甲為和尚授某甲具足戒此乃表白一一諸大德請聽我言此處某甲願從具壽某甲受具足戒無有障法鉢衣完備某甲請僧伽以某甲為和尚授具足戒僧伽應以某甲為和尚授某甲具足戒以某甲為和尚授某甲具足戒具壽聽者默然不聽者請言一二我二次說此事我三次說此事不聽者請說僧伽以某甲為和尚授某甲具足戒已具壽聽故默然我如是了知具足戒羯磨終七七一其次應量日影告時季告日分告法式應告四依謂出家依乞食于此乃至命終應勤行餘得者僧次食別請食請食行籌食十五日食布薩食月初日食也出家依糞掃衣于此乃至命終應勤行餘得者亞麻衣綿衣野蠶衣褐衣麻衣紵衣也出家依樹下坐于此乃至命終應勤行餘得者精舍平覆屋殿樓樓房地窟也出家依陳棄藥于此乃至命終應勤行餘得者熟酥生酥油蜜糖也四依品終七八一爾時諸比丘授一比丘具足戒唯留其一人而去彼以後獨往而于途中遇其舊妻彼女言曰汝今出家耶然我出家矣出家者難得淫法來行淫法彼與彼女乃行淫法甚久始來比丘等言曰汝為何遲來耶二時彼比丘以此事告諸比丘諸比丘以此事白世尊世尊曰諸比丘授具足戒者許與同伴而告四非事受具足戒之比丘即對畜生亦不得行淫法比丘以行淫法者非沙門非釋子也猶如有人一經斬首其身命即絕如此比丘若行淫法其沙門釋子戒命亦絕此即至命終不得為也三受具足戒比丘不與取即偷盜乃至盜一草葉亦不得為之為五錢或五錢物或過五錢物不與取偷盜者乃非沙門非釋子猶如枯葉離枝不復綠色如此比丘行五錢或五錢物或過五錢物不與取偷盜者亦非沙門釋子矣此至命終不得為也四受具足戒比丘不得知而奪去有情乃至螻蟻性命比丘知而奪命乃至墮胎者即非沙門非釋子猶如巨石破為二分不得復合如此比丘知而奪人身命非沙門非釋子此至命終不得為也五受具足戒比丘不得稱上人法乃至言我于空屋受快樂比丘有惡欲為惡所迫稱非真非實之上人法禪解脫三昧正受道果者乃非沙門非釋子猶如多羅樹截去其心者不能復生如此比丘有惡欲為惡所迫稱非真非實上人法者亦非沙門非釋子此至命終不得為也四非事品終七九一爾時有一比丘不自見罪被舉而還俗彼再還來向諸比丘請求受具足戒彼等以此事白世尊世尊曰諸比丘此處有比丘不自見罪被舉而還俗再還來向諸比丘請求受具足戒應言彼曰汝見彼罪耶若言見者可令出家若言不見不得令出家二令出家後應言汝見彼罪耶若言見者可授具足戒若言不見不得授具足戒授具足戒後應言汝見彼罪耶若言見者可與解羯磨若言不見不得與解羯磨與解羯磨後應言汝見彼罪耶若言見者善若言不見者若得僧和合可再舉之若不得僧和合者與之共住共食亦不成罪三諸比丘此處有比丘有罪不懺悔而還俗再還來向諸比丘請求受具足戒應言彼曰汝懺悔彼罪耶若言懺悔者可令之出家若言不懺悔者不得令出家令出家後應言汝懺悔彼罪耶若言懺悔者可授具足戒若言不懺悔者不得授具足戒授具足戒後應言汝懺悔彼罪耶若言懺悔者可與解羯磨若言不懺悔者不得與解羯磨與解羯磨後應言汝懺悔彼罪若言懺悔者善若言不懺悔者得僧和合時可再舉之若不得僧和合者與之共住共食亦不成罪四諸比丘此處有比丘不捨惡見被舉而還俗再來向諸比丘請求受具足戒應言彼曰汝捨彼惡見耶若言捨者可令出家若言不捨者不得令出家令出家後應言汝捨彼惡見耶若言捨者可授具足戒若言不捨者不得授具足戒授具足戒後應言汝捨彼惡見耶若言捨者可與解羯磨若言不捨者不得與解羯磨與解羯磨後應言汝捨彼惡見耶若言捨者善若言不捨者得僧和合可再舉之不得僧和合者與之共住共食亦不成罪誦品一終律乃于大義齎樂善美者折伏惡欲人攝受有恥者持教者而為悉知勝者境無疑善施設不異境安穩于犍度附隨篇並毘尼母如義而行善能者如理覺若人不知牛不能保牛群不知戒律者安護律儀行經論縱亡失律存教常存是故乃為總攝隨智進次第攝頌我說請傾聽事因理趣廣說等皆是雖難遍盡但可依理知于菩提樹下阿闍波羅樹羅闍耶他那索訶主梵天阿羅邏迦羅鬱陀迦羅摩比丘優波迦憍陳如婆頗跋提摩訶男乃至阿說示耶舍及四人五十人諸方由一切羅網事魔三十人與優樓頻螺及螺髻梵志火堂與大王帝釋及梵天祠祭之和合糞掃衣池石及迦休樹石闍浮菴婆樹阿摩勒取波利質多羅華迦葉應折薪迦葉應燃火迦葉應滅火沈之火爐雲伽耶杖林園以及摩竭國以優波提舍乃至拘律陀為有名出家下裳不齊整乃至以出鉢瘦醜婆羅門而以行非行滿腹及孺童二人或三人眾授具足戒法臘而愚癡授與具足戒和尚之離去法臘十依止不奉事驅出愚癡失依止五分之比丘六分之比丘其他舊外道裸形不斷髮髻梵志釋子摩竭國五病臣盜賊鴦崛摩竭王下令獄標記笞刑烙印刑負債奴僕及禿頭優波離蛇病一家有信心騫荼無路去迦維羅衛城童子及受處不和合而住如何行罰耶所有之僧園食不問和尚帶走及騫荼黃門賊住者及歸外道者蛇殺母父者以殺阿羅漢污染比丘尼以破和合僧出佛身血者乃至二根者不請和尚者僧伽為和尚以眾為和尚黃門為和尚及不具鉢者借者有三人手被割截者足被割截者手足割截者耳被割截者鼻被割截者耳鼻割截者指被割截者大指割截者腱被割截者手如蛇頭者佝僂人侏儒癭者笞刑者受烙印刑者標記罪狀者及象皮病者惡疾瞎子者毀辱大眾者瘤手及跛者半身不遂者斷威儀路者老弱盲瘂者盲瘂盲聾者盲聾瘂聾者及盲瘂聾者為無恥依止不為無恥者依止旅途中請者及希望來者爭先後依一人和尚鳩摩羅迦葉受具戒者病不受教誡而使困惑教誡僧伽中教誡愚癡之教誡非當選教誡教誡受者來謂請濟度我之具足戒依留一人三人此犍度有一百七十二事第一大犍度攝頌終
