body:
  text: 律藏大品歸命彼世尊應供等正覺第一大犍度一一爾時佛世尊初成現等覺止優樓頻螺村尼連禪河邊菩提樹下時世尊于菩提樹下一度結跏趺坐坐受七日解脫樂二時世尊是夜初分于緣起順逆作意謂無明緣行行緣識識緣名色名色緣六處六處緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死愁憂悲苦惱如是集起一切苦蘊又無明滅盡則行滅行滅則識滅識滅則名色滅名色滅則六處滅六處滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死愁憂悲苦惱滅如是滅盡一切苦蘊三時世尊了知此義即于此時自唱頌曰力行靜慮婆羅門若是顯現諸法者了知有因諸法故滅彼一切疑惑盡四時世尊其夜中分于緣起順逆作意謂無明緣行行緣識識緣名色乃至如是集起一切苦蘊乃至滅盡五時世尊了知此義即于此時自唱頌曰力行靜慮婆羅門若是顯現諸法者了知滅盡諸緣故滅彼一切疑惑盡六時世尊其夜後分于緣起順逆作意謂無明緣行行緣識乃至如是集起一切苦蘊乃至滅盡七時世尊了知此義即于此時自唱頌曰力行靜慮婆羅門若是顯現諸法者則彼端立破魔軍猶如照虛空日輪菩提樹下因緣終二一時世尊過七日後從三昧起離菩提樹下往阿闍波羅榕樹處往已于阿闍波羅榕樹下一度結跏趺坐坐受七日解脫樂二時有一傲慢婆羅門詣世尊住處詣已與世尊交談慶慰歡喜感銘之言而立一面于一面立已彼婆羅門白世尊曰汝瞿曇依何為婆羅門以何成為婆羅門法耶三時世尊了知此義即于此時自唱頌曰婆羅門若除惡法無慢無濁但自制通達吠陀成梵行是得自稱婆羅門如彼世間無多人阿闍波羅榕樹下因緣終三一時世尊過七日後從三昧起離阿闍波羅榕樹下往目支鄰陀樹處往已于目支鄰陀樹下一度結跏趺坐坐受七日解脫樂二此際不時起大雲連續降雨七日天陰風起空氣流寒時目支鄰陀龍王從己棲處出局蜷七匝繞世尊身舉巨首覆世尊頭而立心中念言毋寒世尊毋熱世尊虻蚊風熱蛇毋觸世尊三時目支鄰陀龍王過七日後見雨止而空中清明從世尊身解去局蜷捨去本形化孺童相合掌立世尊前歸依世尊四時世尊了知此義即于此時自唱頌曰樂知足聞法並見法遠離樂于世無瞋于有情制御樂于世離貪並超越諸欲調伏我慢者此為最上樂目支鄰陀樹下因緣終四一時世尊過七日後從三昧起離目支鄰陀樹下往羅闍耶他那樹處往已于羅闍耶他那樹下一度結跏趺坐坐受七日解脫樂二爾時多富沙與婆梨迦二商人從鬱迦羅村來至此地路上時多富沙與婆梨迦二商人有于前生具親族血緣一鬼神告多富沙婆梨迦二商人曰諸兄世尊于此初成現等覺在羅闍耶他那樹下汝等應以子蜜丸往供彼世尊將于長夜得其利益安樂三時多富沙婆梨迦二商人即持子蜜丸詣世尊住處詣已敬禮世尊于一面立一面立已多富沙婆梨迦二商人白世尊言願世尊受我等子及蜜丸使我等于長夜得其利益安樂四時世尊心生思念諸如來不以手受我當以何器受子蜜丸耶時有四大天王以心知世尊念處分從四方來獻世尊四石鉢曰世尊請以此器受子蜜丸世尊受此新石鉢受子蜜丸而食五時多富沙婆梨迦二商人見世尊洗鉢及手已以頭面禮世尊足白世尊曰我等于此歸依世尊與法願世尊容我等從今日起至命終止為優婆塞彼等于世間初唱二歸依為優婆塞羅闍耶他那樹下因緣終五一時世尊過七日後從三昧起離羅闍耶他那樹下往阿闍波羅榕樹處往已于此世尊住阿闍波羅榕樹下二時世尊于靜居宴默心生思念我證得此法甚深難見難解寂靜美妙超尋思境而至微唯智者所能知焉然此眾生樂阿賴耶欣阿賴耶喜阿賴耶而樂阿賴耶欣阿賴耶喜阿賴耶眾生難見此緣依性緣起處也亦甚難見一切諸行寂止一切緣依斷捨渴愛滅盡離滅涅槃處我若說法彼不了解我時我唯疲勞困憊而已三然而未曾聞稀有偈句于世尊心中顯現我困苦所證今為何應說貪瞋所惱者不易悟此法導引逆世流深微而難見欲著癡闇覆是人不得見四世尊如是思擇心念默然不欲說法時有索訶主梵天心知世尊之所思念而念啊世間敗壞啊世間敗壞如來應供等正覺心念默然不欲說法五時索訶主梵天如力士屈伸臂伸屈臂迅沒梵界而現世尊前六此時索訶主梵天偏袒上衣一肩右膝著地合掌面世尊而白世尊曰願世尊說法願善逝說法有情有少塵垢者若不聞法即退墮若聞法即得悟也七索訶主梵天如此說如此言已且更說曰曾于摩竭國現前垢穢所思不淨法願欲弘開甘露門令聞無垢所覺法恰如壁立山頂峰普見低處諸眾生汝乃勝慧普眼者昇登法所就高樓自超憂苦望鑑臨沈憂生老惱眾生躍起雄者戰勝者商主債無遊世間願請世尊為說法能悟入者應有人八如是說時世尊告索訶主梵天曰梵天我心生思念我所證得此法甚深難見難解困憊而已然而梵天未曾聞稀有偈句現于我心覆不得見梵天我如是思惟心念默然不欲說法九索訶主梵天重白世尊世尊願為說法應得了知世尊重告索訶主梵天曰我心生思念我所證得此法甚深難見難解困憊而已然而梵天未曾聞稀有偈句現于我心覆者不得見梵天我如是思惟心思默然不欲說法一索訶主梵天三白世尊曰世尊願為說法應得了知時世尊因知梵天勸請並哀愍有情乃以佛眼觀察世間世尊以佛眼觀察世間時見有情有塵垢少者塵垢多者利根者鈍根者善行相者惡行相者易教導者難教導者有知他世與罪過之怖畏而住者一一譬如于青蓮池赤蓮池白蓮池或如青蓮赤蓮白蓮有生于水中長于水中不出水面沈于水中而繁茂者或如青蓮赤蓮白蓮有生于水中長于水中住于水面者或如青蓮赤蓮白蓮有生于水中長于水中出住水面不為水所染者一二如是世尊以佛眼觀察世間見有情有塵垢少者塵垢多者利根者鈍根者善行相者惡行相者易教導者難教導者有知他世與罪過之怖畏而住者見已以偈告索訶主梵天曰有耳得聞甘露門聞時棄捨昔所信思欲嬈惑惱害者不為演說妙法音一三時索訶主梵天已知世尊許為說法敬禮世尊右繞而沒其處梵天勸請因緣終六一時世尊心生思念我應為誰先說法耶誰能速悟此法耶時世尊心生思念彼阿羅邏迦羅摩賢明聰敏伶俐長夜甚少塵垢我宜先為阿羅邏迦羅摩說法彼將速悟此法二時有天不顯身白世尊阿羅邏迦羅摩已命終七日矣世尊亦自知阿羅邏迦羅摩已命終七日時世尊心生思念阿羅邏迦羅摩是大損失彼若聞此法當速悟也三時世尊心生思念我應先為誰說法耶誰能速悟此法耶時世尊心生思念鬱陀迦羅摩子賢明聰敏伶俐長夜甚少塵垢也我宜先為鬱陀迦羅摩子說法彼將速悟此法四時有天不顯身白世尊鬱陀迦羅摩子于昨夜命終矣世尊亦自知鬱陀迦羅摩子于昨夜命終時世尊心生思念鬱陀迦羅摩子是大損失彼若聞此法當速悟也五時世尊心生思念我應先為誰說法耶誰能速悟此法耶時世尊心生思念五比丘為我多所饒益于我專心精進時承事于我我宜先為五比丘說法六時世尊心生思念五比丘今在何處耶世尊以清淨超人天眼見五比丘在波羅㮈國仙人墮處之鹿野苑時世尊于隨意間住優樓頻螺後向波羅㮈遊行七有邪命外道優波迦見世尊在迦耶與菩提樹途中見已白世尊汝諸根清淨汝膚色清淨皎潔汝依誰出家耶以誰為汝師愛樂誰之法耶八彼如是言時世尊以偈告優波迦曰一切勝者一切知我不污染一切法渴愛解脫離一切自證知須法誰人于我無有師無有等我者人天等世間無與我比倫此世間應供我為無上師我獨等正覺而清涼寂靜乃為轉法輪赴迦尸都城于盲闇世間擊彼甘露鼓九優波迦言如汝自稱汝適為無邊勝者世尊以偈曰若得諸漏悉滅盡即與我同為勝者勝諸惡法優波迦是故我乃為勝者如是說時邪命外道優波迦言或然搖頭取別路離去一時世尊次第遊行至波羅㮈國仙人墮處鹿野苑近五比丘住處五比丘從遠方見世尊來見而相約言從彼處來者是沙門瞿曇彼奢侈而棄精進墮于奢侈勿禮彼勿起迎勿取彼衣鉢但為設座彼若欲時得就坐一一世尊漸臨近五比丘五比丘即不守己約起迎世尊或取世尊衣鉢或與設座或持來洗足水足臺足布世尊坐于所設座上就坐已世尊洗足而五比丘以卿稱呼世尊一二彼等如是稱呼時世尊即告五比丘曰諸比丘汝等切勿以名以卿稱呼如來諸比丘如來是應供等正覺諸比丘諦聽證得不死已我應教誨我應說法隨所教而行者不久必能于現法自證現證具足究竟無上梵行而住此乃善男子離家出家之本懷也一三如是說時五比丘白世尊言瞿曇汝以彼行彼道彼難行尚未證得上人法至尊殊勝之智見今汝奢侈棄精進墮奢侈如何能證得上人法至尊殊勝智見耶一四如是說時世尊告五比丘曰諸比丘如來非奢侈而棄精進非墮奢侈諸比丘如來乃應供等正覺也諸比丘諦聽證得不死已我應教誨我應說法隨所教而行者不久必能于現法自證現證具足究竟無上梵行而住此乃善男子離家出家之本懷也一五五比丘重白世尊乃至世尊重告五比丘曰乃至五比丘三白世尊瞿曇汝于彼行彼道何能證得至尊殊勝之智見耶一六如是言時世尊告五比丘曰諸比丘汝等于今以前知我有如是說否否諸比丘如來乃應供等正覺也諸比丘諦聽出家之本懷也世尊已說服五比丘時五比丘傾聽善聽如來故發了知心一七時世尊告五比丘曰諸比丘于世有二邊出家者不得親近何為二耶一于諸欲欣愛貪著為事乃下劣卑賤凡夫所行而非聖賢無義相應也二自以煩苦為事乃苦而非賢聖無義相應也諸比丘如來捨此二邊以現等覺中道為資眼生智生寂靜生證智等覺涅槃者也一八諸比丘何為如來所現等覺資眼生智生寂靜生證智等覺涅槃中道耶此即八聖道也謂正見正思正語正業正命正精進正念正定諸比丘以此為如來所現等覺資眼生智生寂靜生證智等覺涅槃之中道也一九諸比丘苦聖諦者如此生苦老苦病苦死苦怨憎會苦愛別離苦求不得苦略說之五取蘊苦也二諸比丘苦集聖諦者如此持生後有喜貪俱行隨處歡喜之渴愛謂欲愛有愛無有愛也二一諸比丘苦滅聖諦者如此無餘離滅捨棄定棄解脫此渴愛而無執著也二二諸比丘苦滅道聖諦者如此即八聖道謂正見正定也二三諸比丘苦聖諦者如此于先未聞之法于我眼生智生慧生明生光明生諸比丘應遍知此苦聖諦者乃至已遍知于先未聞之法于我眼生智生慧生明生光明生二四諸比丘苦集聖諦者如此光明生諸比丘應斷此苦集聖諦乃至已斷時光明生二五諸比丘苦滅聖諦者如此時光明生諸比丘應現證此苦滅聖諦乃至已現證光明生二六諸比丘苦滅道聖諦者如此光明生諸比丘應修習此苦滅道聖諦乃至已修習光明生二七諸比丘我于此四聖諦以如此三轉十二行相如實智見尚未為完全清淨期間諸比丘我于天魔梵天世界沙門婆羅門人天眾生界不稱現等覺無上等正覺二八諸比丘然我于此四聖諦以如此三轉十二行相如實智見已完全清淨故諸比丘我于天魔梵天世界沙門婆羅門人天眾生界稱現等覺無上等正覺二九又于我智生見我心解脫不動此我最後生不更受後有世尊如是說已五比丘歡喜信受世尊所說又世尊說此教時具壽憍陳如生遠塵離垢法眼謂凡有集法者皆有此滅法三世尊轉法輪時地居諸天發聲言曰如此世尊于波羅㮈國仙人墮處鹿野苑所轉無上法輪是乃或沙門或婆羅門或天或魔或梵天或世間任何人所不能復者聞地居諸天聲已四天王諸天發聲言曰乃至聞四天王諸天聲已忉利諸天乃至焰摩諸天乃至兜率諸天乃至化樂諸天乃至他化自在諸天乃至梵身諸天發聲言曰如此世尊于波羅㮈國仙人墮處鹿野苑所轉無上法輪是乃或沙門或婆羅門或天或魔或世間任何人所不能復者三一如是于彼剎那須臾間其聲乃至達彼梵天劇烈動搖震撼此十千世界無量廣大輝煌超越諸天榮耀光明現于世間時世尊讚歎曰憍陳如悟矣憍陳如悟矣由此名具壽憍陳如曰阿若憍陳如三二時具壽阿若憍陳如已見法得法知法悟入于法超越疑惑棄除猶豫得無畏以行師教不依他緣白世尊曰我唯願于世尊前出家得具足戒世尊曰來比丘所善說者法為正滅苦盡故行梵行此彼具壽具足戒也三三時世尊說法教導教誡其餘比丘于世尊說法教導教誡時具壽婆頗及具壽跋提生遠塵離垢法眼謂凡有集法者皆有此滅法三四彼等已見法得法知法悟入于法超越疑惑棄除猶豫得無畏以行師教不依他緣白世尊曰我等唯願于世尊前出家得具足戒世尊曰來諸比丘所善說者法為正滅苦盡故行梵行此彼諸具壽具足戒也三五時世尊食用彼等持來施物並說法教導教誡其餘比丘曰三人比丘行乞食以其所得供養六人三六時世尊說法教導教誡時具壽摩訶男與具壽阿說示生遠塵離垢法眼謂凡有集法者皆有此滅法三七彼等已見法得法知法悟入于法超越疑惑棄除猶豫得無畏以行師教不依他緣白世尊曰我等唯願于世尊前出家得具足戒世尊曰來諸比丘所善說者法為正滅苦盡故行梵行此彼具壽等具足戒也三八時世尊告五比丘曰諸比丘色無我諸比丘若色有我者此色應不致病于色應得謂我用此色不用彼色諸比丘然色無我故色乃致病于色不得謂我用此色不用彼色三九受無我諸比丘若受有我者此受應不致病于受應得謂我用此受不用彼受諸比丘然受無我故受乃致病于受不得謂我用此受不用彼受四想無我乃至行無我諸比丘若行有我者此行應不致病于行應得謂我用此行不用彼行諸比丘然行無我故行乃致病于行不得謂我用此行不用彼行四一識無我諸比丘若此識有我者此識應不致病于識應得謂我用此識不用彼識諸比丘然識無我故于識不得謂我用此識不用彼識四二諸比丘汝等于意云何色常耶無常耶世尊無常也無常者苦耶樂耶世尊苦也觀無常苦有變壞之法為此是我所此是我此是本我自身然耶世尊不然四三受乃至想乃至行乃至識常耶無常耶世尊無常也無常者苦耶樂耶世尊苦也觀無常苦有變壞性之法為此是我所此是我此是本我自身然耶世尊不然四四是故諸比丘過去未來現在一切色或內或外或粗或細或劣或勝或遠或近一切色應以正慧如實如此觀察此非我所此非我此非本我自身四五過去未來現在一切受乃至想乃至行乃至識或內或外或粗或細或劣或勝或遠或近一切識應以正慧如實如此觀察此非我所此非我此非本我自身四六諸比丘多聞聖聲聞若如此觀察則厭患色厭患受厭患想厭患行厭患識若厭患則離貪若離貪則解脫解脫者則我已解脫智生知我生已盡梵行已立所作已辦不受後有四七世尊如是說已五比丘歡喜信受世尊所說又世尊說此教時五比丘無取而由諸漏得心解脫其時世間有六阿羅漢矣誦品一終七一爾時波羅㮈國有名耶舍者為族姓子長者子富貴受寵溺彼有三時殿為一冬一夏一雨季彼于雨季堂殿為不攙雜男子妓人圍繞侍奉入雨季歷四月間不下殿堂時族姓子耶舍被侍女圍繞備足沉迷五妙欲樂彼先睡眠而後侍女等亦睡終夜燃燈二時族姓子耶舍先醒見已睡眠中諸侍女或置琵琶腋下或置小鼓項畔或置鼓于胸或亂髮或流涎或寐語如現丘塚見已彼生過患其心決定住于厭離時族姓子耶舍嘆而言厄哉禍哉三時族姓子耶舍著黃金履趣向家門諸非人開門言任何人皆勿妨害族姓子耶舍離家出家時族姓子耶舍趣向城門諸非人開門言任何人皆勿妨害族姓之子耶舍離家出家時族姓子耶舍乃向仙人墮處鹿野苑而去四爾時世尊早晨起而于露處經行世尊見族姓子耶舍從遠處來見即自經行處降敷座而坐時族姓子耶舍趨近世尊嘆曰厄哉禍哉時世尊告族姓子耶舍曰耶舍此處無厄此處無禍耶舍來坐我為汝說法五時族姓子耶舍聞此處無厄此處無禍歡喜踴躍脫黃金履詣世尊處詣已敬禮世尊于一面坐族姓子耶舍于一面坐已世尊為之次第說示謂施論戒論生天論諸欲過患邪害雜染出離功德六知族姓子耶舍生堪任心柔軟心離障心歡喜心明淨心世尊乃為開闡諸佛本真說法謂苦集滅道譬如清淨無有緇斑原布領受正色如此族姓子耶舍亦于其座生遠塵離垢法眼謂凡有集法者皆有此滅法七時族姓子耶舍之母上彼堂殿不見族姓子耶舍即至長者居士處至已白長者居士曰居士不見汝子耶舍時長者居士即令使者乘馬遣往四方自己趣向仙人墮處鹿野苑長者居士見黃金履跡見而追其踪跡八世尊見長者居士由遠處來見已世尊生如是思念我應現神通變化使長者居士雖于此坐但不見坐于此處之族姓子耶舍時世尊即如是現神通變化九時長者居士詣世尊住處詣已白世尊曰世尊見族姓子耶舍否啊居士請坐此處若坐此處汝或見族姓子耶舍坐此處時長者居士念若坐此處我即見族姓子耶舍坐于此處而歡喜踴躍敬禮世尊坐于一面一長者居士坐于一面時世尊