竭國洗尼瓶沙王及後宮于佛為上首之比丘眾亦不能不奉事我不能治汝師一切所有歸于汝我當為汝奴僕師願治我病我甚多當作甚多當辦我于摩竭國洗尼瓶沙王及後宮于佛為上首之比丘眾亦不能不奉事我不能治汝五時是人心生思念彼諸沙門釋子戒易行易食美食臥風不入之臥具我當到諸沙門釋子處出家若爾諸比丘應看護我耆婆童子亦應治我我至無病則還俗時是人到諸比丘處請出家諸比丘令彼出家受具足戒諸比丘為之看護耆婆童子為之治療彼病癒還俗耆婆童子見是人還俗見已言是人曰汝非至諸比丘處出家耶師乃爾既爾何作如此事耶時是人以此事告耆婆童子六耆婆童子忿怒非難如何諸尊者令患五種病者出家耶時耆婆童子詣世尊住處詣已敬禮世尊坐于一面于一面坐已耆婆童子白世尊言世尊願不令患五種病者出家七時世尊說法教示勸導獎勵耆婆童子令之歡喜時耆婆童子歡喜世尊說法教示勸導獎勵即從座起敬禮世尊右繞而去時世尊由此因緣于此時機說法而告諸比丘曰諸比丘患五種病者不得令出家令出家者墮惡作四一爾時摩竭國洗尼瓶沙王境內反亂時摩竭國洗尼瓶沙王命令將軍大臣曰汝等往鎮國境唯唯大王將軍大臣應諾摩竭國洗尼瓶沙王二時著名軍士心生思念我等若喜戰而往則為惡而多積非福將依何方便以脫惡為善耶時彼諸軍士又生思念彼諸沙門釋子行法行平等修梵行說真實持戒有善法若我等往諸沙門釋子處出家則我等脫惡為善矣時彼諸軍士即至諸比丘處請出家諸比丘令彼等出家授具足戒三將軍大臣問王臣曰如何某甲等軍士不在耶某甲等軍士于諸比丘處出家矣將軍大臣忿怒非難如何諸沙門釋子令王臣出家耶將軍大臣以此事告摩竭國洗尼瓶沙王時摩竭國洗尼瓶沙王問司法大臣曰以使王臣出家者當于何罪耶大王應斷和尚頭顱拔表白師之舌半折會眾之肋骨四時摩竭國洗尼瓶沙王詣世尊住處敬禮世尊坐于一面坐一面已洗尼瓶沙王白世尊曰世尊于諸王中有無信心無淨心者以瑣事煩惱諸比丘願世尊不令王臣出家時世尊說法教示勸導獎勵使摩竭國洗尼瓶沙王歡喜時摩竭國洗尼瓶沙王慶喜世尊說法教示勸導獎勵已即從座起敬禮世尊右繞而去時世尊以此因緣于此時機說法而告諸比丘曰諸比丘不得令王臣出家令出家者墮惡作四一一爾時盜賊鴦崛摩羅于比丘處出家眾人見之驚懼而逃避路背面閉門眾人忿怒非難如何諸沙門釋子令強盜出家耶諸比丘聞彼等忿怒非難時諸比丘以此事白世尊世尊告諸比丘曰諸比丘不得令強盜出家令出家者墮惡作四二一爾時摩竭國洗尼瓶沙王下令曰于諸沙門釋子處出家者得不作任何事但善說法行梵行正作苦邊際爾時有一人為盜被繫于獄舍破獄舍逃脫于諸比丘處出家二眾人見曰此乃彼破獄舍盜賊也應捕之或言不得如此說摩竭國洗尼瓶沙王下令于諸沙門釋子處出家者得不為任何事但善說法行梵行正作苦邊際眾人忿怒非難彼諸沙門釋子得無畏彼等得不為任何事如何令破獄盜賊出家耶彼等以此事白世尊世尊曰諸比丘不得令破獄盜賊出家令出家者墮惡作四三一爾時有一人為盜而逃至諸比丘處出家于王後宮張貼告示謂若見應即殺眾人見而言曰此乃彼告示中盜賊也應殺之或曰不得如此言作苦邊際眾人忿怒非難彼諸沙門釋子得無畏彼等得不為任何事如何令被告示之盜賊出家耶彼等以此事白世尊世尊曰諸比丘不得令被告示之盜賊出家令出家者墮惡作四四一爾時有一受笞刑者于諸比丘處出家眾人忿怒非難如何諸沙門釋子令受笞刑者出家耶彼等以此事白世尊世尊曰諸比丘不得令受笞刑者出家令出家者墮惡作四五一爾時有一受烙刑者于諸比丘處出家眾人忿怒非難如何諸沙門釋子令受烙刑者出家耶彼等以此事白世尊世尊曰諸比丘不得令受烙刑者出家令出家者墮惡作四六一爾時有一逃債者于諸比丘處出家諸債主見曰此乃我等債務人捕之或曰不得如此說摩竭國洗尼瓶沙王下令到沙門釋子等處出家者得不為任何事但善說法行梵行正作苦邊際眾人忿怒非難彼沙門釋子等得無畏彼等得不為任何事如何令負債人出家耶彼等以此事白世尊世尊曰諸比丘不得令負債人出家令出家者墮惡作四七一爾時有一奴僕逃于諸比丘處出家諸主人見曰此乃我等奴僕逮捕之或曰不得如此言正作苦邊際眾人忿怒非難彼沙門釋子等得無畏彼等得不為任何事如何令奴僕出家耶彼等以此事白世尊世尊曰諸比丘不得令奴僕出家令出家者墮惡作四八一爾時有一禿頭鍛工與父母爭而往僧園于諸比丘處出家時彼禿頭鍛工之父母為尋彼禿頭鍛工到僧園問諸比丘曰見如此童子否諸比丘不知而言曰我等不知未見而言曰我等未見二時彼禿頭鍛工之父母尋彼禿頭鍛工見于諸比丘處出家忿怒非難曰此諸沙門釋子無慚妄語破戒知而言不知見而言未見此童子已于諸比丘處出家也諸比丘聞彼禿頭鍛工之父母忿怒非難時彼諸比丘以此事白世尊世尊曰諸比丘許應于僧伽求剃髮之許可四九一爾時王舍城有一群童子十七人為好友以優波離童子為其上首時優波離父母心生思念我等死後優波離依何方便得以安樂生活而無困苦時優波離父母心生思念若令優波離善學書我等死後優波離可得安樂生活而無困苦時優波離父母心生思念若令優波離學書于指即痛苦若令優波離學算數我等死後優波離可得安樂生活而無困苦二時優波離父母心生思念若令優波離學算數于胸即痛苦若令優波離善學畫我等死後優波離可得安樂生活而無困苦時優波離父母心生思念若令優波離善學畫于眼即痛苦彼諸沙門釋子戒易行易食美食臥風不入之臥具若令優波離于諸沙門釋子處出家則我等死後優波離可得安樂生活而無困苦三優波離童子聞父母如此言談時優波離童子即至彼諸童子處至已言彼諸童子曰來我等于諸沙門釋子處出家若汝出家者則我等亦出家時彼諸童子至各自父母處言曰許我離家而出家時彼諸童子之父母及彼諸童子皆同有善意趣志願故許焉彼等到諸比丘處請出家諸比丘令彼等出家授具足戒四彼等于夜未明凌晨早起而喚曰與粥與食與噉食諸比丘曰應待至天明有粥即飲有食即食有噉食即食之若無粥食噉食時應往乞食而食焉諸比丘雖如此說彼等唯喚與粥與食與噉食而濡污臥牀五世尊于夜未明凌晨時起而聞童子聲聞已告具壽阿難曰阿難何故彼童子聲時具壽阿難以此事白世尊世尊曰諸比丘諸比丘知未滿二十歲而授與具足戒事真實否世尊真實也佛世尊呵責曰諸比丘如何愚人知未滿二十歲而授與具足戒耶六諸比丘未滿二十歲者不堪忍耐寒熱飢渴蚊虻風熱蟲蛇所觸不堪忍耐罵詈惡口言語身不堪忍受苦猛粗利不悅不可意而奪命諸比丘二十歲者堪忍耐寒熱諸比丘如此令未信者不生信已信者非所增益呵責說法告諸比丘曰諸比丘知未滿二十歲者不得授與具足戒授具足戒者應依法斷除五一爾時有一家族因蛇風病而死唯遺父子彼等于比丘處出家俱往乞食時彼童子當受其父施熱粥言曰父親亦與我父親亦與我眾人忿怒非難彼沙門釋子非梵行者也此童子乃比丘尼所生也諸比丘聞彼眾人忿怒非難時諸比丘以此事白世尊世尊曰諸比丘不得令未滿十五歲童子出家令出家者墮惡作五一一爾時有一歸依阿難家族有信心有淨心因蛇風病而死唯遺二童子彼等依舊習見有比丘即趨近前諸比丘等叱退之彼等為諸比丘所叱退而仍叫喚時具壽阿難心生思念世尊規定不得令未滿十五歲童子出家而此諸童子皆不滿十五歲依何方便得不喪失此諸童子耶時阿難以此事白世尊世尊曰阿難此諸童子能驅烏否世尊能時世尊依此因緣于此時機說法而告諸比丘曰諸比丘許令未滿十五歲童子為驅烏人而出家五二一爾時具壽跋難陀釋子有二沙彌謂騫荼與磨竭也彼等更相行淫諸比丘忿怒非難如何沙門行如此非行耶彼等以此事白世尊世尊曰諸比丘一人不得蓄二沙彌蓄者墮惡作五三一爾時世尊于王舍城既過雨季又過夏冬眾人忿怒非難有諸沙門釋子四方無路而盲闇彼等不知四方諸比丘聞彼眾人忿怒非難時諸比丘以此事白世尊二時世尊告阿難曰阿難持鍵往告各房舍諸比丘言世尊將遊行南山欲從者來唯唯具壽阿難應諾世尊即持鍵往各房舍告諸比丘言世尊將遊行南山欲從者來三諸比丘曰阿難世尊規定于十臘間依止而住過十臘後可與人依止若我等當往彼處而取依止住短時間復還來時則不能不再取依止若我等阿闍梨和尚往我等亦往若我等阿闍梨和尚不往我等亦不往阿難不然我等知為輕率也四時世尊與少數比丘眾俱遊行南山時世尊于隨意間住南山後復還王舍城時世尊告具壽阿難曰如何如來遊行南山唯與少數比丘眾俱耶時具壽阿難以此事白世尊時世尊依此因緣于此時機說法而告諸比丘曰諸比丘許聰明賢能之比丘依止五年暗昧者乃至命終應依止而住五諸比丘具足五分之比丘不得無依止而住謂不具足無學戒蘊同第一大犍度三六二諸比丘具足如此五分之比丘不得無依止而住諸比丘具足如此五分之比丘得無依止而住謂無學之同第一大犍度三六三諸比丘具足如此五分之比丘得無依止而住六諸比丘又具足五分之比丘不得無依止而住謂不信同第一大犍度三六六諸比丘具足如此五分之比丘不得無依止而住諸比丘具足五分比丘得無依止而住謂有信同第一大犍度三六七諸比丘具足如此五分之比丘得無依止而住七諸比丘又具足五分之比丘不得無依止而住謂于增上戒學同第一大犍度三六八諸比丘具足如此五分之比丘不得無依止而住諸比丘具足五分之比丘得無依止而住謂于增上戒同第一大犍度三六九諸比丘具足如此五分之比丘得無依止而住八諸比丘又具足五分之比丘不得無依止而住謂犯同第一大犍度三六一四諸比丘具足如此五分之比丘不得無依止而住諸比丘具足五分比丘得無依止而住謂不犯同第一大犍度三六一五諸比丘具足如此五分之比丘得無依止而住九諸比丘又具足五分之比丘不得無依止而住謂犯同第一大犍度三六一六未滿五臘也諸比丘具足如此五分之比丘不得無依止而住諸比丘具足五分之比丘得無依止而住謂不犯同第一大犍度三六一七五臘或過五臘也諸比丘具足如此五分之比丘得無依止而住一諸比丘具足六分之比丘不得無依止而住謂無學之同第一大犍度三七一未滿五臘也諸比丘具足如此六分之比丘不得無依止而住諸比丘具足六分之比丘得無依止而住謂無學之同第一大犍度三七二五臘或過五臘也諸比丘具足如此六分之比丘得無依止而住一一諸比丘又具足六分之比丘不得無依止而住謂不信同第一大犍度三七五未滿五臘也諸比丘具足如此六分之比丘不得無依止而住諸比丘具足六分之比丘得無依止而住謂有信同第一大犍度三七六五臘或過五臘也諸比丘具足如此六分之比丘得無依止而住一二諸比丘又具足六分之比丘不得無依止而住謂于增上戒同第一大犍度三七七未滿五臘也諸比丘具足如此六分之比丘不得無依止而