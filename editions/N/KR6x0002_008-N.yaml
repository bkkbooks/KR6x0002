body:
  text: 第八衣犍度一一爾時佛世尊住王舍城竹林迦蘭陀迦園時毘舍離富庶繁榮人集民多而豐饒有七千七百七殿樓七千七百七重閣七千七百七遊園七千七百七蓮池有淫女菴婆婆梨端麗樂見殊妙可欣具足殊勝美貌善能歌舞音曲為愛樂眾所好一夜受五十金因此毘舍離愈益繁榮也二時王舍城有一住人有事往毘舍離王舍城住人見毘舍離富庶繁榮人集民多而豐饒有七千七百七殿樓七千七百七蓮池又見淫女菴婆婆梨端麗樂見殊妙愈益繁榮時王舍城住人彼事完了還王舍城詣摩竭國洗尼瓶沙王住處詣而言摩竭國洗尼瓶沙王大王毘舍離富庶繁榮愈益繁榮大王願我等亦安置淫女若爾覓可安置為淫女之童女來三爾時王舍城有童女名為娑羅跋提具足端麗樂見殊妙可欣而殊勝美貌時王舍城住人安置童女娑羅跋提為淫女不久時淫女娑羅跋提善能歌舞音曲為愛樂人所好一夜受百金時淫女娑羅跋提不久有娠時淫女娑羅跋提心生思念姙婦為男子所不好若人于我言淫女娑羅跋提有娠時則減我一切恭敬我當稱病時淫女娑羅跋提命守門人言守門人任何人勿令入若有問我者則言病矣唯唯彼守門人應諾淫女娑羅跋提四時淫女娑羅跋提胎熟而生男兒時淫女娑羅跋提命婢言將此童嬰盛于故箕持去棄塵堆中唯唯彼婢應諾淫女娑羅跋提將彼童嬰盛于故箕持去棄塵堆中爾時有名無畏王子清晨往奉事王見群鴉圍彼童嬰見而問眾人曰群鴉圍何耶王子圍童嬰也尚活耶王子尚活若爾將此童嬰抱我後宮與諸乳母令養育之王子唯唯彼眾人應諾無畏王子將彼童嬰送無畏王子後宮與諸乳母言請予養育言彼尚活故取名耆婆王子所養故取名童子五時耆婆童子不久得識分別時耆婆童子至無畏王子住處至而言無畏王子誰是我母耶誰是我父耶耆婆我不知汝母我汝父也我令養汝也時耆婆童子心生思念若無才技難住王家我當學才技爾時得叉尸羅國住名聞四方之醫者六時耆婆童子不告無畏王子即向得叉尸羅國而去順次到得叉尸羅國彼醫住處到而言彼醫師我欲學才技耆婆若爾且學時耆婆童子多學易學善受持所學不忘失時經七歲矣耆婆童子心生思念我多學易學善受持所學不忘失已經七歲尚不見此才技邊際何時見此技邊際耶七時耆婆童子到彼醫住處到而言彼醫師我多學易學善受持而所學不忘失已經七歲亦不見此才技邊際何時見此才技邊際耶耆婆若爾持鋤巡迴于得叉尸羅國四面一由旬時凡有所見而非藥者持來師唯唯耆婆童子應諾彼醫持鋤巡迴于得叉尸羅國四週一由旬不見非藥時耆婆童子至彼醫住處至而言彼醫師我于得叉尸羅國之四面一由旬巡迴所見無不是藥耆婆汝學已成以此足以立生計矣如是與耆婆童子少分川資八時耆婆童子持彼少分川資向王舍城去時耆婆童子途中至娑竭陀國彼少分川資罄盡時耆婆童子心生思念此道曠野水少食少無有川資不易往也我當覓路用川資爾時有娑竭陀國長者婦患七年頭痛甚多名聞四方大醫雖來皆不能癒但取多量黃金而去時耆婆童子入娑竭陀國問眾人言何人患病耶我將治其人師彼長者婦患七年頭痛師往治長者婦九時耆婆童子詣長者居士家詣而命守門人言守門人往言長者婦醫欲來見汝唯唯彼守門人應諾耆婆童子至長者婦住處至而言長者婦醫欲來見汝守門人如何醫者耶年少人守門人且止年少醫者于我何為名聞四方大醫多來亦不能治癒但多取黃金去也一時彼守門人至耆婆童子住處至而言耆婆童子師長者婦言守門人且止去也守門人往言長者婦醫言始初勿與一物若治癒時與汝所欲師唯唯彼守門人應諾耆婆童子至長者婦住處至而言長者婦醫言與汝所欲守門人若爾請醫來唯唯彼守門人應諾長者婦至耆婆童子住處至而言耆婆童子師長者婦喚汝一一時耆婆童子至長者婦住處至而診察長者婦病言長者婦曰須一合酥時長者婦令與耆婆童子一合酥時耆婆童子將彼一合酥與種種藥俱煮令長者婦仰臥牀上以灌鼻孔時灌入鼻孔彼酥從口流出時長者婦吐于受器而命婢言以綿拭取此酥一二時耆婆童子心生思念希有哉此主婦之慳吝也此應棄之酥以綿取之故也我雖多用高價藥矣彼女亦不與我些許酬報耶時長者婦觀察耆婆童子變異言耆婆童子曰師如何愁耶此處我心生思念希有哉耶師我等在家人知如此儉約此酥貴重既作奴僕塗足藥品又點燃燈師勿愁汝不失酬一三時耆婆童子將長者婦七年頭痛唯一次灌鼻而除去時長者婦癒矣與耆婆童子四千金其子曰我母癒矣與四千金其兒婦曰我姑癒矣與四千金長者居士曰我婦癒矣與四千金並奴婢車馬時耆婆童子持彼一萬六千金與奴婢車馬向王舍城而去順次至王舍城無畏王子住處至而言無畏王子曰王子此是我首次行醫所得有一萬六千金與奴婢車馬王子為養育費敬請受之耆婆且止為汝所有以住我後宮王子唯唯耆婆童子應諾無畏王子乃住無畏王子後宮一四爾時摩竭國洗尼瓶沙王患痔瘻衣塗血諸妃見之戲言王亦為經婦起月華王不久將生兒矣王羞愧時摩竭國洗尼瓶沙王言無畏王子無畏我患如此病衣塗血諸妃見我而戲言生兒矣無畏覓能治我醫者來大王此處有醫耆婆雖然年少但甚賢能彼將治大王無畏若爾命醫耆婆前來治我一五時無畏王子命耆婆童子言耆婆前往治王王子唯唯耆婆童子應諾無畏王子手中持藥至摩竭國洗尼瓶沙王住處至而言摩竭國洗尼瓶沙王大王看病時耆婆童子唯一塗摩竭國洗尼瓶沙王痔瘻除之時摩竭國洗尼瓶沙王癒矣遂令五百婦女先飾一切莊嚴次解下而令積集言耆婆童子曰耆婆此五百婦女一切莊嚴俱以歸汝大王且止念我職分耆婆若爾則侍我與後宮及佛為上首僧伽唯唯大王耆婆童子應諾摩竭國洗尼瓶沙王一六爾時王舍城有長者患七年頭痛甚多名聞四方大醫來皆不能癒但多取黃金而去其後更且諸醫拒絕一類醫言長者居士于第五日死矣一類醫言長者居士于第七日死矣時王舍城住人心生思念此長者居士于王于住人有大利益也然今諸醫拒絕一類醫言長者居士于第五日死矣一類醫言長者居士于第七日死矣此處王醫耆婆雖然年少甚是賢能我當請王醫耆婆治長者居士一七時王舍城住人至摩竭國洗尼瓶沙王住處至而言摩竭國洗尼瓶沙王大王彼長者居士于大王于住人皆有大利益也然今諸醫拒絕死矣願大王命醫耆婆治長者居士時摩竭國洗尼瓶沙王命耆婆童子曰耆婆往治長者居士大王唯唯耆婆童子應諾摩竭國洗尼瓶沙王至長者居士住處至而診察長者居士病言長者居士居士我若治癒汝者以何酬我耶師以一切財寶歸汝我將為汝奴一八長者汝能于七月間于一面脅臥否師我能于七月間一面脅臥長者汝能七月間于他面脅臥否師我能七月間于他面脅臥居士汝能于七月間仰臥否師我能于七月間仰臥時耆婆童子令長者居士臥于牀上而繫縛之剝其頭皮剝開頭蓋縫線出二蟲以示眾人言看此處有二小蟲一小而一大也言長者居士第五日死諸師乃見此大蟲于第五日長者居士腦漿即盡依腦漿盡長者居士乃死彼諸師善見也言長者居士第七日死諸師乃見此小蟲也于七日長者居士腦漿即盡依腦漿盡長者居士乃死彼諸師善見也如是合頭蓋縫線而縫頭皮塗敷藥一九時經七日長者居士言耆婆童子師我不能于七月間以一面脅臥居士汝豈非于應諾我師我能于七月間以一面脅臥耶師我誠應諾矣然我即死我亦不能于七月間以一面脅臥居士若爾于七月間以他面脅臥之時經七日長者居士言耆婆童子師我不能于七月間以他面脅臥居士汝豈非于應諾我師我能于七月間以他面脅臥耶師我誠應諾矣然我即死我亦不能于七月間以他面脅臥居士若爾于七月間仰臥之時經七日長者居士乃言耆婆童子師我不能于七月間仰臥居士汝豈非于應諾我師我能于七月間仰臥耶師我誠應諾矣然我即死我亦不能于七月間仰臥也二居士我若不如此說時即此期間亦不臥也我豫知長者居士三七日痊癒長者起汝痊癒矣憶所酬我師一切財寶以歸汝我將為汝奴也長者且止勿以一切財寶與我勿為我奴但與王百千金與我百千金時長者居士痊癒與王百千金與耆婆童子百千金二一爾時波羅㮈國有長者子嬉戲于輪上腸結腹內因此飲粥全不消化進食亦全不化大小便不通也因此彼消瘦醜弱色惡漸漸膚黃身露脈結時波羅㮈國長者心生思念我子患如此病飲粥全不消化進食亦全不化大小便不通因此彼消瘦醜弱色惡漸漸膚黃身露脈結我當往王舍城請王命醫耆婆為我子醫治時波羅㮈國長者往王舍城至摩竭國洗尼瓶沙王住處至而言摩竭國洗尼瓶沙王大王我子患如此之病粥身露脈結大王願命醫耆婆以治我子二二時摩竭國洗尼瓶沙王命耆婆童子言耆婆往治波羅㮈長者子大王唯唯耆婆童子應諾摩竭國洗尼瓶沙王往波羅㮈國至波羅㮈國長者子住處至而診察波羅㮈國長者子病令眾人退迴帳將之繫于柱令其婦立前剝割腹皮出腸結處以示婦言看此中汝夫病也因此飲粥全不消化進食亦全不化大小便不通因此彼消瘦醜弱色惡漸漸膚黃身露脈結也如是解腸結處復還腸于本處縫腹皮塗敷藥時波羅㮈國長者子不久痊癒時波羅㮈國長者念我子痊癒而與耆婆童子一萬六千金時耆婆童子取彼一萬六千金還王舍城二三爾時波羅殊提王患黃疸病多聞名四方大醫來亦不能癒但多取黃金去時波羅殊提王遣使言摩竭國洗尼瓶沙王我患如此病大王願彼醫耆婆前來治我時摩竭國洗尼瓶沙王命耆婆童子言耆婆往尉禪國治波羅殊提王大王唯唯耆婆童子應諾摩竭國洗尼瓶沙王往尉禪國至波羅殊提王住處至而診察波羅殊提王疾病言波羅殊提王二四大王我將煮酥大王飲此耶耆婆且止汝若得不用酥而為即為之我厭嫌酥也時耆婆童子心生思念此王有如此病不用酥不能癒我當煮有澀色有澀香有澀味酥時耆婆童子合煮種種藥並有澀色有澀香有澀味之酥時耆婆童子心生思念此王飲酥于消化時將吐之此王暴戾必令殺我時耆婆童子至波羅殊提王住處至而言波羅殊提王二五大王我等醫者如此須臾間拔根集藥大王願命象馬舍與諸門言令耆婆乘其所欲象馬而往令其由所欲門而往令其于所欲時而出令其于所欲時而入時波羅殊提王命車舍與諸門曰令耆婆乘其所欲車乘而往令其由所欲門而往令其于所欲時而出令其于所欲時而入爾時波羅殊提王有名跋陀羅婆提牝象日走五十由旬時耆婆童子供酥于波羅殊提王言大王飲澀時耆婆童子令波羅殊提王飲酥已往象舍乘牝象跋陀羅婆提而出都城二六時波羅殊提王飲彼酥消化而吐時波羅殊提王言人曰惡人耆婆令我飲酥汝等覓醫耆婆大王彼乘牝象跋陀羅婆提出都城去也爾時波羅殊提王有奴名烏日行六十由旬彼緣非人而受生也時波羅殊提王命奴烏言烏往言師王喚汝喚醫耆婆來烏彼諸醫有多幻凡彼給物盡皆勿受二七時奴烏當耆婆童子于途中憍賞彌作朝食時追及之時奴烏言耆婆童子師王喚汝烏我食間姑待烏汝亦食師且止王命我言烏彼諸醫有多幻凡彼給物盡皆勿受爾時耆婆童子取手中藥食阿摩勒果飲水時耆婆童