看護若不看護者墮惡作五諸比丘具足五分病者難看護謂行非隨病者于病不知量不用藥有利于欲看病者不如實告知病情病惡者言惡良者言良穩定者言穩定生起身受之痛苦猛利強硬辣辛不快非可意損命皆不能忍耐諸比丘具足如此五分病者難看護也六諸比丘具足五分病者易看護謂行隨宜病于病知量用藥有利于欲看病者如實告知病情病惡者言惡良者言良穩定者言穩定生起身受之痛苦猛利強硬辣辛不快非可意損命皆能忍耐諸比丘具足如此五分病者易看護七諸比丘具足五分之看護者不適看護病人謂不能作藥不知有效驗或無效驗與無效驗而不與有效驗為欲念看病無慈心而厭棄除大小便唾吐物不能時時說法而教示令病者慶喜諸比丘具足如此五分之看病者不適看護病者八諸比丘具足五分之看病者適看護病人謂能作藥知有效驗或無效驗不與無效驗而與有效驗不為欲念而有慈心看病不厭棄除大小便唾吐物能時時說法而教示令病者慶喜諸比丘具足如此五分之看病者適看護病人二七一爾時有二比丘在拘薩羅國途上彼等至一住處是處有一比丘患病時彼等心生思念世尊讚歎看病我等且看護此比丘彼等看護彼于彼等看護中彼死去時彼二比丘持彼比丘之鉢衣往舍衛城以此事白世尊世尊曰二諸比丘比丘若死其鉢衣主乃僧伽也然看病者大利益也諸比丘許僧伽以三衣及鉢與看病者諸比丘與時應如此為之彼看病比丘應至僧伽言某甲比丘死矣此處有彼之三衣及鉢聰明賢能比丘應告僧伽言諸大德請聽我言某甲比丘死矣此處有彼之三衣及鉢若僧伽機熟者僧伽以此三衣及鉢與諸看病者此乃表白諸大德請聽我言某甲比丘死矣此處有彼三衣及鉢僧伽以此三衣及鉢與諸看病者此三衣及鉢與諸看病者具壽聽者默然不聽者請言僧伽以此三衣及鉢與諸看病者具壽聽故默然我如此了知三爾時一沙彌死彼等以此事白世尊世尊曰諸比丘若沙彌死其鉢衣主乃僧伽也然看病者乃大利益也諸比丘許僧伽以衣及鉢與看病者諸比丘與時應如此為之彼看病比丘應到僧伽言某甲沙彌死此處有彼衣及鉢聰明賢能比丘應告僧伽言諸大德請聽我言某甲沙彌死此處有彼衣及鉢若僧伽機熟者僧伽以此衣鉢與諸看病者此乃表白諸大德請聽我言某甲沙彌死此處有彼衣及鉢僧伽以此衣及鉢與諸看病者此衣及鉢與諸看病者具壽聽者默然不聽者請言僧伽以此衣及鉢與諸看病者已具壽聽故默然我如此了知四爾時有一比丘與一沙彌一同看護病者于彼等看護中彼死矣時看病比丘心生思念如何分衣與看病沙彌耶彼等以此事白世尊世尊曰諸比丘許與看病沙彌等分五爾時有多器物及多資具之比丘死彼等以此事白世尊世尊曰諸比丘比丘若死其鉢衣之主乃僧伽也然看病者乃大利益也諸比丘許僧伽以三衣及鉢與看病者其中輕器物及輕資具應分于現前僧伽重器物及重資具屬于已來未來四方僧伽不得讓與亦不得分與二八一爾時有一比丘裸形詣世尊住處詣而白世尊言世尊以無數之方便讚歎少欲知足儉約頭陀行喜心損減發勤之人如此裸形依無數方便資于少欲知足儉約頭陀行喜心損減發勤世尊願許諸比丘裸形佛世尊呵責愚人不相合不隨順不相稱非沙門法不相應非事也愚人汝為何如外道行行裸形耶愚人如此非令未信者得信也呵責說法已告諸比丘曰諸比丘不得如外道行行裸形行者墮偷蘭遮二爾時有一比丘著拘賒草衣乃至著跋拘草衣乃至著板衣乃至著人髮欽婆羅衣乃至著馬尾欽婆羅衣乃至著角鵄翅衣乃至著鹿皮衣詣世尊住處詣而白世尊言世尊以無數方便讚歎少欲如此鹿皮衣依無數方便資于少欲世尊願許諸比丘著鹿皮衣佛世尊呵責曰非事也愚人汝如何著外道相鹿皮衣耶愚人如此非令未信得信者也呵責說法已告諸比丘曰諸比丘不得著外道相之鹿皮衣著者墮偷蘭遮三爾時有一比丘著阿拘草衣乃至著樹皮衣詣世尊住處詣而白世尊言世尊以無數方便讚歎少欲如此樹皮衣依無數方便資于少欲世尊願許諸比丘著樹皮衣佛世尊呵責曰非事也愚人汝如何著樹皮衣耶愚人如此非令未信者得信也呵責說法告諸比丘曰諸比丘不得著樹皮衣著者墮惡作二九一爾時六群比丘著深青衣著深黃衣著深紅衣著深茜色衣著深黑衣著深紅藍色衣著深落葉色衣著緣不用布片衣著長緣衣著緣有華衣著緣有蛇冠衣著襯衣著樹皮衣著頭巾眾人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得著深青衣不得著深黃衣不得著襯衣不得著樹皮不得著頭巾著者墮惡作三一爾時諸比丘住雨安居未得衣而去還俗死自言為沙彌自言捨學自言犯極罪自言發狂者自言心散亂自言受苦自言不見罪而被舉自言不懺悔罪而被舉自言不捨棄惡見而被舉自言黃門自言賊住者自言歸外道自言畜生自言殺母者自言殺父者自言殺阿羅漢者自言污比丘尼自言破和合僧者自言出佛身血者自言二根者彼等以此事白世尊世尊曰二諸比丘此處有比丘住雨安居未得衣而去若有相應代受者應與之諸比丘此處有比丘住雨安居未得衣而還俗死自言為沙彌自言捨學自言犯極罪衣主乃為僧伽也諸比丘此處有比丘住雨安居未得衣而自言發狂者自言不捨棄惡見而被舉有相應代受者應與之諸比丘此處有比丘住雨安居未得衣而自言黃門自言二根者衣主乃為僧伽也三諸比丘此處有比丘住雨安居已得衣但未受分配而去若有相應代受者應與之諸比丘此處有比丘住雨安居已得衣但未受分配而還俗自言犯極罪衣主乃僧伽也諸比丘此處有比丘住雨安居已得衣未受分配自言發狂者自言不捨棄惡見而被舉有相應代受者應與之諸比丘此處有比丘住雨安居已得衣未受分配自言黃門自言二根者衣主為僧伽也四諸比丘此處有諸比丘住雨安居未得衣而和合僧破矣是處眾人以奉施水與一黨以衣與他黨言我等施與僧伽此僧伽所有也諸比丘此處有諸比丘住雨安居未得衣而和合僧破矣是處眾人以奉施水與一黨而以衣與彼黨言我等施與僧伽此僧伽所有也五諸比丘此處有諸比丘住雨安居未得衣而和合僧破矣是處眾人以奉施水與一黨以衣與他黨言我等施與黨此為眾人言黨所有諸比丘此處有諸比丘住雨安居未得衣而和合僧破矣是處眾人以奉施水與一黨而以衣與其黨言我等施與黨此乃黨所有六諸比丘等此處有諸比丘住雨安居已得衣未分配而和合僧破矣應等分一切人三一一爾時具壽離越託一比丘與具壽舍利弗衣言此衣與長老時彼比丘于途中以具壽離越親厚意乃取彼衣時具壽離越遇具壽舍利弗問言我令與衣于長老彼衣到耶我不見彼衣時具壽離越言彼比丘我託具壽與長老衣彼衣在何處耶我于具壽作親厚意而取彼衣彼等以此事白世尊世尊曰二諸比丘此處有比丘託衣與一比丘言此衣與某甲彼于途中于所與人作親厚意而取之者為是善取于所受人作親厚意而取之者是為惡取諸比丘此處有比丘託衣與一比丘言此衣與某甲彼于途中于所受人作親厚意而取之者是為惡取于所與人作親厚意而取之者是為善取諸比丘此處有比丘與彼于途中聞所與人死若作彼死者衣受者乃為善受于所受人作親厚意而取之者乃為惡取諸比丘此處有比丘與彼于途中聞所受人死若作彼死者衣受者是為惡受于所與人作親厚意而取之者乃為善取諸比丘此處有比丘與彼于途中聞兩人俱死若作所與人死者衣受者是為善受若作所受人死者衣受者是為惡受三諸比丘此處有比丘託一比丘與衣言我以此衣與某甲彼于途中于所與人作親厚意而取之者是為惡取于所受人作親厚意而取之是為善取諸比丘此處有比丘與彼于途中于所受人作親厚意而取之者是為善取于所與人作親厚意而取之者是為惡取諸比丘此處有比丘與彼于途中聞所與人死矣若作彼死者衣受者是為惡受于所受人作親厚意而取之者是為善取比丘等此處有比丘與彼于途中聞所受人死矣若作彼死者衣受者是為善受于所與人作親善厚意而取者是為惡取諸比丘此處有比丘與彼于途中聞兩人俱死若作所與人死者之衣受者是為惡受若作所受人死者之衣受者是為善受三二一諸比丘有八事得衣謂境界施與有約施與告示施食而施與施與僧伽施與兩僧伽施與住雨安居僧伽指定施與施與于人也境界施與者應分配于界內所有比丘有約施與者多數住處均等利得即與一住處時亦與一切處告示施食而施與言我等于常恆食處施與施與僧伽者應分配于現前僧伽施與兩僧伽者比丘多而比丘尼縱唯一人亦應二等分比丘尼多而比丘縱唯一人亦應二等分若施與住雨安居僧伽者應分與其住處住雨安居比丘指定而施與者施與時施與現前者粥食嚼食衣臥具牀座醫藥施與人者言我以此衣施與某甲此犍度有九十二事攝頌曰見王舍城之商人毘舍離城之淫女還王舍城以告王沙羅跋提無畏子活命王子名耆婆往叉尸羅學大醫七年長病灌鼻治王之痔瘻塗藥癒我待後宮及佛僧王舍長者腸結病波羅殊提之大病不可思議用酥治任此職及尸毘衣身不調有冷濕疾三優鉢花三十痢癒願請受尸毘衣如來准許居士衣王舍地方多得衣外衣絲衣及氍氀半迦尸衣種種衣知足無論往不往先後相俱約受納庫不守令起多量騷擾如何分配與以自與及過多分應如何分配牛糞冷熱溢不知注入器盆地蟻中央壞一方堅粗非布片牟尼考量許三衣細分他過多生破四大洲與雨浴衣客遠行病看病藥常粥水浴衣殊妙過小瘡面布拘摩圓滿決定幾何止重緣不等線垂壞不能半多安陀林失念一人雨安居平時二兄弟舍城跋難陀又二腹病二種病者看病者裸拘賒跋拘草衣板衣髮欽婆羅衣馬尾及角鵄翅衣鹿皮衣阿拘草衣樹皮衣青黃赤茜黑紅藍色落葉色非布片緣長及華蛇頭緣襯樹皮衣頭巾未得而離去僧破矣與黨僧伽令與離越作親厚意取受衣之八事
