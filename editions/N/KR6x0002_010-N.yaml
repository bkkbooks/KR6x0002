body:
  text: 第十憍賞彌犍度一一爾時佛世尊住憍賞彌瞿師羅園時有一比丘犯罪彼雖見彼罪為罪餘諸比丘卻見彼罪不為罪爾後彼雖不見彼罪為罪餘諸比丘卻見彼罪為罪時諸比丘言彼比丘汝犯罪汝見此罪耶我無應見之罪時彼諸比丘得和合依不見罪而舉彼比丘二彼比丘多聞而通阿含持法持律持摩夷賢明聰敏有慧有恥有悔而好學時彼比丘到同見相親諸比丘處言此非罪此不成罪我無犯我非有犯我不受舉我非被舉作非法有過不應理之羯磨以舉我也汝等依律法為我朋黨彼比丘得同見相親諸比丘為朋黨亦遣使至地方同見相親諸比丘處言此非罪舉我也具壽等依律與法為我朋黨彼比丘亦使地方同見相親諸比丘為朋黨三時隨彼被舉比丘之諸比丘至舉罪諸比丘處至而言作舉罪之諸比丘此非罪此不成罪此比丘無犯此比丘非有犯此比丘不受舉此比丘非被舉乃作非法有過不應理之羯磨而舉也如此說已作舉罪之諸比丘言此成罪此非無罪此比丘有犯此比丘非無犯此比丘被舉此比丘非無受舉乃作如法無過應理之羯磨而舉也諸具壽勿隨順被舉比丘作舉罪之諸比丘如此說已隨彼被舉比丘之諸比丘仍隨順彼被舉比丘四時有一比丘詣世尊住處詣而敬禮世尊坐于一面坐于一面已彼比丘白世尊此處有一比丘犯罪彼雖見彼罪為罪餘諸比丘卻不見彼罪為罪爾後彼雖不見彼罪為罪餘諸比丘則見彼罪為罪時彼諸比丘同第十憍賞彌犍度一作舉罪之諸比丘如此說已隨被舉比丘之諸比丘仍隨順被舉比丘五時世尊曰比丘眾破矣比丘眾破矣即從座起至作舉罪之諸比丘處至已坐于所設座上世尊坐已告作舉罪之諸比丘曰諸比丘汝等勿思我等如是思我等如是思而于各各事舉比丘六諸比丘此處有比丘犯罪彼雖不見彼罪為罪餘諸比丘則見彼罪為罪諸比丘彼諸比丘對彼比丘若知此具壽多聞通阿含好學我等若依此比丘不見罪而舉者我等與此比丘不俱作布薩除此比丘而作布薩依此僧伽生起訴訟鬥諍爭論諍論令破僧伽令僧伽蒙塵垢令僧伽別住令僧伽別異諸比丘重視破僧事之諸比丘依此比丘不見罪不得舉七諸比丘此處有比丘犯罪彼若知舉者我等與此比丘不俱作自恣除此比丘而作自恣我等與此比丘不俱作僧伽羯磨除此比丘而作僧伽羯磨我等與此比丘不俱坐除此比丘而坐我等與此比丘不俱坐而飲粥除此比丘坐而飲粥我等與此比丘不俱坐于食堂除此比丘而坐于食堂我等與此比丘不俱住同一屋除此比丘而住同一屋我等與此比丘不俱隨長幼之序敬禮迎送合掌恭敬除此比丘而隨長幼之序敬禮恭敬依此僧伽生起訴訟鬥諍爭論諍論令破僧伽令僧伽蒙塵垢令僧伽別住令僧伽別異諸比丘重視破僧事之諸比丘依此比丘不見罪不得舉八時世尊于作舉罪之諸比丘說此義已即從座起至隨被舉比丘之諸比丘住處至而坐于所設座上世尊坐已告隨被舉比丘之諸比丘曰諸比丘汝等犯罪後勿思我等不犯以為不需懺悔罪諸比丘此處有比丘犯罪彼雖不見彼罪為罪餘諸比丘則見彼罪為罪諸比丘彼比丘對彼諸比丘若知此諸具壽多聞通阿含持法持律持摩夷賢明聰敏有慧有恥有悔而好學我或餘人無為貪欲瞋恚愚癡怖畏而墮邪惡事若彼諸比丘依我不見罪而舉者彼等與我不俱作布薩除我而作布薩與我不俱作自恣除我而作自恣除我而隨長幼之序敬禮迎送合掌恭敬依此僧伽生起訴訟鬥諍爭論諍論令破僧伽令僧伽蒙塵垢令僧伽別住令僧伽別異諸比丘重視破僧事之比丘信餘人應自說罪時世尊為隨被舉比丘之諸比丘說此義已即從座起而去九爾時隨被舉比丘之諸比丘于界內作布薩作僧伽羯磨作舉罪之諸比丘出于界外而作布薩作僧伽羯磨時一作舉罪之比丘詣世尊住處詣已敬禮世尊坐于一面坐于一面已彼比丘白世尊隨彼被舉比丘之諸比丘于界內作布薩作僧伽羯磨我等作舉罪之諸比丘出于界外而作布薩作僧伽羯磨比丘隨彼被舉比丘之諸比丘于界內作布薩作僧伽羯磨時若依如我所定之表白與唱說者則彼等之羯磨如法無過應理比丘汝等作舉罪之諸比丘于界內作布薩作僧伽羯磨時若依如我所定之表白與唱說者則汝等之羯磨如法無過應理一比丘此何故耶彼諸比丘與汝等不同住也汝等乃與彼等不同住也比丘不同住地有二自行不同住及僧伽和合而舉彼作不見不懺悔不捨羯磨比丘如此不同住地有二也比丘同住處地有二自行同住處及僧伽和合而先解舉彼作不見不懺悔不捨羯磨諸比丘如此同住處地有二也二一爾時諸比丘于食堂于舍內生訴訟生鬥諍行諍論作互相不隨順之身業語業以手搏撻眾人忿怒非難如何諸沙門釋子于食堂于舍內生以手搏撻耶諸比丘聞彼眾人之忿怒非難少欲諸比丘亦忿怒非難如何諸比丘于食堂于舍內生以手搏撻耶時彼諸比丘以此事白世尊世尊曰諸比丘真實否世尊真實也乃至呵責說法已告諸比丘曰諸比丘破僧伽行非法而有不和時應行思念我等作互相不隨順之身業語業以手搏撻而不得坐于座諸比丘僧伽破而如法行調和時可坐二爾時諸比丘于僧伽中生起訴訟行諍論互相以口傷害而住彼等不能滅彼諍事時有一比丘詣世尊住處詣已敬禮世尊坐于一面坐于一面已彼比丘白世尊此處諸比丘于僧伽中不能滅願世尊哀愍至彼諸比丘住處世尊默然而許時世尊至彼諸比丘住處至而坐于所設座上世尊坐已言彼諸比丘曰諸比丘且止勿訴訟勿鬥諍勿爭論勿諍論如此言已有一非法說比丘白世尊世尊法主請待時世尊請具現法樂住住于安穩此訴訟鬥諍爭論諍論乃我等事也世尊再次告彼諸比丘曰諸比丘且止勿諍論彼非法說比丘再次白世尊世尊法主請待時乃我等事也時世尊告諸比丘曰三諸比丘乃往過去世波羅㮈國有迦尸王名梵施富而財多資多兵多車多國土大而庫豐足有拘薩羅王名長壽貧而財少資少兵少車少國土少庫不豐足諸比丘時迦尸王梵施以整四部兵伐拘薩羅王長壽諸比丘拘薩羅王長壽聞迦尸王梵施整四部兵來伐我諸比丘時拘薩羅王長壽心生思念迦尸王梵施富庫豐足我貧而庫不豐足我不能與迦尸王梵施一戰我當先逃出都城諸比丘時拘薩羅王長壽與第一夫人俱先逃出都城諸比丘時迦尸王梵施侵奪拘薩羅王長壽之兵車國土藏庫而治之諸比丘時拘薩羅王長壽與第一夫人俱向波羅㮈國而去順次至波羅㮈國諸比丘此拘薩羅王長壽與第一夫人俱臨波羅㮈城于一處扮為遊行梵志住于陶師之家四諸比丘時拘薩羅王長壽之第一夫人不久有娠彼女心生欲念欲見日初出時四部兵整列全著武具立于殊勝之地欲飲洗刀水諸比丘時拘薩羅王長壽之第一夫人言拘薩羅王長壽曰大王我有娠矣我生欲念欲見日初飲妃我等困窮如何得四部兵整列著武具立于殊勝之地耶如何得洗刀水耶大王我若不得者即死五諸比丘時迦尸王梵施之梵志國師乃拘薩羅王長壽之友諸比丘時拘薩羅王長壽至迦尸王梵施之梵志國師住處至而言迦尸王梵施之梵志國師曰汝友之妃有娠彼女心生欲念欲見日初飲大王若爾我等見妃諸比丘時拘薩羅王長壽之第一夫人至迦尸王梵施之梵志國師住處諸比丘迦尸王梵施之梵志國師見拘薩羅王長壽之第一夫人從遠處而來見而即從座起偏袒上衣合掌以揖拘薩羅王長壽之妃三稱言曰拘薩羅王有姙拘薩羅王有姙又言妃安心日出時汝將見四部兵整列全著武具立于殊勝之地汝將飲洗刀之水六諸比丘時迦尸王梵施之梵志國師乃至迦尸王梵施住處至而言迦尸王梵施大王有如此相明日日初出時以四部兵整列全著武具立于殊勝之地並令洗刀諸比丘時迦尸王梵施命眾人言如梵志國師之言而行諸比丘拘薩羅王長壽之第一夫人于日出時得見四部兵整列全著武具立于殊勝之地並得飲洗刀之水諸比丘時拘薩羅王長壽之第一夫人其胎熟而生男兒名為長生諸比丘時長生王子不久即得分別七諸比丘時拘薩羅王長壽心生思念彼迦尸王梵施作多害于我等彼奪我等之兵車國土藏庫彼若見我等三人將盡殺之我當使長生王子住于城外諸比丘時拘薩羅王長壽使長生王子住于城外諸比丘時長生王子住于城外不久學得一切技藝八諸比丘爾時有拘薩羅王長壽之昔日剃髮師而後屬迦尸王梵施者諸比丘拘薩羅王長壽之昔日剃髮師見拘薩羅王長壽與第一夫人俱近波羅㮈城一處扮為遊行梵志住于陶師家見而至迦尸王梵施住處至而言迦尸王梵施曰大王拘薩羅王長壽與第一夫人俱于近波羅㮈城一處扮為遊行梵志住于陶師之家九諸比丘時迦尸王梵施命眾人言捕拘薩羅王長壽與彼第一夫人來大王唯唯彼眾人應諾迦尸王梵施捕拘薩羅王長壽與彼第一夫人諸比丘時迦尸王梵施命人言將拘薩羅王長壽與彼第一夫人俱以堅繩縛其手于後剃其頭髮打惡聲鼓由道路至道路由四衢道至四衢道巡迴而出南門于城南方分為四分而棄四片于四方大王唯唯彼眾人應諾迦尸王梵施將拘薩羅王長壽與彼第一夫人俱以堅繩縛其手于後剃其頭髮打惡聲鼓由道路至道路由四衢道至四衢道來往巡迴一諸比丘時長生王子心生思念我久不見父母我當往見父母諸比丘時長生王子入波羅㮈城見父母俱為堅繩縛其手于後頭髮剃落于惡鼓聲中由道路至道路由四衢道至四衢道來往巡迴見而至父母處諸比丘拘薩羅王長壽見長生王子從遠方來見而言長生王子曰長生勿見長勿見短長生勿以怨息怨長生以德息怨也一一諸比丘如此言時眾人言拘薩羅王長壽曰此拘薩羅王長壽乃發狂而妄語誰是彼之長生耶其語向誰言長生勿見長勿見短長生勿以怨息怨以德息怨也我非發狂而妄語智者了悟諸比丘再次乃至諸比丘三次拘薩羅王長壽言長生王子長生息怨也諸比丘三次眾人言拘薩羅王長壽拘薩羅王悟諸比丘時眾人乃令拘薩羅王長壽與第一夫人俱由道路至道路由四衢道至四衢道來往巡迴由南門出于城南方分為四分將四片棄于四方置兵而去一二諸比丘時長生王子持酒入波羅㮈城而令兵眾飲之彼等醉倒之時集薪作火堆將父母之骸載于火堆之上而點火合掌巡迴火堆右繞三次諸比丘其時迦尸王梵施乃登殊勝樓台上層諸比丘迦尸王梵施見長生王子合掌而巡迴火堆右繞三次見而心生思念此人必是拘薩羅王長壽之親族緣者無人可告我我損失也一三諸比丘時長生王子往林間盡情號哭後拭淚入波羅㮈城往近後宮之象廄言象師曰師我欲學技藝童子若爾且學諸比丘時長生王子夜分凌晨時起身于象廄以美妙音聲歌而彈琴諸比丘迦尸王梵施于夜分凌晨時聞象廄以美妙音聲歌而彈琴聞而問人言夜分凌晨時起于象廄以美妙音聲歌而彈琴者誰耶一四大王有某甲象師之弟子童子夜分凌晨時起于象廄以美妙音聲歌而彈琴若爾喚彼童子大王唯唯彼眾人應諾迦尸王梵施而喚長生童子至童子汝夜分凌晨時起于象廄以美妙音聲歌而彈琴耶大王然童子若爾即歌彈琴大王唯唯長生王子應諾迦尸王梵施欲得愛顧而以美妙音聲歌且彈琴諸比丘時迦尸王梵施言長生王子曰童子侍從我大王唯唯長生王子應諾迦尸王梵施諸比丘時長生王子較迦尸王梵施先起後睡應一切命行適意語可愛諸比丘時迦尸王梵施不久令長生王子于宮內任職一五諸比丘時迦尸王梵施言長生王子曰童子駕車我等出獵大王唯唯長生王子應諾迦尸王梵施駕車言迦尸王梵施曰大王將駕車請知時諸比丘時迦尸王梵施乘車長生王子驅車隨驅兵眾及車乘終于各往異處諸比丘時迦尸王梵施往遠處後言長生王子童子停車我甚疲憊欲睡也大王唯唯長生王子應諾迦尸王梵施于地結跏趺坐諸比丘時迦尸王梵施以長生王子之膝為枕而臥彼甚疲憊不須臾已眠矣一六諸比丘時長生王子心生思念此迦尸王梵施作多害于我等彼奪我等之兵車國土藏庫彼殺我父母今乃我報怨之時也如是由鞘拔劍諸比丘時長生王子心生思念父臨死言我曰長生勿見長勿見短長生勿以怨息怨長生以德息怨違忤父語不正也如是納劍于鞘諸比丘再次長生王子心生思念此迦尸王拔劍諸比丘二次長生王子心生思念父違忤父語不正也如是復納劍于鞘諸比丘三次納諸比丘時迦尸王梵施怖畏驚愕恐懼恐怖而起諸比丘時長生王子言迦尸王梵施曰大王汝如何怖畏而起耶童子夢拘薩羅王長壽之兒長生王子以劍襲我故我怖畏驚愕恐懼恐怖而起一七諸比丘時長生王子左手撮迦尸王梵施之頭右手拔劍言迦尸王梵施曰大王我拘薩羅王長壽之兒長生王子也汝作多害我等汝奪我等之兵車國土藏庫汝殺我父母今乃我報怨時也諸比丘時迦尸王梵施以頭面禮長生王子足言長生王子曰長生赦我命長生赦我命如何得言我赦大王之命耶唯有大王赦我命也長生若爾汝赦我命我亦赦汝命諸比丘時迦尸王梵施及長生王子互相赦命誓不作害諸比丘時迦尸王梵施言長生王子曰長生駕車我等往焉大王唯唯長生王子應諾迦尸王梵施駕車而言迦尸王梵施曰大王將駕車請知時諸比丘時迦尸王梵施乘車長生王子驅車隨驅不久而與兵眾會合一八諸比丘時迦尸王梵施入波羅㮈城令集會諸大臣大官曰汝等若見拘薩羅王長壽之兒長生王子將如何為之耶或言大王我等截其手大王我等截其足大王我等截其手足大王我等截其耳大王我等截其鼻大王我等截其耳鼻大王我等截其頭此乃拘薩羅王長壽之兒長生王子也于彼一切皆不得作彼赦我命我赦彼命也一九諸比丘時迦尸王梵施言長生王子曰長生汝父臨死言長生勿見長勿見短長生勿以怨息怨長生以德息怨汝父以何意趣而言此耶大王我父臨死言勿見長是言勿長怨也大王我父臨死言此為勿見長也大王我父臨死言勿見短者是言勿速與友不和也大王我父臨死言此為勿見短也大王我父臨死言長生勿以怨息怨長生以德息怨大王殺我父母我若奪大王之命欲大王得利之眾人將奪我命欲我得利之眾人將奪彼等之命如此者以怨不得息怨也今大王赦我之命我赦大王之命如此以德息怨也大王我父臨死諄諄言此長生以怨以德息怨二諸比丘時迦尸王梵施言希有也未曾有也此長生王子乃賢明也何以故于父略說能廣解其義故也屬父之兵車國土藏庫還之而與己女諸比丘彼于取杖持刀之王尚有如此忍辱慈心諸比丘于此處汝等于如此所善說之法與律出家者應善持忍辱慈心世尊三次告比丘曰諸比丘且止勿訴訟勿鬥諍勿爭論勿諍論彼非法比丘三次白世尊言世尊法主請待時世尊請具現法樂住請住安穩我等行此訴訟鬥諍爭論諍論是我等事時世尊曰此等愚人蒙昧不易教誡即從座起而去長生誦品終三一時世尊于早晨著下裳持鉢衣為乞食入憍賞彌城行乞食食後由乞食還來收藏臥具牀座持鉢衣立于僧伽中說如此偈曰人悉出大聲不覺自己愚破壞僧伽時餘事更不思以言語為境論說似賢迷如何懸口河就裡不自知罵搏敗掠奪執念怨不息罵搏敗掠奪不執怨自息此處怨報怨終于怨不息以德使怨息是法不容易我等于此處自制餘不悟悟者則爭息碎骨而斷命奪牛馬財盡彼等雖國破尚且有和合如何汝等莫若有智善住賢明之同行得以交為友克一切困難歡喜與正念且如是俱行若無智善住賢明之同行不得交為友則卓爾獨行如敗棄國王如森林中象獨行實殊勝不應友愚人獨行勿作惡如象安穩林四一時世尊立于僧伽中說如此偈已往婆羅樓羅村爾時具壽婆咎住婆羅樓羅村具壽婆咎見世尊從遠方來見而設牀座置洗足水足台足布迎而取鉢衣世尊坐于所設座上坐而洗足具壽婆咎敬禮世尊坐于一面坐于一面已世尊言具壽婆咎曰比丘忍否足否為乞食不疲倦否世尊忍世尊足我為乞食不疲倦時世尊說法教示具壽婆咎令之慶喜即從座起往般那蔓闍寺林而去二爾時具壽阿那律陀具壽難提具壽金毘羅住般那蔓闍寺林守林人見世尊從遠方來見而白世尊言沙門勿入此林此處有三族姓子自愛而住請勿擾之具壽阿那律陀聞守林人語世尊聞而言守林人曰守林人勿止世尊我等之師世尊來臨具壽阿那律陀至具壽難提具壽金毘羅住處至而言具壽難提與具壽金毘羅曰諸具壽諸具壽來我等之師世尊來臨矣三時具壽阿那律陀具壽難提具壽金毘羅俱迎世尊一人取世尊鉢衣一人設牀座一人置洗足水足台足布世尊坐于所設座上坐而洗足彼諸具壽敬禮世尊坐于一面坐于一面時世尊告具壽阿那律陀曰阿那律陀忍否足否為乞食疲倦否世尊忍世尊足我等為乞食不疲倦阿那律陀汝等和合相喜無諍有如水乳互以愛眼相視而住否我等實和合相喜無諍有如水乳互以愛眼相視而住阿那律陀汝等如何和合相喜視而住耶四此處我生思念我與如此同行者俱住我得利也我善利也如是我于此諸具壽于顯于隱為慈身行為慈語行于顯于隱為慈意行我生思念我當棄己之心應依此諸具壽之心而轉如是我棄己之心依此諸具壽之心而轉雖身異而心一也具壽難提及具壽金毘羅亦白世尊言我亦生思念而心一也如此我等和合相喜無諍有如水乳互以愛眼相視而住也五阿那律陀汝等不放逸正勤專念而住否我等實不放逸正勤專念而住阿那律陀汝等如何不放逸正勤專念而住耶此處我等之中往村乞食先還者即設牀座置洗足水足台足布我等因此不用語言我等每五日俱坐終夜說法如此我等不放逸正勤專念而住也六時世尊說法而教示具壽阿那律陀具壽難提具壽金毘羅令之慶喜從座而起向波羅聚落遊行順次遊行到波羅聚落于此世尊住波羅聚落護寺林之賢娑羅樹下時世尊靜居宴默心生如此思念我前常為訴訟鬥諍諍論喧吵于僧伽起諍事之彼憍賞彌諸比丘所惱安樂無住今離去常起訴訟諍事之彼憍賞彌諸比丘離而無伴唯有一人而安樂安穩住有一大象為諸牡象幼象子象所惱而住自食缺頂之草彼折之枝為他眾象所食飲濁水沈于水渡水時眾象摩觸身而行時彼大象心生思念我為諸牡象牝象幼象子象所惱而住自食缺頂之草我所折之枝為其他眾象所食飲濁水沈于水渡水時眾象摩觸身而行我當離群應唯一人住七時彼大象離群詣波羅聚落護寺林之賢娑羅樹下世尊住處詣已以長鼻為世尊供飲食除草時彼大象心生思念我前為諸牡象牝象幼象子象所惱安樂無住自食缺頂之草我所折之枝為其他眾象所食飲濁水沈于水渡水時眾象摩觸吾身而行今離牡象牝象幼象子象而無伴唯一人而安樂安穩住時世尊知自遠離又以心知彼大象之心所思念此時自唱頌曰如此之人龍長鼻之象龍其心俱相等獨樂于林中五一爾時世尊于隨意間住波羅聚落後向舍衛城遊行次第遊行至舍衛城于此世尊住舍衛城祇樹給孤獨園時憍賞彌諸優婆塞言此等憍賞彌諸比丘于我等多作不利世尊為彼等所惱而去我等對憍賞彌之諸比丘不敬禮不迎送不作合掌恭敬不尊敬不尊重不奉事不供養雖來亦不與施食我等如此不尊敬不尊重不奉事不供養時彼等不受尊敬而去或還俗或與世尊和合二時憍賞彌諸優婆塞對憍賞彌之諸比丘不敬禮不迎送不作合掌恭敬不尊敬不尊重不奉事不供養雖來亦不與施食時憍賞彌諸優婆塞不尊敬憍賞彌之諸比丘不受尊敬而言我等往舍衛城世尊處令滅此諍事時憍賞彌諸比丘收藏臥座牀具持鉢衣往舍衛城三具壽舍利弗聞言于僧伽常行訴訟諍事之彼憍賞彌諸比丘來舍衛城時具壽舍利弗詣世尊住處詣已敬禮世尊坐一面坐一面已具壽舍利弗白世尊言于僧伽常行訴訟諍事之彼憍賞彌諸比丘來舍衛城我于諸比丘應如何為之耶舍利弗汝隨法以處之我如何可知法與非法耶四舍利弗依十八事可知非法說者舍利弗此處有比丘非法說為法法說為非法非律說為律律說為非律非如來之所說所言說為如來之所說所言如來之所說所言說為非如來之所說所言非如來之常所行法說為如來之常所行法如來之常所行法說為非如來之常所行法非如來所制說為如來之所制如來之所制說為非如來之所制無罪說為罪罪說為無罪輕罪說為重罪重罪說為輕罪有餘罪說為無餘罪無餘罪說為有餘罪粗罪說為非粗罪非粗罪說為粗罪舍利弗如此依十八事可知非法說者五舍利弗依十八事可知如法說者舍利弗此處有比丘非法說為非法法說為法非律律非如來之所說所言如來之所說所言非如來之常所行法如來之常所行法非如來之所制如來之所制無罪罪輕罪重罪有餘罪無餘罪粗罪非粗罪說為非粗罪舍利弗如此依十八事可知如法說者六具壽摩訶目犍連聞乃至具壽摩訶迦葉聞具壽摩訶迦旃延具壽摩訶拘絺羅具壽摩訶劫賓那具壽摩訶周那具壽阿那律陀具壽離越具壽優波離具壽阿難具壽羅睺羅聞同第十憍賞彌犍度五三五可知如法說者七時摩訶波闍波提瞿曇彌聞常訴訟彼憍賞彌諸比丘來舍衛城時摩訶波闍波提瞿曇彌詣世尊住處詣而敬禮世尊立于一面立于一面已摩訶波闍波提瞿曇彌白世尊言常訴訟我于彼諸比丘應如何為之耶瞿曇彌汝由二部聞法由二部聞法以其中如法說諸比丘之見忍喜執為所喜凡比丘尼眾由比丘眾所受者應受如法說者八給孤獨居士聞常訴訟彼憍賞彌諸比丘來舍衛城時給孤獨居士詣世尊住處詣而敬禮世尊坐于一面坐一面已給孤獨居士白世尊言常訴訟我于彼比丘等應如何為之耶居士汝與二部布施與二部布施由二部聞法由二部聞法以其中如法諸比丘之見忍喜執為所喜九毘舍佉鹿母聞常訴訟彼憍賞彌諸比丘來舍衛城時毘舍佉鹿母詣世尊住處詣而敬禮世尊坐于一面坐于一面已毘舍佉鹿母白世尊言常訴訟我于彼比丘等應如何為之耶毘舍佉汝與二部布施為所喜一時憍賞彌諸比丘次第到舍衛城時具壽舍利弗詣世尊在處詣而敬禮世尊坐于一面坐一面已具壽舍利弗白世尊言于僧伽常行訴訟諍事之彼憍賞彌諸比丘到舍衛城彼諸比丘之座臥處應如何為之耶舍利弗應分離與座臥處若無分離者應如何為之耶應部分分離而與之舍利弗但無論如何絕不可無上座比丘之座臥處若無者墮惡作衣食應如何為之耶舍利弗衣食一切人應等分之一一時彼被舉比丘觀察法與律而生思念此是罪此非無罪我有犯我非無犯我被舉我非不受舉我依如法無過應理之羯磨而被舉時彼被舉比丘至隨被舉比丘之諸比丘在處至而言隨被舉比丘之諸比丘曰此是罪此非無罪應理之羯磨而被舉然與我解羯磨一二時彼隨被舉比丘之諸比丘與被舉比丘俱詣世尊住處詣而敬禮世尊坐于一面坐一面已彼諸比丘白世尊言此被舉比丘言此是罪此非無罪與解羯磨應如何為之耶諸比丘此是罪此非無罪此比丘有犯此比丘非無犯此比丘被舉此比丘非不受舉此比丘依如法無過應理之羯磨而受舉諸比丘此比丘犯被舉見罪故諸比丘應與此比丘羯磨一三時彼隨被舉比丘之諸比丘與被舉比丘解羯磨至作舉罪之諸比丘住處至而言作舉罪之諸比丘曰依彼事于僧伽生起訴訟鬥諍爭論諍論令破僧伽令僧伽蒙塵垢令僧伽別住令僧伽別異此比丘有犯被舉但見罪受解羯磨我等為滅彼事作僧伽和合時彼作舉罪之諸比丘詣世尊住處詣已敬禮世尊坐于一面坐一面已彼諸比丘白世尊言彼隨被舉比丘之諸比丘言依彼事作僧伽和合應如何為之耶一四諸比丘彼比丘有犯被舉見罪受解羯磨故諸比丘僧伽為滅彼事應作僧伽和合諸比丘應如此作應集會眾于一處病者非病者亦俱也任何人皆不得與清淨欲集會已聰明賢能比丘應告僧伽言諸大德請聽我言依彼事于僧伽生起訴訟鬥諍爭論諍論令破僧伽令僧伽蒙塵垢令僧伽別住令僧伽別異此比丘有犯被舉但見罪受解羯磨已若僧伽機熟者僧伽為滅彼事作僧伽和合此為表白諸大德請聽我言依彼事受解羯磨已為滅彼事作僧伽和合具壽聽者默然不聽者請言僧伽為滅彼事作僧伽和合滅僧伽之塵垢滅僧伽之破壞具壽聽故默然我如此了知應即時作布薩誦波羅提木叉六一時具壽優波離詣世尊住處詣而敬禮世尊坐于一面坐一面已具壽優波離白世尊言若有事僧伽因訴訟令僧伽別異時僧伽不決斷彼事由無根至根而作僧伽和合此如法僧伽和合耶優波離若有事僧伽不決斷彼事由無根至根作僧伽和合者優波離此非法僧伽和合也若有事僧伽決斷彼事由根至根作僧伽和合此如法僧伽和合耶優波離若有事僧伽決斷彼事由根至根作僧伽和合者優波離此如法僧伽和合也二僧伽和合有幾何耶優波離僧伽和合有二優波離有義缺而文備之僧伽和合優波離有義備而文備之僧伽和合優波離何為義缺而文備之僧伽和合耶優波離若有事僧伽因訴訟令僧伽別異時僧伽不決斷彼事由無根至根作僧伽和合優波離此名為義缺而文備之僧伽和合優波離何為義備文備之僧伽和合耶優波離若有事僧伽因訴訟令僧伽別異時僧伽決斷彼事由根至根作僧伽和合優波離此名為義備文備之僧伽和合優波離如此僧伽和合有二也三時具壽優波離即從座起偏袒上衣于世尊住處合掌奉世尊說偈曰于僧伽事議義生與決斷大須如何人如何比丘眾以護持法耶第一戒無過行時有思慮克制護諸根怨敵不能呵如法無難處住此戒清淨無畏得能說在會眾中住不搖亦不懼率爾而言說而無失義者受問會眾中不臆亦不惑應時于記答賢者說適語歡喜智眾會敬上座比丘以達自師說知量善當論巧于破怨敵怨敵墮負處眾人乃得智持自說無害不止于問答使命受堪言如說處僧事由比丘眾遣如其語為之而不念我為犯事罪及滅比丘比丘尼兩毘崩伽通且知罪及滅何行不受擯依何事而擯處己解羯磨如是為是知作毘崩伽師恭敬上下座及中座比丘利眾成賢者如此之比丘能護持正法此攝頌曰最勝之勝者在于憍賞彌見罪有異論應舉且說罪內界與彼處五一與具足並波羅聚落以及舍衛城尊者舍利弗乃至拘律陀迦葉迦旃延絺羅劫賓那周那阿那律離越優波離阿難羅睺羅給孤瞿曇彌毘舍佉鹿母臥座處分離衣食均等與集眾消訟事淨欲不得與優波離所問于戒無愧者勝者教和合
