body:
  text: 第四自恣犍度一一爾時佛世尊在舍衛城祇樹給孤獨園爾時有多數同見相親諸比丘于拘薩羅國一住處入雨安居時彼諸比丘心生思念我等以何方便和合歡喜而無相爭安樂住雨安居于食得無困疲耶二時彼諸比丘心生思念我等不共談話不問訊先于村里乞食還者設牀座調洗足水足台足布調洗殘食器具調飲食三後于村里乞食還者若有餘食欲者食之不欲者即棄于無青草處或沈于無蟲類水中彼除牀座收洗足水足台足布收洗殘食器具掃淨食堂四若見水瓶食瓶澡盆水空其人應調備之若彼不能者以手招其他比丘備之但以姿勢無須語言若如此者我等和合歡喜無爭安樂以住雨安居于食得無困疲五時彼諸比丘不共談話不相問訊從村里乞食先還者即設牀座調洗足水足台足布調洗殘食器具調飲食六後于村里乞食還者若有餘食欲者食之不欲者即棄于無青草處或沈于無蟲類水中彼除牀座收洗足水足台足布收洗殘食器具掃淨食堂七若見水瓶食瓶澡盆水空其人即備之若彼不能者以手招其他比丘備之但以姿勢無須語言八時出雨安居諸比丘詣拜世尊乃為常法時彼諸比丘三月後出雨安居收藏臥具牀座持衣鉢往舍衛城順次詣舍衛城祇樹給孤獨園世尊住處詣而敬禮世尊坐于一面時佛世尊與客比丘互相致問乃為常法九時世尊告彼諸比丘曰諸比丘堪忍否滿足否和合歡喜無爭安樂以住雨安居不為食所困疲否世尊堪忍世尊滿足我等和合歡喜無爭安樂住雨安居未曾為食所困疲一諸如來有知而故問知而不問知時而問知時而不問諸如來有利而問無利而不問諸如來乃毀無利之橋者也佛世尊依二相以問諸比丘或說法或為聲聞定學處時世尊告彼諸比丘曰諸比丘汝等如何和合歡喜無爭安樂住雨安居不為食所困疲耶一一此處我等多數同見相親諸比丘于拘薩羅國一住處入雨安居時我等心生思念我等依何方便得和合歡喜無爭安樂住雨安居不為食所困疲我等心生思念我等若如此者我等得和合歡喜無爭安樂住雨安居不為食所困疲也時我等不共談話不相問訊從村里乞食先還者設牀座洗足水無須言語如此我等和合歡喜無爭安樂住雨安居不為食所困疲一二時世尊告諸比丘曰諸比丘此諸愚人非安樂住而稱安樂住諸比丘此諸愚人住畜獸共住而稱安樂住諸比丘此諸愚人白羊共住而稱安樂住諸比丘此諸愚人住放逸共住而稱安樂住諸比丘如何此諸愚人持外道所持啞戒耶一三諸比丘此令未信者不信乃至呵責說法已告諸比丘曰諸比丘不得持外道所持啞戒持者墮惡作諸比丘住雨安居比丘可依三事行自恣三事者見聞疑也依此汝等互相隨順免罪尊律一四諸比丘行自恣者應如此行聰明賢能比丘告僧伽言諸大德請聽我言今日行自恣若僧伽機熟者僧伽應行自恣長老比丘應偏袒上衣蹲踞合掌而言我以見聞疑向僧伽行自恣諸具壽以哀愍我而語若見我罪者即除之二次三次我于見聞疑向僧伽行自恣諸具壽哀愍我而語若見我罪者即除之新參比丘應偏袒上衣蹲踞合掌而言我以見聞疑向僧伽行自恣二次三次若見我罪者即除之二一爾時六群比丘于諸長老比丘蹲踞以行自恣時坐于座上少欲諸比丘忿怒非難如何六群比丘于諸長老比丘蹲踞行自恣時坐于座上耶時彼諸比丘以此事白世尊世尊曰諸比丘六群比丘于長老坐于座上真實耶世尊真實也佛世尊呵責諸比丘如何彼諸愚人于長老坐于座上耶諸比丘此令未信者不信乃至呵責說法告諸比丘曰諸比丘長老比丘蹲踞行自恣時不得坐于座上坐者墮惡作諸比丘許一切人蹲踞行自恣二爾時有一老羸比丘于一切人行自恣間蹲踞而待絕氣而倒彼等以此事白世尊世尊曰諸比丘行自恣間蹲踞自恣終時可坐于座三一時諸比丘心生思念自恣日有幾何耶彼等以此事白世尊世尊曰諸比丘自恣有二日十四日與十五日也諸比丘如此自恣有二日二時諸比丘心生思念自恣羯磨有幾何耶彼等以此事白世尊世尊曰諸比丘有四自恣羯磨非法別眾自恣羯磨參照第二布薩犍度一四二三應學三時世尊告諸比丘曰諸比丘集會僧伽行自恣如此說時有一比丘白有病比丘不來世尊曰諸比丘許與病比丘自恣諸比丘與自恣者應如此行彼病比丘應至一比丘處偏袒上衣蹲踞合掌而唱言與我自恣我取自恣我行自恣如此以身告之以語告之以身語告之即與自恣不以身告不以語告不以身語告非與自恣四若如此得者善若不得者諸比丘應將病比丘以牀或小牀接至僧伽中行自恣諸比丘若看護病患諸比丘心生思念參照第二布薩犍度二二二僧伽應往彼處行自恣但于別眾不得行自恣若行自恣者墮惡作五諸比丘若持自恣者受自恣同第二布薩犍度二二三四但清淨換為自恣持自恣者墮惡作諸比丘于自恣日若僧伽有事許與自恣者與清淨欲此為僧事四一爾時有一比丘于自恣日為親族所羈留彼等以此事白世尊世尊曰諸比丘此處有比丘于自恣日為親族所羈留諸比丘應言彼親族諸具壽此比丘行自恣間請須臾免此比丘二若如此得者善若不得者同第二布薩犍度二四二但將清淨布薩改為自恣若行自恣者墮惡作三諸比丘此處有比丘于自恣日為國王所逮捕為盜賊所逮捕為惡人所逮捕為怨敵比丘所逮捕諸比丘應向彼怨敵比丘言于別眾不得行自恣若行自恣者墮惡作五一爾時于一住處自恣之日住五比丘時彼諸比丘心生思念世尊規定僧伽應行自恣而我等僅五人我等如何行自恣耶彼等以此事白世尊世尊曰諸比丘許五人為僧伽行自恣二爾時于一住處自恣之日住四比丘時彼諸比丘心生思念世尊許五人為僧伽以行自恣而我等四人我等如何行自恣耶彼等以此事白世尊世尊曰諸比丘許四人互相行自恣三諸比丘行自恣者應如此行聰明賢能比丘應告彼諸比丘曰諸具壽請聽我言今日自恣若諸具壽機熟者我等互相行自恣長老比丘偏袒上衣蹲踞合掌應言彼諸比丘曰我以見聞疑向諸具壽行自恣諸具壽哀愍我而語若見我罪者即除之二次三次除之新參比丘偏袒上衣蹲踞合掌應言彼諸比丘曰我以見聞疑向諸具壽行自恣二次三次除之四爾時于一住處自恣之日住三比丘時彼諸比丘心生思念世尊許五人為僧伽可行自恣四人者可互相行自恣而我等僅三人我等應如何行自恣耶彼等以此事白世尊世尊曰諸比丘許三人可互相行自恣諸比丘行自恣時應如此為之聰明同第四自恣犍度五三除之五爾時于一住處自恣之日住二比丘時彼諸比丘心生思念世尊許五人為僧伽可行自恣四人者可互相行自恣三人者可互相行自恣而我等二人我等如何行自恣耶彼等以此事白世尊世尊曰諸比丘許二人可互相行自恣六諸比丘行自恣時應如此為之長老比丘應偏袒上衣蹲踞合掌言新參比丘曰我以見聞疑向具壽行自恣具壽哀愍我而語見我罪者除之二次三次除之新參比丘應上衣合掌言長老比丘曰我以見聞疑向具壽行自恣二次三次除之七爾時于一住處自恣之日住一比丘時彼比丘心生思念世尊許五人可為僧伽以行自恣四人者可互相行自恣三人者可互相行自恣二人者可互相行自恣而我僅一人我應如何行自恣耶彼以此事白世尊世尊曰八諸比丘于一住處自恣之日住一比丘諸比丘彼比丘應淨諸比丘還來之勤行堂廷堂樹下處備飲食設牀座點明燈而坐若其他諸比丘來時應俱行自恣若不來時應攝持今日乃我自恣也若不攝持墮惡作九諸比丘于五比丘住處一人持來自恣四人不可為僧伽行自恣若行自恣者墮惡作諸比丘于四比丘住處一人持來自恣三人不得互相行自恣行自恣者墮惡作諸比丘于三比丘住處一人持來自恣二人不得互相行自恣行自恣者墮惡作諸比丘于二比丘住處一人持來自恣一人不得攝持攝持者墮惡作六一爾時有一比丘于自恣日犯罪時彼比丘心生思念世尊規定有罪者不得行自恣而我犯罪我應如何為之耶彼等以此事白世尊世尊曰諸比丘于此處參照第二布薩犍度二七一二應言懺悔以行自恣不得以此作自恣之障礙二爾時有一比丘正行自恣時憶念及罪時彼比丘心生思念世尊規定有罪者不得行自恣而我犯罪我應如何為之耶彼等以此事白世尊世尊曰諸比丘此處有比丘正行自恣時憶念及罪諸比丘彼比丘應言鄰近比丘曰我犯某罪由此出後即懺悔彼罪如此言而行自恣由此不得作自恣障礙三諸比丘此處有比丘正行自恣時心疑有罪諸比丘彼比丘參照第二布薩犍度二七四八應言懺悔以行自恣由此不得作自恣障礙誦品一終七一爾時于一住處自恣之日甚多其住處比丘集會五人或過五人彼等不知其住處有其他比丘未來者彼等思念是法思念是律思念和合別眾而行自恣彼等正行自恣時有其住處之其他比丘來者其數甚多彼等以此事白世尊世尊曰二諸比丘此于一住處自恣之日甚多其住處比丘集會五人或過五人彼等不知其住處有比丘未來者彼等思念是法思念是律思念和合別眾而行自恣彼等正行自恣時有其住處之其他比丘來者其數甚多諸比丘彼諸比丘應再行自恣已行自恣者無罪三諸比丘此于一住處自恣之日彼等正行自恣時有其住處之其他比丘來者其數相等已行自恣者是善行也餘者應行自恣已行自恣者無罪諸比丘此于一住處布薩之日彼等正行自恣時有其住處之其他比丘來者其數甚少已行自恣者是善行也餘者應行自恣已行自恣者無罪四諸比丘此于一住處自恣之日彼等已行自恣時有其住處之其他比丘來者其數甚多諸比丘彼諸比丘應再行自恣已行自恣者無罪諸比丘于此彼等已行自恣之時有其住處之其他比丘來者其數相等已行自恣者是善行也後來者應于彼等之前行自恣已行自恣者無罪諸比丘于此彼等已行自恣之時有其住處之其他比丘來者其數甚少已行自恣者是善行也後來者應于彼等之前行自恣已行自恣者無罪五諸比丘此彼等已行自恣眾會未離座時同第四自恣犍度七四已行自恣者無罪諸比丘于此彼等已行自恣部分眾會已離座時同第四自恣犍度七四已行自恣者無罪諸比丘此彼等已行自恣一切眾會已離座時同第四自恣犍度七四已行自恣者無罪無罪十五事品終八一三參照第二布薩犍度二九三五一四一諸比丘于有比丘尼在坐之眾會不得行自恣行自恣者墮惡作諸比丘于式叉摩那沙彌沙彌尼棄學者犯極罪者在坐之眾會不得行自恣行自恣者墮惡作二于不見罪而被舉者在坐之眾會不得行自恣行自恣者應依法而斷之因不懺悔罪而被舉者因不棄惡見而被舉者在坐之眾會不得行自恣行自恣者應依法而斷之三于黃門在坐之眾會不得行自恣行自恣者墮惡作賊住者歸于外道者畜生殺母者殺父者殺阿羅漢者污染比丘尼者破和合僧者出佛身血者二根者在坐之眾會不得行自恣行自恣者墮惡作四諸比丘眾會尚未離去時不得受別住者之自恣而行自恣諸比丘若非自恣之日不得行自恣但除僧伽和合時一五一爾時于拘薩羅國一住處自恣之日發生蠻族怖畏諸比丘無法三語以行自恣彼等以此事白世尊世尊曰諸比丘許以再語行自恣但蠻族怖畏逾益激烈比丘無法以再語行自恣彼等以此事白世尊世尊曰諸比丘許以一語行自恣蠻族怖畏逾益激烈諸比丘無法以一語行自恣彼等以此事白世尊世尊曰諸比丘許住雨安居者齊唱而行自恣二爾時于一住處自恣之日眾人供奉布施至夜更甚時彼諸比丘心生思念眾人供奉布施至夜更甚若僧伽以三語行自恣時僧伽未自恣已但夜將已明我等如何為之耶彼等以此事白世尊世尊曰三諸比丘于此一住處自恣之日眾人供奉布施至夜更甚若諸比丘于此心生思念眾人夜將明矣時聰明賢能比丘應告僧伽言諸大德請聽我言眾人供奉布施至夜更甚若僧伽三語行自恣僧伽自恣未已但夜將已明若僧伽機熟者僧伽應再語一語住雨安居者可齊唱以行自恣四諸比丘于此一住處自恣之日諸比丘說法經師結集諸經持律者決定戒律宣法者談法諸比丘爭論至夜更甚于此若諸比丘心生思念諸比丘爭論至夜更甚若僧伽以三語行自恣時僧伽自恣未已夜將已明聰明賢能比丘應告僧伽言諸大德請聽我言諸比丘爭論至夜更甚若僧伽以三語行自恣時僧伽自恣未已夜將已明若僧伽機熟者僧伽應再語一語住雨安居者可齊唱行自恣五爾時于拘薩羅國一住處自恣之日大比丘僧團集會防雨之處少而大雲飛騰時彼諸比丘心生思念此處大比丘僧團集會防雨之處少而大雲飛騰若僧伽以三語行自恣時僧伽自恣未已雨將已降我等應如何為之耶彼等以此事白世尊世尊曰六諸比丘此于一住處自恣之日大比丘僧團集會防雨之處少而大雲飛騰于此若諸比丘心生思念此處大比丘僧團雨將已降聰明賢能比丘應告僧伽言諸大德請聽我言如此大比丘僧團雨將已降若僧伽機熟者僧伽應再語一語住雨安居者可齊唱以行自恣七諸比丘此于一住處自恣之日有國王障礙乃至盜賊障礙火障礙水障礙人障礙非人障礙猛獸障礙蛇障礙命障礙梵行障礙于此若諸比丘心生思念此是梵行之障礙也若僧伽以三語行自恣時僧伽自恣未已梵行障礙將已生時聰明賢能比丘應告僧伽言諸大德請聽我言此是梵行障礙若僧伽以三語行自恣時僧伽自恣未已梵行障礙將已生若僧伽機熟者僧伽應再語一語住雨安居者可齊唱以行自恣一六一爾時六群比丘有罪而行自恣彼等以此事白世尊世尊曰諸比丘有罪者不得行自恣行自恣者墮惡作諸比丘有罪而行自恣者得容許僧伽責難其罪二爾時六群比丘已蒙乞容許而不欲與容許彼等以此事白世尊世尊曰諸比丘不欲與容許者許禁止其自恣諸比丘禁止者應如此為之自恣之日即十四日或是十五日彼人現前之時應于僧伽中言諸大德請聽我言某甲其人有罪我禁止其自恣于彼現前處不得行自恣如此以禁止自恣三爾時六群比丘念善行比丘禁止我等自恣先與清淨無罪諸比丘以無事無因禁止其自恣于諸已行自恣者亦禁止其自恣彼等以此事白世尊世尊曰諸比丘對清淨無罪諸比丘無事無因不得禁止其自恣禁者墮惡作諸比丘于諸已行自恣者亦不得禁止其自恣禁者墮惡作四諸比丘自恣如此者可禁止如此者不可禁止諸比丘如何不能禁止自恣耶諸比丘若以三語說自恣語盡之時若禁止自恣者自恣不可禁止諸比丘若再語諸比丘若一語諸比丘若住雨安居者以齊唱自恣語盡之時若禁止自恣者自恣不可禁止諸比丘如此自恣者不可禁止也五諸比丘如何自恣可禁止耶諸比丘若以三語說自恣語未盡時即禁止自恣者自恣可禁止也諸比丘若再語諸比丘若一語諸比丘若住雨安居者齊唱自恣語未盡時即禁止自恣者自恣可禁止也諸比丘如此者自恣可禁止也六諸比丘此處自恣之日有比丘禁止他比丘自恣若于彼比丘他比丘等心知此具壽身行不淨語行不淨命不淨愚癡暗昧受問不能答時即言比丘止不得訟諍爭論制止之僧伽應行自恣七諸比丘于此處自恣之日有比丘禁止他比丘自恣若于彼比丘其他諸比丘心知此具壽身行清淨語行不淨命不淨愚癡暗昧受問而不能答應行自恣八諸比丘于此自恣之日有比丘禁止他比丘自恣若于彼比丘他諸比丘心知此具壽身行清淨語行清淨命不淨愚癡暗昧受問而不能答者應行自恣九諸比丘于此自恣之日有比丘禁止他比丘自恣若于彼比丘他諸比丘心知此具壽身行清淨語行清淨命清淨愚癡暗昧受問而不能答時應行自恣一諸比丘于此自恣之日有比丘禁止他比丘自恣若于彼比丘他諸比丘心知此具壽身行清淨語行清淨命清淨賢明受問即能回答時應言彼曰汝禁止此比丘自恣者是因何而禁之耶因壞戒而禁止耶因壞行而禁止耶因壞見而禁止耶一一若彼言我乃因壞戒而禁止之因壞行而禁止之因壞見而禁止之時應向彼言具壽汝知壞戒耶知壞行耶知壞見耶若彼言我知壞戒知壞行知壞見時應向彼言何等為壞戒耶何等為壞行耶何等為壞見耶一二若彼言四波羅夷與十三僧殘為壞戒偷蘭遮波逸提波羅提提舍尼惡作惡說為壞行邪見邊執見為壞見時應向彼言汝禁止此比丘自恣是由見而禁止耶由聞而禁止耶由疑而禁止耶一三若彼言我由見而禁止之由聞而禁止之由疑而禁止之時應向彼言汝于此比丘因見而禁止自恣者汝見者何耶何為見耶何時見耶何處見耶見犯波羅夷耶見犯僧殘耶見犯偷蘭遮波逸提波羅提提舍尼惡作惡說耶汝在何處耶此比丘在何處耶汝為何事耶此比丘為何事耶一四若彼言我于此比丘非因見而禁止其自恣是因聞而禁止其自恣時應向彼言汝于此比丘由聞而禁止其自恣者汝聞何耶何為聞耶何時聞之耶何處聞之耶聞犯波羅夷耶聞犯僧殘耶聞犯偷蘭遮波逸提波羅提提舍尼惡作惡說耶由比丘聞耶由比丘尼聞耶由式叉摩那聞耶由沙彌聞耶由沙彌尼聞耶由優婆塞聞耶由優婆夷聞耶由國王聞耶由王臣聞耶由外道聞由外道之弟子聞耶一五若彼言我于此比丘非由聞以禁止其自恣由疑以禁止其自恣時應向彼言汝于此比丘由疑以禁止自恣者汝疑何者耶何為疑耶何時疑之耶何處疑之耶疑犯波羅夷耶疑犯僧殘耶疑犯偷蘭遮波逸提波羅提提舍尼惡作惡說耶由比丘聞而疑之耶由外道之弟子聞而疑之耶一六若彼言我于此比丘非由疑而禁止其自恣由何禁止此比丘自恣我不知也諸比丘若彼詰難比丘由徵問不適于有智之同梵行者之心者則言被詰難之比丘無過應止其說一七諸比丘若彼詰難比丘自言以無根波羅夷難之者于處僧殘後僧伽應行自恣諸比丘若彼詰難比丘自言以無根之僧殘難之者于如法治後僧伽應行自恣若彼詰難比丘自言以無根偷蘭遮波逸提波羅提提舍尼惡作惡說難之者于如法治後僧伽應行自恣一八諸比丘若彼被詰難之比丘自言犯波羅夷者擯滅之後僧伽應行自恣諸比丘若彼被詰難之比丘自言犯僧殘者于處僧殘之後僧伽應行自恣諸比丘若彼被詰難之比丘自言犯偷蘭遮波逸提波羅提提舍尼惡作惡說者于如法治後僧伽應行自恣一九諸比丘此處有比丘自恣之日犯偷蘭遮部分比丘見是偷蘭遮部分比丘見是僧殘諸比丘見為偷蘭遮之諸比丘伴同彼比丘于一面如法治後應到僧伽言彼比丘之罪如法除矣若僧伽機熟者僧伽應行自恣二諸比丘此處有比丘自恣之日犯偷蘭遮部分諸比丘見是偷蘭遮部分諸比丘見是波逸提部分諸比丘見是偷蘭遮部分諸比丘見是波羅提提舍尼部分諸比丘見是偷蘭遮部分諸比丘見是惡作部分諸比丘見是偷蘭遮部分諸比丘見是惡說諸比丘見是偷蘭遮之比丘等以彼比丘同第四自恣犍度一六一九僧伽應行自恣二一諸比丘此處有比丘自恣之日犯波逸提犯波羅提提舍尼犯惡作犯惡說部分諸比丘見是惡說部分諸比丘見是僧殘諸比丘見是惡說之比丘以彼比丘同第四自恣犍度一六一九僧伽應行自恣二二諸比丘此處有比丘自恣之日犯惡說部分諸比丘見是惡說部分諸比丘見是偷蘭遮部分諸比丘見是惡說部分諸比丘見是波逸提部分諸比丘見是惡說部分諸比丘見是波羅提提舍尼部分諸比丘見是惡說部分諸比丘見是惡作諸比丘見是惡說之比丘等以彼比丘同第四自恣犍一六一九僧伽應行自恣二三諸比丘此處有比丘自恣之日于僧伽中言諸大德請聽我言見有如此事但不見其人若僧伽機熟者除事之後僧伽應行自恣應言彼曰世尊規定唯清淨者可行自恣若見事不見人者立即語此事二四諸比丘此處有比丘自恣之日于僧伽中言諸大德請聽我言見有如此人但不見其事若僧伽機熟者除人之後僧伽應行自恣應言彼曰世尊規定應和合以行自恣若見人不見事者立即語此人二五諸比丘此處有比丘自恣之日于僧伽中言諸大德請聽我言見有如此事與人若僧伽機熟者除事與人之後僧伽應行自恣應言彼曰世尊規定應清淨和合以行自恣若知事與人者立即語此事與人二六諸比丘若于自恣之前見事之後見人而語者善諸比丘若自恣之前見人之後見事而語者善諸比丘若自恣之前見事與人行自恣之後若發起之者發起波逸提也一七一爾時有多數同見相親諸比丘于拘薩羅國一住處入雨安居于彼等鄰近有其他諸比丘常訴訟鬥諍爭論談論于僧伽行諍事彼等亦入雨安居思我等于彼比丘等住雨安居而行自恣時禁止其自恣彼比丘等聞之我等鄰近有他諸比丘常訴訟行諍事彼等亦入雨安居思我等禁止我等應如何為之耶彼等以此事白世尊世尊曰二諸比丘此處有多數同見相親諸比丘于一住處入雨安居彼等鄰近有他諸比丘常訴訟行諍事彼等亦入雨安居思我等禁止諸比丘許彼諸比丘于十四日行二或三布薩以是應于他諸比丘之前行自恣諸比丘若彼常訴訟行諍事之諸比丘到其住處者其住處比丘等應速集會而行自恣行自恣後應言我等已行自恣諸具壽隨意行之三諸比丘若彼常訴訟行諍事之諸比丘不意忽然到彼住處者諸比丘其住處比丘等設牀座備洗足水足台足布迎取衣鉢問欲水否應對招呼彼等後往境界外以行自恣行自恣後應言我等已行自恣諸具壽可隨意為之四若如此得者善若不得者其住處聰明賢能比丘應告其住處諸比丘曰此住處諸具壽請聽我言若具壽等機熟者今行布薩誦波羅提木叉于次新月行自恣諸比丘若彼常訴訟行諍事比丘等向彼諸比丘言善哉今與我等行自恣者彼等應言汝等非我等自恣之主我等尚未行自恣五諸比丘若彼常訴訟行諍事之諸比丘共住至新月時諸比丘其住處聰明賢能比丘應告其住處諸比丘曰此住處諸具壽請聽我言誦于次滿月行自恣諸比丘若彼常訴訟行諍事之諸比丘向彼諸比丘言善哉今與我等行自恣時應告彼等曰汝等非我等自恣主我等尚未行自恣六諸比丘若彼常訴訟行諍事之諸比丘共住至其滿月諸比丘彼一切比丘雖不欲者于次滿月即于迦剌底迦月之滿月行自恣七諸比丘若彼諸比丘行自恣時病者禁止無病者自恣則應言彼曰具壽有病者世尊說病者不堪受問且待病癒病癒之後若欲者可詰難之若如此說彼猶詰難者不恭敬波逸提也八諸比丘若彼諸比丘行自恣時無病者禁止病者自恣則應言彼曰此比丘乃病者也世尊說病者不堪受問且待此比丘病癒病癒之後若欲者可詰難之若如此說彼猶詰難者不恭敬波逸提也九諸比丘若彼諸比丘行自恣時病者禁止病者自恣則應言彼等曰諸具壽病者也世尊說病者不堪受問汝等且待病癒病癒之後若欲者可詰難之若如此說彼猶詰難者不恭敬波逸提也一諸比丘若彼諸比丘行自恣時無病者禁止無病者自恣僧伽糾問兩者如法治理後即應行自恣一八一爾時有多數同見相親諸比丘于拘薩羅國一住處入雨安居彼等和合歡喜無爭得精舍安樂而住時彼諸比丘心生思念我等和合得精舍若我等今行自恣而諸比丘于自恣已出而遊行若是則我等將失此安樂精舍我等應如何為之耶彼等以此事白世尊世尊曰二諸比丘此處有多數同見相親諸比丘于一住處入雨安居彼等和合得精舍若彼諸比丘于此心生思念我等和合若失時諸比丘許彼諸比丘行自恣攝取三諸比丘行此者應如此為之一切人應于一處集會集會之後聰明賢能比丘應告僧伽言諸大德請聽我言我等和合歡喜無爭得精舍安樂而住若我等今行自恣諸比丘于自恣已而出遊行若是則我等將失此安樂精舍若僧伽機熟者僧伽應行自恣攝取今行布薩誦波羅提木叉于次迦剌底迦月之滿月僧伽應行自恣此乃表白四諸大德請聽我言我等和合將失僧伽行自恣攝取今行布薩誦波羅提木叉于次迦剌底迦月之滿月以行自恣諸大德行自恣攝取今行布薩誦波羅提木叉于次迦剌底迦月之滿月以行自恣具壽聽者默然不聽者請言僧伽行自恣攝取今行布薩誦波羅提木叉次迦剌底迦月之滿月以行自恣具壽聽故默然我如是了知五諸比丘行自恣攝取時若有一比丘言我欲往外地遊行我于外地有事者應言彼曰善自恣已可往諸比丘若彼比丘行自恣時禁他一比丘行自恣者應言彼曰汝非我自恣主我尚未行自恣諸比丘若彼比丘行自恣時有一比丘禁止彼比丘自恣者僧伽應糾問兩人如法治理六諸比丘若彼比丘外地行事已于迦剌底迦月之滿月前還彼住處諸比丘若諸比丘行自恣時有一比丘禁止彼比丘自恣者應言彼曰汝非我自恣之主我已行自恣矣諸比丘若諸比丘行自恣時彼比丘禁止隨一比丘自恣僧伽應糾問兩人如法治理後僧伽應行自恣此犍度有四十六事攝頌曰于拘薩羅國入住雨安居以往見世尊乃及非安樂與畜獸共住行自恣牀座自恣日之二自恣之羯磨病比丘親族王盜賊惡人及怨敵比丘五人與四人三人與二人一人及犯罪疑有罪憶念一切之僧伽以疑多等少其住處比丘十四日標識二種共住者應往不應往尼等坐眾會與欲假自恣蠻族夜更雲障礙及自恣不與我等先不可以禁止比丘依何禁何者為壞戒壞行壞見耶乃于見聞疑詰難之比丘被詰難比丘偷蘭遮事訟自恣之攝取非自恣之主
