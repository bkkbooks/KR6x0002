body:
  text: 第七迦絺那衣犍度一一爾時佛世尊住舍衛城祇樹給孤獨園爾時波利邑比丘有三十人皆住于林中皆食乞食皆著糞掃衣皆唯有三衣往舍衛城拜見世尊時近入雨安居但不及于舍衛城入雨安居而途中于娑竭陀入雨安居彼等疲勞而住雨安居念世尊雖住距此六由旬近處我等不得見世尊時彼諸比丘經三月住雨安居已而行自恣雨水溢滿泥水流出衣服皆濕而彼等疲勞詣舍衛城祇樹給孤獨園世尊住處詣而敬禮世尊坐于一面二佛世尊與諸客比丘互相致問是常法也時世尊言彼諸比丘曰諸比丘堪忍否滿足否和合相喜而無爭安樂住雨安居否不困疲于乞食否世尊堪忍世尊滿足我等和合相喜無爭住雨安居無困疲于乞食于此我等三十人是波利邑比丘欲來舍衛城拜見世尊時近入雨安居但不及于舍衛城入雨安居乃于途中娑竭陀入雨安居我等疲勞住雨安居念世尊雖住距此六由旬近處我等不得拜見世尊時我等經三月住雨安居已乃行自恣雨水溢滿泥水流出衣服皆濕疲勞行路而來三時世尊以此因緣說法告諸比丘曰諸比丘住雨安居比丘許受迦絺那衣諸比丘汝等受迦絺那衣者有五事相應許可謂食前食後不囑比丘而入聚落離三衣而宿別衆食盡受須要量之衣受衣者可持彼衣諸比丘汝等受迦絺那衣者有如此五事相應諸比丘受迦絺那衣時應如此為之四聰明賢能比丘應告僧伽言諸大德請聽我言僧伽得此迦絺那衣物若僧伽機熟者僧伽以此迦絺那衣物與某甲比丘作迦絺那衣此乃表白諸大德請聽我言僧伽得此迦絺那衣物僧伽以此迦絺那衣物與某甲比丘作迦絺那衣以此迦絺那衣物與某甲比丘作迦絺那衣具壽聽者默然不聽者請言僧伽已以此迦絺那衣物與某甲比丘作迦絺那衣具壽聽故默然我如此了知五諸比丘如此為成受迦絺那衣者如此為不成受諸比丘如何為不成受迦絺那衣耶唯作輾治不成受迦絺那衣唯作浣洗不成受迦絺那衣唯作衣計量不成受迦絺那衣唯作裁斷不成受迦絺那衣唯安緣邊不成受迦絺那衣唯作假綴不成受迦絺那衣唯作綴合不成受迦絺那衣唯作固縫不成受迦絺那衣唯作重縫不成受迦絺那衣唯作背縫不成受迦絺那衣唯作合縫不成受迦絺那衣唯作一染不成受迦絺那衣豫待作迦絺那衣決定者不成受迦絺那衣作與迦絺那衣預談者不成受迦絺那衣唯作暫時物者不成受迦絺那衣若延期者不成受迦絺那衣以過一夜而棄捨者不成受迦絺那衣不相應者不成受迦絺那衣無僧伽梨衣時不成受迦絺那衣無鬱多羅僧衣時不成受迦絺那衣無安陀會衣時不成受迦絺那衣五條或過五條不即日裁斷作緣時為不成受迦絺那衣異比丘作時為不成受迦絺那衣雖正受迦絺那衣但境界外人隨喜者如此為不成受迦絺那衣諸比丘如此者即為不成受迦絺那衣六諸比丘如何為成受迦絺那衣耶以新衣成者為成受迦絺那衣以等新衣成者為成受迦絺那衣以故衣成者為成受迦絺那衣以糞掃衣成者為成受迦絺那衣以落于市場門前成者為成受迦絺那衣不決定豫待作迦絺那衣為成受迦絺那衣不豫言與迦絺那衣為成受迦絺那衣非作暫時物為成受迦絺那衣不延期為成受迦絺那衣過一夜不捨棄者為成受迦絺那衣若相應為成受迦絺那衣有僧伽梨衣時為成受迦絺那衣有鬱多羅僧衣時為成受迦絺那衣有安陀會衣時為成受迦絺那衣五條或過五條即日裁斷作緣時為成受迦絺那衣其人作時為成受迦絺那衣境界內隨喜受迦絺那衣者如此為成受迦絺那衣諸比丘如此者為成受迦絺那衣七諸比丘如何為捨迦絺那衣耶諸比丘捨迦絺那衣有八事謂離去衣成決定不作失聞僧伽已捨迦絺那衣斷期望出境界與僧伽共捨二一有比丘受迦絺那衣持已作之衣念不還而去此比丘依去而捨迦絺那衣也有比丘受迦絺那衣持衣而去往詣界外念我于此處作衣不還而作衣此比丘由衣成而捨迦絺那衣也有比丘受迦絺那衣持衣而去往詣界外念我不作衣亦不還此比丘由決定不作而捨迦絺那衣也有比丘受迦絺那衣持衣而去往詣界外念我于此處作衣不還而作衣當作衣時失去衣此比丘由失而捨迦絺那衣也二有比丘受迦絺那衣持衣念還而去往詣界外作衣作衣已聞于彼住處捨迦絺那衣此比丘由聞以捨迦絺那衣有比丘受迦絺那衣持衣而念還而去往詣界外作衣作衣已念還還但于界外住時已過迦絺那衣期限此比丘由過期限以捨迦絺那衣有比丘受迦絺那衣持衣而念還而去往界外作衣作衣已念還還而還時適迦絺那衣期限至此比丘與諸比丘共捨迦絺那衣也持迦絺那衣七事終三一有比丘受迦絺那衣受持已作之衣念不還而去此比丘由去以捨迦絺那衣有比丘受迦絺那衣受持衣而去往詣界外念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣受持衣而去往詣界外念我不作衣亦不還此比丘由決定不作以捨迦絺那衣有比丘受迦絺那衣受持衣而去往詣界外念我于此處作衣不還而作衣當作衣時失去衣此比丘由失以捨迦絺那衣二有比丘受迦絺那衣受持衣已念還而去往詣界外作衣作衣已聞于彼住處捨迦絺那衣此比丘由聞以捨迦絺那衣有比丘受迦絺那衣受持衣已念還而去往詣界外作衣作衣已念還還于界外已過迦絺那衣期限此比丘由過期限以捨迦絺那衣有比丘受迦絺那衣受持衣已念還而去往詣界外作衣作衣已念還還還時適迦絺那衣期限至此比丘與諸比丘共捨迦絺那衣受持迦絺那衣七事終四一有比丘受迦絺那衣持未成衣而去往詣界外念我于此處作衣不還而作衣此比丘由衣成而捨迦絺那衣同第七迦絺那衣犍度二但將持衣改為持未成衣諸比丘共捨迦絺那衣持迦絺那衣六事終五一有比丘受迦絺那衣受持未成衣而去往詣界外念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣同第七迦絺那衣犍度三但將受持衣改為受持未成衣諸比丘共捨迦絺那衣受持迦絺那衣六事終六一有比丘受迦絺那衣持衣料而去往詣界外念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣持衣料而去往詣界外念我不作衣亦不還此比丘由決定不作以捨迦絺那衣有比丘受迦絺那衣持衣料而去往詣界外念我于此處作衣不還而作衣正作衣時而失去此比丘由失而捨迦絺那衣二有比丘受迦絺那衣持衣料念不還而去往詣界外念我于此處作衣而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣持衣料念不還而去往詣界外念我不作衣此比丘由發心不作以捨迦絺那衣有比丘受迦絺那衣持衣料念不還而去往詣界外念我于此處作衣而作衣當作衣時而失去此比丘由失以捨迦絺那衣三有比丘受迦絺那衣持衣料躊躇于還或不還未決定而去往詣界外念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣持衣料躊躇于還或不還未決定而去往詣界外念我不作衣亦不還此比丘由決定不作以捨迦絺那衣有比丘受迦絺那衣持衣料躊躇于還或不還未決定而去往詣界外念我于此處作衣不還而作衣正作時而失去此比丘由失以捨迦絺那衣四有比丘受迦絺那衣持衣料念還時而去往詣界外念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣持衣料念還而去往詣界外念我不作衣亦不還此比丘由決定不作以捨迦絺那衣有比丘受迦絺那衣持衣料念還時而去往詣界外念我于此處作衣不還而作衣正作衣時而失去此比丘由失以捨迦絺那衣有比丘受迦絺那衣持衣料而念還時而去往詣界外作衣作衣已聞于彼住處捨迦絺那衣此比丘由聞以捨迦絺那衣有比丘受迦絺那衣持衣料念還時而去往詣界外作衣作衣已念還還而于界外已過迦絺那衣期限此比丘由過期限捨迦絺那衣有比丘受迦絺那衣持衣料念還時而去往詣界外作衣作衣已念還還而還時適迦絺那衣之期限至此比丘與他比丘共捨迦絺那衣七一有比丘受迦絺那衣受持衣料而去同第七迦絺那衣犍度六一四但持衣料改為受持衣料有比丘受迦絺那衣持未成衣而去同第七迦絺那衣犍度六一四但持衣料改為持未成衣有比丘受迦絺那衣受持未成衣而去同第七迦絺那衣犍度六一四但持衣料改為受持未成衣與比丘等共捨迦絺那衣持迦絺那衣誦品終八一有比丘受迦絺那衣期望衣而去往詣界外而期望衣不望而得望而不得念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣期望衣念我不作衣亦不還此比丘由決定不作以捨迦絺那衣念我于此處作衣不還而作衣正作衣而失去此比丘由失而捨迦絺那衣有比丘受迦絺那衣期望衣而去往詣界外念我于此處望衣不還而期望衣時斷衣之望此比丘由斷衣之期望而捨迦絺那衣也二有比丘受迦絺那衣期望衣念不還而去往詣界外期望衣不望而得望而不得念我于此處作衣而作衣此比丘由衣成以捨迦絺那衣有比丘受迦絺那衣念我不作衣此比丘由決定不作以捨迦絺那衣念我于此處作衣而作衣正作衣時而失去此比丘由失以捨迦絺那衣有比丘受迦絺那衣期望衣念不還往詣界外念我于此處期待衣而期望衣斷衣之望此比丘由斷衣之期望以捨迦絺那衣三有比丘受迦絺那衣期望衣躊躇于還或不還未決定而去往詣界外期望衣不望而得望而不得念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣念我不作衣亦不還此比丘由決定不作以捨迦絺那衣念我于此處作衣不還而作衣當作衣時而失去此比丘由失以捨迦絺那衣有比丘受迦絺那衣期望衣躊躇于還或不還未決定而去往詣界外念我于此處期待衣不還而期望衣斷衣之望此比丘由斷衣之期望而捨迦絺那衣非望十二事終九一有比丘受迦絺那衣而期望衣念還而去往詣界外期望衣望而得不望不得念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣念我不作衣亦不還此比丘由決定不作以捨迦絺那衣念我于此處作衣不還而作衣正作衣時而失去此比丘由失以捨迦絺那衣有比丘受迦絺那衣期望衣念還時而去往詣界外念我于此處期待衣不還而望衣斷衣之望此比丘由斷衣之望以捨迦絺那衣二有比丘受迦絺那衣期望衣念還時而去往詣界外聞于彼住處捨迦絺那衣念于彼住處捨迦絺那衣故我于此處期待衣而望衣望而得不望而不得念我于此處作衣不還而作衣此比丘由衣成以捨迦絺那衣念我不作衣亦不還此比丘由決定不作以捨迦絺那衣念我于此處作衣不還而作衣正作衣時而失去此比丘由失以捨迦絺那衣有比丘受迦絺那衣望衣念還時而去往詣界外聞于彼住處捨迦絺那衣念于彼住處捨迦絺那衣故我于此處期待衣不還而望衣斷衣之望此比丘由斷衣之望以捨迦絺那衣三有比丘受迦絺那衣期望衣念還時而去往詣界外望衣望而得不望而不得令作衣作衣已聞于彼住處捨迦絺那衣此比丘由聞以捨迦絺那衣有比丘受迦絺那衣期望衣念還時而去往詣界外念我于此處期待衣不還而望衣斷衣之望此比丘由斷衣之望以捨迦絺那衣有比丘受迦絺那衣而期望衣念還時而去往詣界外望衣望而得不望而不得令作衣作衣已念還還但已過迦絺那衣期限此比丘由出境界以捨迦