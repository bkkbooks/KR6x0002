令作衣作已還來限正著與他比丘等共捨迦絺那衣捨磊落持與受持次七七去缺未成六次第持往界外念令作已成發心失三事不還持往界外作已成發心失有三次無決意有三類還來持往界外作作與成捨未決三發心失聞出境界與他共生十五類受持未成及受持此等四重總十五望非望所用有三亦分門類列其間知此乃依于理趣三度十二有十二藏有九種安樂五執受非執受兩類如是如是依理趣說攝頌已百十八
