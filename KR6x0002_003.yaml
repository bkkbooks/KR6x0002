body:
  text: 第三入雨安居犍度一一爾時佛世尊住王舍城竹林迦蘭陀迦園爾時世尊未為諸比丘制定雨時安居此處彼諸比丘夏時冬時雨時盡皆遊行二衆人忿怒非難如何諸沙門釋子冬時夏時雨時盡皆遊行踐踏青草以害一根之命多殺小生命耶彼諸外道其法惡説亦顧此以求雨時安居彼鳥等亦顧此作巢樹頂求雨時安居然彼沙門釋子等不論冬時夏時雨時盡皆遊行踐踏青草害一根之命多殺小生命三諸比丘聞彼衆人忿怒非難時諸比丘以此事白世尊世尊曰諸比丘許入雨安居二一時諸比丘心生思念何時應入雨安居耶彼等以此事白世尊世尊曰諸比丘于雨期許入雨安居二時諸比丘心生思念入雨安居有幾種耶彼等以此事白世尊世尊曰諸比丘有二入雨安居前時與後時也前時于頞沙荼滿月之翌日入後時于頞沙荼滿月一月後入諸比丘如是有二時入雨安居三一爾時六群比丘入雨安居雨安居中亦去遊行衆人忿怒非難如何諸沙門釋子冬時夏時雨時盡皆遊行踐踏青草害一根之命多殺小生命彼諸外道其法惡説亦顧此以求雨時安居彼諸鳥亦顧此而樹頂作巢求雨時安居然彼諸沙門釋子冬時夏時雨時盡皆遊行踐踏青草害一根之命多殺小生命二諸比丘聞彼衆人忿怒非難少欲諸比丘忿怒非難如何六群比丘入雨安居于雨安居中亦去遊行耶彼諸比丘以此事白世尊時世尊以此因緣于此時機説法告諸比丘曰諸比丘入雨安居未滿三月或後不住三月者不得出外遊行出者墮惡作四一爾時六群比丘不欲入雨安居彼等以此事白世尊世尊曰諸比丘不可不入雨安居不入者墮惡作二爾時六群比丘于入雨安居日不欲安居故意出離住處彼等以此事白世尊世尊曰諸比丘于入雨安居日不欲入安居者不得故意出離住處出者墮惡作三爾時摩竭國洗尼瓶沙王欲令延期入雨安居遣使者至諸比丘處言請于次滿月日入雨安居彼等以此事白世尊世尊曰諸比丘可隨順于王五一爾時世尊于隨意間住王舍城後往舍衛城遊行次第遊行至舍衛城其時世尊住舍衛城祇樹給孤獨園爾時拘薩羅國有憂陀延優婆塞為僧伽建立精舍遣使至彼諸比丘處言請蒞臨我欲行布施聞法見比丘二諸比丘曰世尊規定未住滿入雨安居三月或後三月者不得出外遊行憂陀延優婆塞于諸比丘住雨安居期間暫待若出雨安居時則往若彼急要時請于彼住處之諸比丘之處奉獻精舍三憂陀延優婆塞忿怒非難我遣使者去如何不來耶我乃施者作者僧伽近侍者也諸比丘聞憂陀延優婆塞忿怒非難時彼諸比丘以此事白世尊四時世尊以此因緣于此時機説法告諸比丘曰諸比丘若為七種人所請但許七日事即許往未受使者不然七種人者比丘比丘尼式叉摩那沙彌沙彌尼優婆塞優婆夷也諸比丘為如此七種人所請許為七日即許往未受使者不然七日應返五諸比丘此處有優婆塞為僧伽建立精舍若彼遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受請行事七日即許往未受請者不然七日應返六諸比丘此處有優婆塞為僧伽建立平覆屋建立樓房建立地窟建立房舍建立藏庫建立勤行堂建立火堂建立用房建立廁所建立經行處建立經行堂建築水井建立井堂建立浴室建立浴室堂建立小池建立廷堂建立庭園建立園地若彼遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受請行事七日即許往未受請者不然七日應返七諸比丘此處有優婆塞為多數比丘乃至為一比丘建立精舍建立平覆屋建立殿樓同第三入雨安居犍度五六七日應返八諸比丘此處有優婆塞為比丘尼僧伽乃至為多數比丘尼乃至為一比丘尼乃至為多數式叉摩那乃至為一式叉摩那乃至為多數沙彌乃至為一沙彌乃至為多數沙彌尼乃至為一沙彌尼建立精舍建立平覆屋建立殿樓建立樓房建立地窟建立房舍建立藏庫建立勤行堂建立火堂建立用房建立廁所建立經行處建立經行堂建築水井建立井堂建立小池建立廷堂建立庭園建立園地若彼遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受使行事七日間即許往未受使者不然七日應返九諸比丘此處有優婆塞為自己建立住屋乃至建立臥處建立小屋建塔建立天幕建立店建立店屋建立殿樓建立樓房建立地窟建立房舍建立藏庫建立勤行堂建立火堂建立廚房建立廁所建立經行處建立經行堂建築水井建立井堂建立浴室建立浴室堂建立小池建立廷堂建立庭園建立園地或為其子婚禮或為其女婚禮或病或讀誦名經若彼遣使者至諸比丘處言請蒞臨此經未滅前即學此經或有其他所用所作或彼遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受請行事七日即許往不受請者不然七日應返一諸比丘此處有優婆夷為僧伽建立精舍若彼女遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受請行事七日間即許往未受請者不然七日應返一一諸比丘此處有優婆夷為僧伽建立平覆屋同第三入雨安居犍度五六建立園地若彼女遣使者至諸比丘處同第三入雨安居犍度五一七日應返一二諸比丘此處有優婆夷為多數諸比丘乃至為一比丘乃至為比丘尼僧伽乃至為多數之比丘尼乃至為一比丘尼乃至為多數之式叉摩那為一式叉摩那為多數之沙彌為一沙彌為多數之沙彌尼為一沙彌尼乃至為自己建立住屋乃至建立臥處同第三入雨安居犍度五九或病或讀誦名經若彼女遣使者至諸比丘處言請蒞臨此經未滅前學此經或有其他所用所作而彼女遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受請行事七日間即許往未受請者不然七日應返一三諸比丘此處有比丘為僧伽有比丘尼為僧伽有式叉摩那為僧伽有沙彌為僧伽有沙彌尼為僧伽為多數之比丘為一比丘為比丘尼僧伽為多數之比丘尼為一比丘尼為多數之式叉摩那為一式叉摩那為多數之沙彌為一沙彌為多數之沙彌尼為一沙彌尼為自己建立精舍同第三入雨安居犍度五八建立園地若彼尼遣使者至諸比丘處言請蒞臨我欲行布施聞法見比丘諸比丘若受請行事七日間即許往未受請者不然七日應返六一爾時有一比丘患病彼遣使者至諸比丘處言我病諸比丘請蒞臨欲諸比丘蒞臨彼等以此事白世尊世尊曰諸比丘五種人七日間行事雖不受請亦許往何況受請五種人者比丘比丘尼式叉摩那沙彌沙彌尼也諸比丘如此五種人七日間行事雖不受請亦可往何況受請耶七日應返二諸比丘此處有比丘病若彼遣使者至諸比丘處言我病諸比丘請蒞臨欲諸比丘蒞臨諸比丘七日間行事雖未受請亦許往何況受請耶且應念我須求病者之食求看病者之食求病者之醫藥問候看護七日應返三諸比丘此處有比丘生不欣喜若彼遣使者至諸比丘處言我生不欣喜諸比丘請蒞臨欲諸比丘蒞臨諸比丘行事七日雖未受請亦許往何況受請耶且應念我為之滅不欣喜令滅不欣喜而説法七日應返四諸比丘此處有比丘生惡作悔疑若彼遣使者至諸比丘處言我生惡作諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我為之除惡作令除惡作而説法七日應返五諸比丘此處有比丘生成見若彼遣使者至諸比丘處言我生成見諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我為之離成見令離成見而説法七日應返六諸比丘此處有比丘以犯尊法而當別住若彼遣使者至諸比丘處言我以犯尊法而當別住諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與別住或唱表白或加入會衆以滿僧數七日應返七諸比丘此處有比丘當本日治若彼遣使者至比丘等處言我當本日治諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與本日治或唱表白或加入會衆以成滿數七日應返八諸比丘此處有比丘當摩那埵若彼遣使者至諸比丘處言我當摩那埵諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與摩那埵或唱表白或加入會衆以成滿數七日應返九諸比丘此處有比丘當出罪若彼遣使者至諸比丘處言我當出罪諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與出罪或唱表白或加入會衆以成滿數七日應返一諸比丘此處有比丘欲僧伽為之行羯磨呵責依止驅出下意舉罪若彼遣使者至諸比丘處言欲僧伽為我行羯磨諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念如何使僧伽行羯磨或令轉而減輕七日應返一一或僧伽已為彼行羯磨呵責舉罪也若彼遣使者至諸比丘處言僧伽為我行羯磨諸比丘請蒞臨欲諸比丘蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念如何使之正行從順免罪使僧伽停止羯磨七日應返一二諸比丘此處有比丘尼病若彼尼遣使者至諸比丘處言我病諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我求病者之食求看病者之食求病者之醫藥問候看護七日應返一三諸比丘此處有比丘尼生不欣喜若彼尼遣使者至諸比丘處言我生不欣喜諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我為之滅不欣喜令滅不欣喜而説法七日應返一四諸比丘此處有比丘尼生惡作若彼尼遣使者至諸比丘處言我生惡作諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我為之除惡作令除惡作而説法七日應返一五諸比丘此處有比丘尼生成見若彼尼遣使者至諸比丘處言我生成見諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我為之離成見令離成見而説法七日應返一六諸比丘此處有比丘尼犯尊法而當摩那埵若彼尼遣使者至諸比丘處言我犯尊法而當摩那埵諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與摩那埵七日應返一七諸比丘此處有比丘尼當本日治若彼尼遣使者至諸比丘處言我當本日治諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與本日治七日應返一八諸比丘此處有比丘尼當出罪若彼尼遣使者至諸比丘處言我當出罪諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念我力令與出罪七日應返一九諸比丘此處有比丘尼欲僧伽為之行羯磨呵責依止驅出下意舉罪若彼尼遣使者至諸比丘處言欲僧伽為我行羯磨諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念如何使僧伽行羯磨或令轉而減輕七日應返二或僧伽已為彼尼行羯磨呵責舉罪也若彼尼遣使者至諸比丘處言僧伽已為我行羯磨諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許往何況受請耶且應念如何使之正行從順免罪使僧伽停止羯磨七日應返二一諸比丘此處有式叉摩那病若彼女遣使者至諸比丘處言我病諸尊者請蒞臨欲諸尊者蒞臨諸比丘若行事七日雖未受請亦許