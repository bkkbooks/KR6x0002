body:
  text: 第六藥犍度一一爾時佛世尊在舍衛城祇樹給孤獨園時諸比丘患秋時病飲粥吐出進食物亦吐出是故彼等枯瘦粗醜色惡漸次形黃身露脈結世尊見彼諸比丘枯瘦粗醜色惡漸次形黃身露脈結見而言具壽阿難曰阿難如何今諸比丘枯瘦粗醜身露脈結耶今諸比丘患秋時病飲粥吐出進食物亦吐出因此彼等枯瘦粗醜色惡漸次形黃身露脈結二時世尊靜居宴默心生思念今諸比丘患秋時病乃至身露脈結我許諸比丘用何藥耶此應為世間共許之藥可資食但非大量食者也時世尊心生思念有五種藥謂熟酥生酥油蜜糖此等藥乃世間共許之藥可資食但非大量食我當許諸比丘如此五種藥應于正時攝受正時服用三時世尊于傍晚時由宴默起依此因緣說法告諸比丘曰諸比丘我于此處靜居但非大量食者也諸比丘時我心生思念有五種藥乃至我當許諸比丘如此五種藥應于正時攝受正時服用諸比丘許彼五種藥于正時攝受正時服用四爾時諸比丘正時攝受正時服用彼五種藥彼等于平常粗食而消化不良況油性物耶故彼等以患秋時病與食物消化不良二因而日益枯瘦粗醜色惡漸次形黃身露脈結世尊見彼諸比丘日益乃至身露脈結見而言具壽阿難曰阿難如何今諸比丘日益枯瘦乃至身露脈結耶五今諸比丘彼五種藥于正時二因而日益枯瘦粗醜色惡漸次形黃身露脈結時世尊依此因緣說法告諸比丘曰諸比丘受彼五種藥于正時非時皆許服用二一爾時諸病比丘須脂藥彼等以此事白世尊世尊曰諸比丘許服脂藥謂熊脂魚脂鱷脂豬脂驢脂以正時受正時煮正時混合與油共服用二諸比丘若非時受非時煮非時混合若以此服用者墮三事惡作諸比丘若正時受非時煮非時混合而服用此者墮二事惡作諸比丘若正時受正時煮非時混合服用者墮惡作諸比丘若正時受正時煮正時混合服用之者無罪三一爾時諸病比丘須用根藥彼等以此事白世尊世尊曰諸比丘根藥謂姜黃生薑菖蒲白菖蒲麥冬辛胡蓮嗢尸羅蘇子或其他根藥于嚼食毋資于嚼食于噉食毋資于噉食許領受而儲至命終應時服用不應時而服用此者墮惡作二爾時諸病比丘須用根藥粉末彼等以此事白世尊世尊曰諸比丘許用搗臼磨石四一爾時諸病比丘須用澀藥彼等以此事白世尊世尊曰諸比丘澀藥謂荏婆澀具達奢澀婆迦瓦澀那達摩羅澀或其他澀藥于嚼食毋資于嚼食于噉食毋資取于噉食許受而儲至命終應時服用不應時服用者墮惡作五一爾時諸病比丘須用葉藥彼等以此事白世尊世尊曰諸比丘葉藥謂荏婆葉具達奢葉拔陀羅葉蘇羅尸葉迦婆尸迦葉或其他葉藥于嚼食毋資于嚼食于噉食毋資于噉食乃至六一爾時諸病比丘須用果藥乃至諸比丘果藥謂伊蘭迦摹撥胡椒柯子川練餘甘子五達婆羅或其他果藥于嚼食毋資于嚼食于噉食毋資于噉食乃至七一爾時諸病比丘須樹脂藥乃至諸比丘樹脂藥謂濱具濱具樹脂濱具尸婆提迦達迦達迦婆提達迦胖離薩周拉沙或其他樹脂藥于嚼食毋資于嚼食乃至八一爾時諸病比丘須用鹽藥乃至諸比丘鹽藥謂海鹽黑鹽岩鹽廚鹽赤鹽或其他鹽藥于嚼食毋資于嚼食于噉食毋資于噉食許受儲至命終應時服用不應時服用者墮惡作九一爾時具壽阿難之和尚具壽毗羅吒獅子患疥癬因黃水固著彼衣身諸比丘以水濕此使離之世尊巡回臥處座處見彼諸比丘以水濕使離彼衣見而至彼諸比丘住處言彼諸比丘曰諸比丘此比丘患何病耶此具壽患疥癬為黃水固著彼衣身我等以水濕此使離之二時世尊由此因緣而說法告諸比丘曰諸比丘患癢疔膿疥于身有惡臭者許用粉藥無病者用牛糞粘土顏料諸比丘許用臼與杵一一爾時諸病比丘須用過篩粉藥乃至諸比丘許用篩須用細軟乃至諸比丘許布篩二爾時一比丘患非人病阿闍梨和尚雖看護彼亦不能愈彼往屠豬場食生肉飲生血彼之非人病愈矣彼等以此事白世尊世尊曰諸比丘患非人病時許用生肉生血一一一爾時一比丘患眼疾諸比丘扶彼比丘往大便小便世尊巡回臥處座處見彼諸比丘扶彼比丘往大便小便見而至彼諸比丘住處言彼諸比丘曰諸比丘此比丘有何病耶二此具壽患眼疾我等扶彼往大便小便時世尊依此因緣而說法告諸比丘曰諸比丘許塗藥謂黑塗藥礬塗藥長石塗藥紅土子煤烟須用塗藥混合香料乃至諸比丘許用栴檀零凌香隨時檀達子香蘇子一二一爾時諸比丘以小鉢小皿置細末塗藥蒙上草粉細塵諸比丘許用塗藥筐爾時六群比丘用種種塗藥筐金製銀製衆人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得用種種塗藥筐用者墮惡作諸比丘許用骨製角製葦製竹製木製樹脂製果製銅製劫貝製者二爾時塗藥筐無蓋蒙上草粉細塵乃至諸比丘許用蓋蓋落諸比丘許用線縛結于塗藥筐塗藥筐倒蓋開藥落諸比丘許用線縫三爾時諸比丘以指塗抹使眼痛乃至諸比丘許用塗藥篦爾時六群比丘用種種塗藥篦金製銀製衆人忿怒非難猶如享諸欲樂諸在家人乃至諸比丘不得用種種塗藥篦用者墮惡作諸比丘許用骨製乃至劫貝所製者四爾時塗藥篦落地而變粗糙乃至諸比丘許用篦筐爾時諸比丘手持塗藥筐塗藥篦乃至諸比丘許用塗藥筐袋無肩紐乃至諸比丘許用肩紐纏線一三一爾時具壽畢鄰陀婆蹉頭熱乃至諸比丘許用油塗頭不愈乃至諸比丘許灌鼻由鼻流出乃至諸比丘許用灌鼻筒爾時六群比丘用種種灌鼻筒金製銀製衆人忿怒非難猶如享諸欲樂諸在家人乃至諸比丘不得用種種灌鼻筒用者墮惡作諸比丘許用骨製乃至劫貝所製者二灌鼻不得平均諸比丘許用一對灌鼻筒不愈諸比丘許吸烟塗于燈心而吸喉燒焦乃至諸比丘許用烟筒爾時六群比丘用種種烟筒乃至許用劫貝所製者爾時烟筒無蓋蟲入乃至諸比丘許用蓋爾時諸比丘手持烟管諸比丘許用袋一面磨擦乃至諸比丘許用一對袋無肩紐乃至諸比丘許用肩紐纏線一四一爾時具壽畢鄰陀婆蹉腹痛諸醫師言應煮油諸比丘許煮油煮油須用酒混之諸比丘煮油許混酒爾時六群比丘煮油混酒過多飲而醉諸比丘不得飲混過多酒之油飲者應如法治諸比丘若煮油令不知酒之色香味者如此時許飲混酒之油二爾時諸比丘處有甚多混合過多酒份所煮之油時諸比丘心生思念混合過多酒份之油應如何為之耶諸比丘許用于塗藥時具壽畢鄰陀婆蹉處煮甚多油而無盛油容器諸比丘許用三種壺謂銅壺木壺果壺三爾時具壽畢鄰陀婆蹉肢痛諸比丘許用發汗法不愈諸比丘許用法不愈諸比丘許用大發汗法不愈諸比丘許用熱湯藥不愈諸比丘許用浴室四爾時具壽畢鄰陀婆蹉關節痛諸比丘許用出血不愈諸比丘許用角取壞血爾時具壽畢鄰陀婆蹉足破裂諸比丘許用塗足藥不愈諸比丘許用足油爾時有一比丘患瘡諸比丘許用刀須用澀水諸比丘許用澀水須用胡麻膏諸比丘許用胡麻膏五須用敷著布諸比丘許用敷著布須用繃帶諸比丘許用繃帶瘡癢諸比丘許用芥子粉撒之瘡爛諸比丘許燻瘡肉隆起諸比丘許用鹽片斷腐瘡不愈合諸比丘許用瘡油油流出彼等以此事白世尊世尊曰諸比丘許用亞麻布治療其他一切瘡六爾時有一比丘被蛇咬彼等以此事白世尊世尊曰諸比丘可與四種污物即屎尿灰粘土時諸比丘心生思念此等不應受耶或應受耶彼等以此事白世尊世尊曰諸比丘若有施與者即受之若無施與者許自取用之爾時有一比丘飲毒諸比丘許令飲尿時諸比丘心生思念此不應受耶或應受耶諸比丘若作者自受時受已成不須復受七爾時有一比丘因毒藥而病諸比丘許令飲著犂畦土煎汁爾時有一比丘便祕諸比丘許令飲炒米灰汁爾時有一比丘患黃疸病諸比丘許令飲浸牛溲之呵利勒汁爾時有一比丘患皮膚病諸比丘許塗用香料爾時有一比丘身體液多諸比丘許飲用吐下藥須用澄明稀粥諸比丘許用澄明稀粥須用天然豆汁諸比丘許用天然豆汁須用人工處理與天然豆汁諸比丘許用人工處理與天然豆汁須用肉汁諸比丘許用肉汁一五一爾時具壽畢鄰陀婆蹉欲于王舍城邊清掃山崖作窟室時摩竭國洗尼瓶沙王至具壽畢鄰陀婆蹉住處至而敬禮具壽畢鄰陀婆蹉坐于一面坐一面已摩竭國洗尼瓶沙王言具壽畢鄰陀婆蹉曰長老何所為耶大王清掃山崖欲作窟窒尊者須用守園人耶大王世尊不許用守園人若爾白世尊後報我唯唯大王具壽畢鄰陀婆蹉答摩竭國洗尼瓶沙王二時具壽畢鄰陀婆蹉說法教示勸導獎勵使摩竭國洗尼瓶沙王慶喜時摩竭國洗尼瓶沙王聞具壽畢鄰陀婆蹉說法教示勸導獎勵慶喜已從座而起敬禮具壽畢鄰陀婆蹉右繞而去時具壽畢鄰陀婆蹉遣使白世尊曰摩竭國洗尼瓶沙王欲施與守園人應如何為之耶時世尊依此因緣說法告諸比丘曰諸比丘許受守園人三摩竭國洗尼瓶沙王至具壽畢鄰陀婆蹉住處至而敬禮具壽畢鄰陀婆蹉坐于一面坐一面已摩竭國洗尼瓶沙王言具壽畢鄰陀婆蹉曰世尊許用守園人否許大王若爾我施守園人與尊者時摩竭國洗尼瓶沙王雖約定施守園人于具壽畢鄰陀婆蹉但忘之矣久後憶念告一事務大臣曰我約施守園人于尊者施與守園人耶大王未施守園人于尊者是今日前幾日事耶四時彼大臣將日數告摩竭國洗尼瓶沙王曰大王五百日也若爾施與尊者五百守園人唯唯大王彼大臣應諾摩竭國洗尼瓶沙王施與具壽畢鄰陀婆蹉五百守園人因此而成一村邑故此稱守園人村亦名畢鄰陀村爾時具壽畢鄰陀婆蹉依此村而住時具壽畢鄰陀婆蹉于早晨著下裳持衣鉢為乞食而入畢鄰陀村五爾時是村行祭禮諸童女飾身著華鬘而遊戲時具壽畢鄰陀婆蹉順次乞食往畢鄰陀村到一守園人住處坐所設座爾時彼守園人之妻有女見他諸童女飾身著華鬘遊戲而號泣言與我華鬘與我華鬘時具壽畢鄰陀婆蹉言彼守園人之妻曰何故此童女號泣耶見他諸童女身飾著華鬘遊戲故此童女號泣而言與我華鬘與我華鬘我等貧困者何處得華鬘何處得莊嚴六時具壽畢鄰陀婆蹉取一草輪言彼守園人之妻曰將此草輪置彼童女頭上時彼守園人妻以彼草輪置于彼童女頭上即成為金華鬘端麗可樂殊妙如此金華鬘即王之後宮亦未曾有衆人告摩竭國洗尼瓶沙王曰大王某甲守園人家有金華鬘端麗可樂殊妙如此金華鬘即大王後宮亦未曾有彼貧困者從何處而得耶必由竊盜而得也時摩竭國洗尼瓶沙王令縛彼守園人一族七復次具壽畢鄰陀婆蹉于早晨著下裳持衣鉢為乞食入畢鄰陀村于畢鄰陀村順次乞食而至彼守園人住處至而問近鄰之人曰彼守園人一族往何處耶彼因金華鬘故為王所縛矣時具壽畢鄰陀婆蹉至摩竭國洗尼瓶沙王住處至已于設座而坐時摩竭國洗尼瓶沙王至具壽畢鄰陀婆蹉坐處至而敬禮具壽畢鄰陀婆蹉坐于一面坐于一面已具壽畢鄰陀婆蹉言摩竭國洗尼瓶沙王曰八大王何故令縛守園人之一族耶彼守園人家有金華鬘端麗可樂殊妙如此金華鬘即我後宮亦未曾有彼貧困者從何處得耶必竊盜而得也時具壽畢鄰陀婆蹉觀想將摩竭國洗尼瓶沙王宮殿變成金色時此一切皆成金製大王汝有如此多金從何處得耶我了知矣此尊者神通威力也如是令釋彼守園人九尊者畢鄰陀婆蹉于王與其衆會示現神通神變上人法衆人歡喜信仰持來五種藥與具壽畢鄰陀婆蹉謂熟酥生酥油蜜糖而具壽畢鄰陀婆蹉本得五種藥乃隨而與其徒衆彼徒衆驕奢隨得藏滿甕瓶盛滿漉水器囊而懸掛于門窗但此等物互相粘著被鼠散亂于精舍衆人巡回精舍時見而忿怒非難諸沙門釋子內藏財物猶如摩竭國洗尼瓶沙王一諸比丘聞彼衆人忿怒非難少欲諸比丘忿怒非難如何諸比丘欲如此驕奢時彼諸比丘以此事白世尊世尊曰諸比丘諸比丘欲如此驕奢真實耶世尊真實也呵責說法告諸比丘曰病比丘應服藥物謂熟酥生酥油蜜糖等限儲七日必須受用過此者應如法治之藥法誦品終一六一爾時世尊于隨意間住舍衛城後向王舍城遊行具壽疑離越于途中至製糖廠見粉或炭投于糖中見而念混合食物沙糖不相應非時食糖亦不相應而懷疑懼與其徒衆俱不食糖又聽從彼等之人亦不食糖彼等以此事白世尊世尊曰諸比丘為何將粉或炭加于糖中耶世尊為使之堅硬諸比丘若為使之堅硬以粉或炭加于糖中而屬于糖者諸比丘則許隨所好而食糖二具壽疑離越于途中見糞堆上長豆見而念豆不相應豆熟生長故而懷疑懼與其徒衆俱不食豆又聽從彼等者亦不食豆彼等以此事白世尊世尊曰諸比丘豆熟而生長諸比丘但許隨所好而食豆三爾時有一比丘腹痛彼飲鹽酸粥而其腹痛止彼等以此事白世尊世尊曰諸比丘于病者以鹽酸粥無病者以之混合水為飲料皆許飲用一七一時世尊順次遊行到王舍城于此世尊住王舍城竹林迦蘭陀迦園爾時世尊腹痛時具壽阿難以前世尊腹痛時曾用三辛粥而治愈而自調胡麻米豆藏于屋內煮之奉世尊曰世尊請飲三辛粥二如來或知而問或知而不問知時而問或知時不問如來有義而問無義不問如來即毀無義之橋也佛世尊依二相問諸比丘謂說法與為聲聞定學處時世尊問具壽阿難阿難此粥從何處得耶時具壽阿難以彼義白世尊三佛世尊呵責阿難不相合不隨順不相稱非沙門之法不相應非事也阿難汝如何欲如此驕奢耶阿難藏于屋內者不相應也煮于屋內亦不相應自煮亦不相應阿難如此者令未信者不信乃至呵責說法告諸比丘曰諸比丘藏于屋內煮于屋外自煮者不得食食者墮惡作四諸比丘若藏于屋內煮于屋內自煮而食之者墮三事惡作諸比丘若藏于屋內煮于屋內他人煮而食者墮二事惡作諸比丘若藏于屋內煮于屋外自煮而食者墮二事惡作五諸比丘若藏于屋外煮于屋內自煮而食者墮二事惡作諸比丘若藏于屋內煮于屋外他人煮而食之者墮惡作諸比丘若藏于屋外煮于屋內他人煮而食之者墮惡作諸比丘若藏于屋外煮于屋外自煮而食之者墮惡作諸比丘若藏于屋外煮于屋外他人煮而食之者無罪六爾時以世尊禁止自煮諸比丘于更煮疑懼彼等以此事白世尊世尊曰諸比丘許更煮七爾時王舍城飢饉衆人將鹽油米嚼食持來僧園諸比丘將此等物藏于屋外或為害蟲害獸所食或為盜賊取去彼等以此事白世尊世尊曰諸比丘許藏屋內藏于屋內煮于屋外殘食行者圍繞諸比丘于不安中進食彼等以此事白世尊世尊曰諸比丘許于屋內煮飢饉時施者取多與諸比丘者少彼等以此事白世尊世尊曰諸比丘許自煮諸比丘許藏于屋內煮于屋內自煮八爾時有多數比丘于迦尸國住雨安居後往王舍城拜見世尊于途中不得滿足所需粗妙食有甚多嚼食即是果實而無施與者時彼諸比丘呈疲勞相詣王舍城竹林迦蘭陀迦園世尊住處詣而敬禮世尊坐于一面佛世尊與諸客比丘俱相致候乃是常法時世尊言彼諸比丘曰諸比丘堪忍否滿足否來途中不極疲耶諸比丘汝等從何處來耶九世尊滿足我等于迦尸國住雨安居後來王舍城拜見世尊于途中不得滿足極需粗妙食有甚多嚼食即是果實而無施與者故我等呈疲勞相行路而來時世尊依此因緣說法告諸比丘曰諸比丘于有嚼食之果實而無施與者處許人自取持于見施者許受置地上果實而食諸比丘許受所拾果實一八一爾時有一婆羅門得新胡麻新蜜時彼婆羅門心生思念我當將此新胡麻新蜜施與佛為上首諸比丘等時彼婆羅門詣世尊住處詣而與世尊俱相致候交談歡慶感銘之言而立于一面立于一面已彼婆羅門白世尊言瞿曇明日與比丘衆俱受我食世尊默然而許時彼婆羅門知世尊許諾而離去二時彼婆羅門是夜過後調殊妙嚼食噉食而白世尊食時言瞿曇時至也食已備時世尊于早晨時著下裳持衣鉢到彼婆羅門住處到而與比丘衆坐于所設座上時彼婆羅門手捧殊妙嚼食噉食以奉佛為上首比丘衆皆令飽滿以至示謝見世尊食已洗鉢與手而坐于一面坐于一面時世尊說法教示勸導獎勵彼婆羅門使之慶喜離座而去三時世尊離去未久彼婆羅門心生思念我請佛為上首比丘衆為施新胡麻及新蜜但我忘失施與此等我當盛新胡麻新蜜于甕于瓶運至僧園時彼婆羅門令盛胡麻新蜜于甕與瓶而運至僧園詣世尊住處詣而立于一面立于一面已彼婆羅門白世尊言四瞿曇我請佛為上首比丘衆為施新胡麻及新蜜也但我忘失施此等瞿曇受我供奉新胡麻及新蜜婆羅門若爾即施與諸比丘其時飢饉供奉微小而諸比丘體諒謝絶今一切僧伽皆受供奉諸比丘疑懼而未受諸比丘受之食之諸比丘許于食已謝已受用彼自施食者處齎來而非殘食者一九一爾時有歸依具壽跋難陀釋子一家族為僧伽送嚼食言應示跋難陀後施與僧伽爾時具壽跋難陀釋子為乞食而入村里時彼諸人往僧園問諸比丘曰跋難陀在何處耶具壽跋難陀釋子為乞食而入村里矣此嚼食應示跋難陀後施與僧伽彼等以此事白世尊世尊曰諸比丘若爾受而置之以待跋難陀歸來二時具壽跋難陀釋子食前訪問諸家是日日中歸來然以爾時飢饉供奉微小而諸比丘體諒謝絶今一切僧伽皆受供奉諸比丘疑懼而不受世尊曰諸比丘受之食之諸比丘許于食已謝已受用食時以前所受而非殘食者二一爾時世尊于隨意間住王舍城後向舍衛城遊行順次遊行至舍衛城時世尊住舍衛城祇樹給孤獨園爾時具壽舍利弗患熱病時具壽摩訶目犍連至具壽舍利弗住處至而言具壽舍利弗曰舍利弗汝前患熱病時依何而治耶依蓮藕蓮根也時具壽摩訶目犍連譬如力士伸其屈腕屈其伸腕然乃亦如此迅沒于祇樹林現于曼陀祇尼蓮池岸二有象見具壽摩訶目犍連由遠處來見而言具壽摩訶目犍連曰摩訶目犍連來摩訶目犍連善來何所需耶我應以何施與之耶蓮藕蓮根也時彼象命一象言施與尊者所需之蓮藕蓮根時彼象潛入曼陀祇尼蓮池以長鼻拔蓮藕蓮根淨洗而束之至具壽摩訶目犍連住處三時具壽摩訶目犍連譬如力士伸其屈腕屈其伸腕乃亦如此迅沒于曼陀祇尼蓮池岸現于祇樹林彼象亦沒于曼陀祇尼蓮池岸現于祇樹林時彼以蓮藕蓮根呈送具壽摩訶目犍連而沒于祇樹林現于曼陀祇尼蓮池岸時具壽摩訶目犍連以蓮藕蓮根與具壽舍利弗時具壽舍利弗食蓮藕蓮根熱病乃愈而尚多蓮藕蓮根餘存焉四然以爾時飢饉供奉微小而諸比丘體諒謝絶今僧伽皆受供奉諸比丘疑懼而不受彼蓮藕蓮根諸比丘受之食之諸比丘許食已謝已受用林中所生池中所生而非殘食者二一一爾時舍衛城嚼食果實充足但無施者諸比丘疑懼而不食果實彼等以此事白世尊世尊曰諸比丘無種子或已去種子果實雖無施者亦許受用二二一爾時世尊于隨意間住舍衛城後向王舍城遊行順次遊行到王舍城于此世尊住王舍城竹林迦蘭陀迦園爾時有一比丘患痔病醫師阿迦沙噶嗒施刀時世尊巡回臥處座處到彼比丘精舍二醫師阿迦沙噶嗒見世尊從遠方來見而白世尊言瞿曇來觀此比丘大便道如大蜥蜴口然時世尊心念此愚人愚弄我默然而還依此因緣集會比丘衆問諸比丘曰諸比丘此精舍有病比丘否世尊此處有諸比丘彼比丘患何病耶彼具壽患痔病醫師阿迦沙噶嗒曾施刀三佛世尊呵責曰諸比丘彼愚人之所為不相合不隨順不相稱非沙門法不相應非事諸比丘如何彼愚人于密處施刀耶諸比丘密處皮膚柔軟傷既難治刀亦難施諸比丘如此令未信者不信乃呵責說法告比丘等曰諸比丘于密處不得用刀用者墮偷蘭遮四爾時六群比丘心念世尊禁止刀法而行灌腸少欲諸比丘忿怒非難如何六群比丘行灌腸耶時彼諸比丘以此事白世尊世尊曰諸比丘六群比丘行灌腸真實否世尊真實也乃呵責說法告諸比丘曰諸比丘密處周圍二指處不得行刀法或灌腸行者墮偷蘭遮二三一時世尊于隨意間住王舍城後向波羅㮈國遊行順次遊行到波羅㮈國于此世尊住波羅㮈國仙人墮處鹿野苑其時波羅㮈國有優婆塞蘇卑與優婆夷蘇卑皆有信心而為施者侍者歸依僧伽時優婆夷蘇卑往諸僧園由精舍到精舍由房舍到房舍問諸比丘誰患病耶應為誰持何物來耶二爾時有一比丘服吐下藥時彼比丘言優婆夷蘇卑曰我服吐下藥我須肉味答言善當持來而往家命侍者言往視有存肉否唯唯彼人應諾優婆夷蘇卑巡遊波羅㮈到處不見存肉時彼人到優婆夷蘇卑住處到而言優婆夷蘇卑曰已無存肉今日不殺也三時優婆夷蘇卑心生思念若彼病比丘不得肉味則或加病或喪命也我已應諾若不持往不相應也如是持利刀割髀肉與婢言調理此肉施與某精舍病比丘彼若問我時答曰有病如是以上衣裹髀入後室而臥于牀四時優婆塞蘇卑歸家問婢曰蘇卑在何處耶彼女臥于後室時優婆塞蘇卑到優婆夷蘇卑住處到而言優婆夷蘇卑曰何故而臥耶我有病汝有何病耶時優婆夷蘇卑以彼事告優婆塞蘇卑時優婆塞蘇卑言希有哉未曾有哉此蘇卑有信心有淨心乃至棄捨己肉此女又有何他物不能施耶歡喜踴躍詣世尊住處詣而敬禮世尊坐于一面五坐于一面已優婆塞蘇卑白世尊言世尊明日請比丘衆俱受我食世尊默然而許之時優婆塞蘇卑知世尊已許即從座起敬禮世尊右繞而去時優婆塞蘇卑于是夜過後調殊妙嚼食噉食白世尊曰時到已調食時世尊于早晨著下裳持鉢衣到優婆塞蘇卑住處到而與諸比丘俱坐于所設座上六時優婆塞蘇卑詣世尊在處詣而敬禮世尊立于一面立于一面時世尊言優婆塞蘇卑曰蘇卑在何處耶世尊有病若爾令前來世尊不能若爾抱來時優婆塞蘇卑抱優婆夷蘇卑來彼女見世尊時大傷即愈皮膚長成身毛已生七時優婆塞蘇卑優婆夷蘇卑言希有哉未曾有哉如來有大神變有大威力一見世尊大傷即愈皮膚長成身毛已生歡喜踴躍手捧殊妙嚼食噉食奉以佛為上首比丘衆令飽滿至示謝見世尊食已洗鉢與手已乃坐于一面時世尊說法教示勸導獎勵優婆塞蘇卑優婆夷蘇卑令彼慶喜即從座起離去八時世尊依此因緣于此時機令集會比丘衆問諸比丘諸比丘誰向優婆夷蘇卑乞肉耶如此說時彼比丘白世尊言我向優婆夷蘇卑乞肉比丘持來耶世尊持來比丘汝食耶世尊我食矣比丘汝觀察否世尊我未觀察九佛世尊呵責曰愚人汝如何不觀察而食肉耶愚人汝食人肉也愚人如此令未信者不信乃至呵責而說法告諸比丘曰諸比丘有具信心具淨心之人彼等捨棄己肉諸比丘不得食人肉食者墮偷蘭遮諸比丘不觀察不得食肉食者墮惡作一爾時王之象死時當飢饉衆人食象肉以象肉與往乞食之諸比丘諸比丘食象肉衆人忿怒非難如何諸沙門釋子食象肉耶象乃王兵衆若王了知應不悅彼等彼等以此事白世尊世尊曰諸比丘不得食象肉食者墮惡作一一爾時王之馬死時當飢饉衆人食馬肉以馬肉與往乞食之諸比丘諸比丘食馬肉衆人忿怒非難如何諸沙門釋子食馬肉耶馬乃王之兵衆若王了知應不悅彼等彼等以此事白世尊世尊曰諸比丘不得食馬肉食者墮惡作一二爾時正當飢饉衆人食狗肉以狗肉與往乞食之諸比丘諸比丘食狗肉衆人忿怒非難如何諸沙門釋子食狗肉耶狗乃可惡嫌厭者也彼等以此事白世尊世尊曰諸比丘不得食狗肉食者墮惡作一三爾時正當飢饉衆人食蛇肉以蛇肉與往乞食之諸比丘諸比丘食蛇肉衆人忿怒非難如何諸沙門釋子食蛇肉耶蛇乃可惡嫌厭者也又蘇拔沙龍王詣世尊住處詣而敬禮世尊立于一面立于一面已蘇拔沙龍王白世尊言龍有無信心無淨心者彼等以傷害諸比丘善哉不得令諸尊者食蛇肉時世尊說法教示蘇拔沙龍王乃至右繞離去時世尊依此因緣說法告諸比丘曰諸比丘不得食蛇肉食者墮惡作一四爾時諸獵夫殺獅子而食其肉以獅子肉與往乞食之諸比丘諸比丘食獅子肉住于林中獅子循獅子肉香而襲諸比丘彼等以此事白世尊世尊曰諸比丘不得食獅子肉食者墮惡作一五爾時諸獵夫殺虎乃至殺豹乃至殺熊乃至殺鬣狗而食其肉以虎乃至鬣狗肉與乞食之諸比丘諸比丘食虎乃至鬣狗肉住于林中虎乃至鬣狗循虎乃至鬣狗肉香而襲諸比丘彼等以此事白世尊世尊曰諸比丘不得食虎乃至鬣狗肉食者墮惡作二四一時世尊于隨意間住波羅㮈國後向阿那伽賓頭國遊行與大比丘衆一千二百五十人俱爾時地方衆人多以車載鹽油米嚼食隨佛為上首比丘衆後曰若當班者即應設食又有五百食殘食者時世尊順次遊行到阿那伽賓頭國二時有一未曾當班婆羅門心生思念謂若當班者即應設食隨佛為上首比丘衆以來已過二月而未輪班我乃單身棄多家事我當觀察食堂調理食堂所無者時彼婆羅門觀察食堂無有二種謂粥與蜜丸也三時彼婆羅門到具壽阿難住處到而言具壽阿難阿難今我未輪班心生思念謂若當班者即應設食隨佛為上首比丘衆以來已過二月而未輪班我乃單身棄多家事我當觀察食堂調理食堂所無者阿難我觀察食堂無有二種謂粥與蜜丸也阿難我若調粥與蜜丸時瞿曇能受否婆羅門若爾我往問世尊四時具壽阿難以此事白世尊世尊曰阿難若爾令調阿難言彼婆羅門曰婆羅門若爾調之時彼婆羅門于是夜過後乃調甚多粥與蜜丸供奉世尊曰瞿曇請受我粥與蜜丸婆羅門若爾施與諸比丘諸比丘疑懼不敢受世尊曰諸比丘受之食之時彼婆羅門以手捧甚多粥與蜜丸奉佛為上首比丘衆令飽滿至示謝見世尊食已洗鉢與手于一面坐五坐于一面已世尊言彼婆羅門曰婆羅門粥有十種功德何者為十耶施粥者施壽施色施樂施力施辨飲粥者滅飢除渴順氣淨腹助化婆羅門粥有如此十種功德六食他施食人善能調御己應時起恭敬以粥施與者賦與此十處謂壽色樂力由此生辨才滅飢渴順氣腹淨助消化善逝讚此食故人若願樂欲享天上樂樂人界幸福應常行施粥七時世尊以如此偈向彼婆羅門隨喜從座起而離去時世尊以此因緣說法告諸比丘曰諸比丘許用粥與蜜丸二五一衆人聞知世尊許用粥與蜜丸彼等早晨調軟粥與蜜丸諸比丘于早晨飽食軟粥蜜丸不好食堂食物爾時有一大臣得新信心明日請佛為上首比丘衆時彼新得信心大臣心生思念我當為一千二百五十比丘調一千二百五十鉢肉應于一一比丘奉一一鉢肉二時彼新得信心大臣于是夜過後調殊妙嚼食噉食及一千二百五十鉢肉以是時白世尊言食時到已調食時世尊于早晨著下裳持衣鉢到彼新得信心大臣家到而與比丘衆俱坐于所設座上三時彼新得信心大臣于食堂供養諸比丘諸比丘言少與少與此新得信心大臣言勿少受我調甚多嚼食噉食及一千二百五十鉢肉而奉一一比丘一一鉢肉受所欲我等非以是故少受我等早晨飽食軟粥蜜丸故此少受四時彼新得信心大臣忿怒非難如何諸尊師受我所招請而亦食他人軟粥耶我非無能施與所欲如是忿怒不悅非難盛滿諸比丘之鉢繼而言請食肉不然持去時彼新得信心大臣手奉嚼食噉食于佛為上首比丘衆令飽滿至示謝見世尊食已洗鉢與手坐于一面坐于一面時世尊說法教示勸導獎勵新得信心大臣使之慶喜即從座起離去五時世尊離去未久彼新得信心大臣心生悔疑生追悔念我有失我無得我有惡得我無善得我忿悶不悅非難而盛滿諸比丘之鉢繼而言食之不然持去我多行善耶行不善耶時彼新得信心大臣詣世尊住處詣而敬禮世尊坐于一面坐于一面已彼新得信心大臣白世尊言于此世尊離去未久我生悔疑生追悔念我有失我無得我有惡得我無善得我忿悶不悅非難而盛滿諸比丘之鉢繼而言食之不然持去我多行善耶行不善耶我多行善耶行不善耶六汝招請佛為上首比丘衆時汝別日多為善一一比丘從汝受一一摶食時汝乃多為善汝生天時彼新得信心大臣言我有得我有善得我多為善我生天歡喜踊躍即從座起敬禮世尊右繞而去七時世尊由此因緣于此時機令集會諸比丘問諸比丘曰諸比丘諸比丘受一人招請而食餘人軟粥真實耶世尊真實也佛世尊呵責曰諸比丘如何諸愚人受一人招請而食餘人軟粥耶諸比丘如此令未信者不信乃至呵責說法告諸比丘曰諸比丘受一人招請則不得食餘人軟粥食者應如法治之二六一時世尊于隨意間住阿那伽賓頭國後向王舍城遊行與大比丘衆一千二百五十人俱其時毗羅吒迦旃從王舍城往阿那伽賓頭途上率五百車皆載滿砂糖壺時世尊見毗羅吒迦旃從遠方來見而離開道路于一樹下坐二時毗羅吒迦旃詣世尊處詣而敬禮世尊立于一面立于一面已毗羅吒迦旃白世尊我欲于一一比丘施與一一砂糖壺迦旃若爾持一砂糖壺來唯唯毗羅吒迦旃應諾世尊持一砂糖壺詣世尊處詣而白世尊持來砂糖壺矣我應如何為之耶迦旃若爾施砂糖與諸比丘三唯唯毗羅吒迦旃應諾世尊施砂糖與諸比丘後白世尊施砂糖與諸比丘于此處殘留甚多砂糖我應如何為之迦旃若爾依諸比丘所欲施與砂糖唯唯毗羅吒迦旃應諾世尊施與諸比丘所欲砂糖後白世尊依諸比丘所欲施與砂糖矣然此處尚餘甚多砂糖我應如何為之耶迦旃若爾以砂糖施令諸比丘飽滿唯唯毗羅吒迦旃應諾世尊以砂糖令諸比丘飽滿少數諸比丘既滿鉢漉水器及囊亦飽滿四時毗羅吒迦旃以砂糖飽滿比丘等後白世尊以砂糖令諸比丘充實飽滿矣然此處尚餘甚多砂糖我應如何為之耶迦旃若爾以砂糖施與諸食殘食者唯唯毗羅吒迦旃應諾世尊以砂糖施與諸食殘食者後白世尊以砂糖施與諸食殘食者矣然此處尚餘甚多砂糖我應如何為之耶迦旃若爾依諸食殘食者所欲施與砂糖五唯唯毗羅吒迦旃應諾世尊施與諸食殘食者所欲砂糖後白世尊雖施與諸食殘食者所欲砂糖然此處尚餘甚多砂糖我應如何為之耶迦旃若爾以砂糖飽滿諸食殘食者少數諸食殘食者甕瓶既滿籠襜亦滿六時毗羅吒迦旃以砂糖飽滿諸食殘食者後白世尊以砂糖飽滿諸食殘食者矣但此處尚餘甚多砂糖我應如何為之耶迦旃我不見天魔梵天世間沙門婆羅門天人群生中有食此砂糖正得消化者但除如來與如來聲聞迦旃若爾汝將此砂糖棄于無草地上或沈于無蟲水中唯唯毗羅吒迦旃應諾世尊將彼砂糖沈于無蟲水中七時彼砂糖投于水中矣沸騰出火焰譬如終日燒熱鐵板投水中時沸騰出火焰彼砂糖投水中亦如此沸騰出火焰時毗羅吒迦旃恐懼身毛豎立詣世尊處詣而敬禮世尊坐于一面八坐于一面時世尊與毗羅吒迦旃依次說示謂施論戒論生天論諸欲過患邪害雜染及出離功德世尊知毗羅吒迦旃生堪任心柔軟心離障心歡喜心明淨心說諸佛本真教法同第一大犍度七六如此毗羅吒迦旃即于其座生遠塵離垢法眼謂凡有集法者皆有此滅法九時毗羅吒迦旃已見法得法知法入法超諸疑惑棄除猶豫而得無畏以行師教不依他緣白世尊奇哉奇哉譬如覆者起同第一大犍度七一如此世尊以種種方便說法我歸依世尊法及比丘衆世尊容我從今日起至命終歸依為優婆塞二七一時世尊次第遊行到王舍城于是世尊住王舍城竹林迦蘭陀迦園爾時王舍城甚多砂糖諸比丘疑懼念世尊許病者用砂糖無病者不然而不敢食砂糖彼等以此事白世尊世尊曰諸比丘許病者用砂糖無病者用砂糖水二八一時世尊于隨意間住王舍城後向巴連弗邑遊行與大比丘衆一千二百五十人俱時世尊次第地遊行至巴連弗邑巴連弗邑優婆塞聞世尊至巴連弗邑時巴連弗邑諸優婆塞詣世尊住處詣而敬禮世尊坐于一面坐于一面時世尊對巴連弗邑優婆塞說法教示勸導獎勵令之慶喜二時巴連弗邑諸優婆塞慶喜世尊說法教示勸導獎勵時白世尊世尊與比丘衆俱請至休息堂世尊默然許之時巴連弗邑諸優婆塞知世尊默許即從座起敬禮世尊右繞而去去休息堂至休息堂已遍敷臥具設座置水瓶挑油燈詣世尊住處詣而敬禮世尊立于一面三立于一面已巴連弗邑諸優婆塞白世尊于休息堂遍敷臥具設座置水瓶挑油燈世尊請知是時時世尊于早晨著下裳持衣鉢與比丘衆俱到休息堂到而洗足入休息堂近中柱東面而坐巴連弗邑諸優婆塞洗足入休息堂近東壁面向世尊而坐四時世尊告巴連弗邑諸優婆塞曰諸居士破戒壞戒有五過患何者為五耶諸居士于此處破戒壞戒者將因放逸而大失財此破戒壞戒第一過患也諸居士其次破戒壞戒者起惡名聲此破戒壞戒第二過患也諸居士其次破戒壞戒者到隨一衆會或剎帝利衆會或婆羅門衆會或居士衆會或到沙門衆會皆至畏懼羞愧此破戒壞戒第三過患也諸居士其次破戒壞戒者迷亂而死此破戒壞戒第四過患也諸居士其次破戒壞戒者身壞死後生惡處惡趣墮處地獄此破戒壞戒第五過患也諸居士如此破戒壞戒有五過患五諸居士持戒成戒者有五功德何者為五耶諸居士此處持戒成戒者不放逸而得大財蘊此持戒成戒第一功德也諸居士其次持戒成戒者起善名聲此持戒成戒第二功德也諸居士其次持戒成戒者到隨一衆會或剎帝利衆會或婆羅門衆會或居士衆會或沙門衆會皆無畏無羞此持戒成戒第三功德也諸居士其次持戒成戒者不迷亂而死此持戒成戒第四功德也諸居士其次持戒成戒者身壞死後生善趣天界此持戒成戒第五功德也六時世尊至夜更說法教示勸導獎勵巴連弗邑諸優婆塞令之慶喜居士等夜深矣知是時唯唯巴連弗邑諸優婆塞即從座起敬禮世尊右繞而去七時巴連弗邑諸優婆塞離去未久世尊入于空屋爾時摩竭國大臣須尼陀與禹舍為防跋祇族而于巴連弗邑築城世尊深夜凌晨早起以清淨超人天眼見多數諸天圍封宅地有大勢力諸天傾心與有大勢力王者與王大臣于封宅地處建築住宅中位諸天傾心與有中位王者與王臣于封宅地處建築住宅下劣諸天傾心與下劣王者與王臣于封宅地處建築住宅八時世尊告具壽阿難曰阿難誰在築巴連弗邑城耶摩竭國大臣須尼陀與禹舍為防跋祇族于巴連弗邑築城也阿難譬如與三十三天商量阿難如此摩竭國大臣須尼陀與禹舍為防跋祇族亦于巴連弗邑築城阿難我于此處深夜凌晨早起以清淨超人天眼見多數諸天乃至下劣王與王臣傾心于建