尚食二時世尊由此因緣說法告諸比丘曰諸比丘飢饉穀乏不易乞食之時我許諸比丘藏于屋內煮于屋內自煮從他取而受由供養者家持來之物食時以前所受之物林中所生之物池中所生之物許食用之我今日起廢棄此等諸比丘藏于屋內煮于屋內自煮從他取而受之物不得食用食者墮惡作諸比丘由供養者家持來之物食時以前所受之物林中所生之物池中所生之物食訖已謝者雖非餘食亦不得食食者應如法治之三三一爾時地方衆人以車載甚多鹽油米嚼食于僧園境外停為車隊言我等當輪班調食說時即大雲騰起時彼衆人至具壽阿難住處至而言具壽阿難阿難車載甚多鹽油米嚼食住此處時大雲騰起阿難應如何為之耶時具壽阿難以此事白世尊世尊曰二阿難若爾僧伽于精舍近處協定相應僧伽所欲之地令住其處即精舍平覆屋殿樓樓房地窟也諸比丘協定應如此為之聰明賢能比丘應白僧伽言諸大德請聽我言若僧伽機熟僧伽當協定某甲精舍為相應地此乃表白諸大德請聽我言僧伽協定某甲精舍為相應地協定某甲精舍為相應地具壽聽者默然不聽者請言僧伽協定某甲精舍為相應地具壽聽故默然我如此了知三爾時衆人于彼協定之相應地煮粥煮食調汁切肉劈薪世尊夜分凌晨時起聞高聲大聲如鴉鳴聲聞而言具壽阿難曰阿難彼高聲大聲如鴉鳴聲為何耶四今衆人于彼協定相應之地煮粥煮食調汁切肉劈薪世尊此彼高聲大聲如鴉鳴聲也時世尊依此因緣說法告諸比丘曰諸比丘協定相應之地不得使用用者墮惡作諸比丘許三種相應之地依宣告者備偶然使用者及在家人贈與者五爾時具壽耶蘇奢病為彼持藥來諸比丘置屋外為鼠所咬為盜賊持去彼等以此事白世尊世尊曰諸比丘許用協定相應之地諸比丘許四種相應之地依宣告者備偶然使用者在家人贈與者及協定者是也二十四事誦品終三四一爾時于跋提城住居士旻荼彼有如此神通威力即洗頭掃除穀倉已坐于戶外使穀從虛空流下盛滿穀倉其妻亦有如此神通威力即坐于一升鍋與汁器之傍供奴僕食用彼女不離座時是食無盡其兒亦有如此神通威力即取盛一千金囊與奴僕六月薪資在彼手中時金囊無盡二其兒婦亦有如此神通威力即坐于四斗籠傍與奴僕六月之食彼女不離座時其食無盡其奴亦有如此神通威力即一犂耕遍七壟也三摩竭國洗尼瓶沙王聞言我領土跋提城住居士旻荼彼有如此神通威力即洗頭掃除穀倉已若坐于戶外穀從虛空流下盛滿穀倉其妻亦有如此神通威力即坐于一升鍋與汁器之傍供奴僕食用彼女不離座時食無盡其兒亦有如此神通威力即取盛一千金之囊與奴僕六月薪資在彼手中時金囊無盡四其兒婦亦有如此神通威力即坐于四斗籠傍與奴僕六月之食彼女不離座時其食無盡其奴亦有如此神通威力即一犂耕遍七壟也五時摩竭國洗尼瓶沙王告一庶務大臣言我領土跋提住居士旻荼彼有如此神通威力即頭遍七壟也往見之汝見則如我自見唯唯大王彼大臣應諾摩竭國洗尼瓶沙王率四部兵前往跋提六次第到達跋提居士旻荼住處至而言居士旻荼曰居士王命我言我領土如我自見居士我欲見汝之神通威力時居士旻荼洗頭掃除穀倉坐于戶外時穀從虛空流下盛滿穀倉居士我見汝神通威力已欲見汝妻神通威力七時居士旻荼命妻言若爾供食于四部兵時居士旻荼之妻坐于一升鍋與汁器傍以食供四部兵彼女不離座時彼食無盡居士我見汝妻神通威力已欲見汝兒神通威力八時居士旻荼命兒言若爾與四部兵六月薪資時居士旻荼之兒取盛一千金囊與四部兵六月薪資在彼手中時金囊無盡居士我見汝兒神通威力已欲見汝兒婦神通威力九時居士旻荼命兒婦言若爾與四部兵六月之食時居士旻荼兒婦坐于四斗籠傍與四部兵六月之食彼女不離座時其食無盡居士我見汝兒婦神通威力已欲見汝奴神通威力我奴神通威力應于田地見之居士且止我已見汝奴之神通威力矣時彼大臣率四部兵再還王舍城至摩竭國洗尼瓶沙王住處至而以此事白洗尼瓶沙王一時世尊于隨意間住毗舍離後向跋提遊行與一千二百五十大比丘俱時世尊順次遊行到跋提于此世尊住跋提勝葉林一一居士旻荼聞言沙門瞿曇釋子由釋迦族出而出家已至跋提住跋提勝葉林彼世尊瞿曇如此善名播揚彼世尊應供等正覺明行具足善逝世間解無上調御丈夫天人師佛世尊也彼于天魔梵之此世間沙門婆羅門人天之有情界說自證知現證說初善中善後善而具義理備文句教法說純一圓滿悉淨梵行往見如此阿羅漢誠善事也一二時居士旻荼駕善美車乘善美車隨善美車從跋提出拜見世尊多數諸外道見居士旻荼從遠方來見居士旻荼言居士汝往何處耶我往拜見世尊沙門瞿曇也居士汝是作業論者如何往見非作業論者沙門瞿曇耶居士沙門瞿曇乃非作業論者說非作業法以教諸弟子者也一三時居士旻荼心生思念彼必是世尊應供等正覺者也所以此諸外道嫉妒也凡車可通即乘車往然後下車步行詣世尊住處詣而敬禮世尊坐于一面坐于一面時世尊為居士旻荼順次說法謂施論同第一大犍度七一以行師教不依他緣白世尊言奇哉乃至世尊容我從今日起至命終歸依為優婆塞世尊明日與比丘衆俱受我請食世尊默許一四時居士旻荼知世尊默許從座而起敬禮世尊右繞而去時居士旻荼是夜過後調殊妙嚼食噉食以白世尊時到已備調食時世尊于早晨著下裳持鉢衣至居士旻荼家至而與比丘衆俱坐于所設座上一五時居士旻荼之妻兒兒婦奴僕詣世尊處詣而敬禮世尊坐于一面世尊為彼等順次說法乃至以行師教不依他緣白世尊言乃至于此處我等歸依世尊及法與比丘衆世尊容我等從今日起至命終歸依為優婆塞一六時居士旻荼于佛為上首比丘衆親手供養殊妙嚼食噉食令飽滿至示謝見世尊食已洗鉢與手坐于一面坐于一面已居士旻荼白世尊言世尊住跋提間我于佛為上首比丘衆常恆以食供養時世尊說法教示居士旻荼使之慶喜即從座起離去一七時世尊于隨意間住跋提後未咨居士旻荼而與大比丘衆一千二百五十人俱向阿牟多羅國遊行居士旻荼聞世尊與大比丘衆一千二百五十人俱向阿牟多羅國遊行時居士旻荼命奴僕等言以車載多量鹽油米嚼食來及率一千二百五十放牛人與一千二百五十牝牛來同見世尊于所見處以鮮乳食供養一八時居士旻荼于途中曠野見及世尊時居士旻荼詣世尊處詣而敬禮世尊立于一面立于一面已居士旻荼白世尊言世尊明日與比丘衆俱受我請食世尊默許時居士旻荼知世尊默許敬禮世尊右繞而離去時居士旻荼是夜過後調殊妙嚼食噉食白世尊時到已調食一九時世尊于早晨著下裳持鉢衣到居士旻荼住處到而與比丘衆俱坐于所設座上時居士旻荼令一千二百五十放牛人言牽一一牝牛奉一一比丘以鮮乳供養時居士旻荼于佛為上首比丘衆親手供養殊妙嚼食噉食及鮮乳令飽滿至示謝諸比丘疑懼而不受乳世尊曰諸比丘受之食之二時居士旻荼于佛為上首比丘衆親手供養殊妙嚼食噉食及鮮乳令飽滿至示謝見世尊食已洗鉢與手坐于一面坐于一面已居士旻荼白世尊言道有曠野乏水乏食無道路糧不易往善哉世尊許諸比丘道路糧時世尊說法教示使之慶喜即從座起而離去二一時世尊以此因緣說法告諸比丘曰諸比丘許五種牛乳即乳酪生酥熟酥醍醐也諸比丘道路有曠野乏水乏食無道路糧不易往諸比丘許求道路糧求需米者米需菽者菽需豆者豆需鹽者鹽需糖者糖需油者油需醍醐者醍醐諸比丘有具信心具淨心衆人彼等以黃金授與相應者言以此施與相應尊者諸比丘以此若得相應者許受之諸比丘但以任何方便亦不得受金銀此我言也三五一時世尊順次遊行到阿摩那螺髻梵志翅聞言沙門瞿曇釋子由釋迦族出而出家至阿摩那住于阿摩那彼世尊瞿曇如此善名遍揚乃至見如此阿羅漢善事也時螺髻梵志翅心生思念我應為沙門瞿曇持何而往耶二時螺髻梵志翅心生思念彼婆羅門中諸古仙是真言作者真言誦者今日婆羅門嘗唱誦彼等所作諸古咒文且集成今日隨唱隨誦所說隨說所言隨言之文句古仙者阿咤摩婆摩婆摩提婆毗沙蜜多耶婆提伽鴦耆羅跋羅皤闍婆悉咤迦葉婆咎也彼等雖止夜食亦離非時食然受如此飲料三沙門瞿曇亦止夜食離非時食沙門瞿曇亦受如此飲料乎如是調甚多飲料裝于擔杆詣世尊住處詣而與世尊互相致候交談歡喜感銘之言立于一面立于一面已螺髻梵志翅白世尊言瞿曇請受我食翅若爾即施與諸比丘諸比丘疑懼不受諸比丘受之食之四時螺髻梵志翅于佛為上首僧伽親手供養多量飲料令飽滿至示謝見世尊洗手與鉢坐于一面坐于一面時世尊為螺髻梵志翅說法教示使之慶喜時螺髻梵志翅聞世尊說法教示使之慶喜時白世尊言瞿曇明日與比丘衆俱受我請食五翅有大比丘衆一千二百五十人且汝信仰婆羅門也螺髻梵志翅再次白世尊言瞿曇有大比丘衆一千二百五十人而我信仰婆羅門也縱然明日亦與比丘衆俱受我請食翅大比丘衆信仰也螺髻梵志翅三次白世尊言瞿曇有大比丘衆受我請食世尊默許時螺髻梵志翅知世尊默許從座起而離去六時世尊依此因緣說法告諸比丘曰諸比丘許八種飲料謂菴婆果漿閻浮果漿俱羅果漿芭蕉漿蜜漿蒲桃果漿舍樓伽漿波樓果漿也諸比丘許一切果汁但除穀汁諸比丘許一切葉汁但除菜汁諸比丘許一切花汁但除蜜花汁諸比丘許甘蔗汁七時螺髻梵志翅是夜過後于自己庵室調殊妙嚼食噉食白世尊瞿曇時到請食調食時世尊于早晨著下裳持鉢衣至螺髻梵志翅庵室至而與比丘衆俱坐于所設座上時螺髻梵志翅于佛為上首比丘衆親手供養殊妙嚼食噉食令飽滿至示謝見世尊食已洗手及鉢坐于一面八坐于一面時世尊以偈隨喜螺髻梵志翅曰天祠供養火為最婆羅門書薩鞞帝于諸人中王為首諸江河中海第一諸星宿中月為元于照明中日絶貴于願福德諸聖者僧伽至上無倫比時世尊以此等偈隨喜螺髻梵志翅已即從座起離去三六一時世尊于隨意間住阿摩那後與大比丘衆一千二百五十人俱向拘尸那遊行拘尸那摩羅子等聞世尊與大比丘衆一千二百五十人俱來拘尸那彼等相約而言若有不迎世尊者罰五百金爾時有摩羅子盧夷者具壽阿難友也時世尊順次遊行到拘尸那二時拘尸那摩羅子等迎世尊時摩羅子盧夷迎世尊至具壽阿難住處至而敬禮具壽阿難立于一面立于一面時具壽阿難言摩羅子盧夷曰盧夷汝迎世尊甚善阿難我非敬佛法僧諸親族相約若有不迎世尊者罰五百金阿難我唯恐親族受罰故來迎世尊時具壽阿難不悅摩羅子盧夷為何如此言耶三時具壽阿難詣世尊住處詣而敬禮世尊坐于一面坐于一面已具壽阿難白世尊言此處摩羅子盧夷是卓著有名人也如此有名人若于此法與律得信心者即威力大也善哉世尊佑助摩羅子盧夷于此法與律得生信心阿難如來佑助摩羅子盧夷于此法與律得生信心非難事也四時世尊令慈心遍滿摩羅子盧夷乃從座起而入精舍時摩羅子盧夷以蒙世尊慈心遍滿譬如犢于母牛從精舍至精舍從房舍至房舍問諸比丘言彼世尊應供等正覺今在何處耶我等欲見彼世尊應供等正覺者盧夷彼處有閉戶精舍汝須靜往徐入外廊謦咳叩門世尊當為汝開門矣五時摩羅子盧夷靜詣彼閉戶精舍徐入外廊謦咳叩門世尊即為開門時摩羅子盧夷進入精舍敬禮世尊坐于一面坐于一面時世尊為摩羅子盧夷順次說法謂施論乃至以行師教不依他緣白世尊言善哉請唯受我衣服飲食臥具醫藥拒受他人者盧夷已有學智有學見見法諸人亦如汝思念請唯受我衣服飲食臥具醫藥他人者拒受盧夷故汝與他與皆受也六時拘尸那相續行供養殊妙飲食時摩羅子盧夷未值輪班心生思念我當觀察食堂應調食堂所無者時摩羅子盧夷觀察食堂無有二種菜與堅餅時摩羅子盧夷至具壽阿難住處至而言具壽阿難阿難此處未值輪班心生思念我當觀察食堂應調食堂所無者阿難我觀察食堂無有二種菜與堅餅阿難我若調菜與堅餅者世尊受否盧夷若爾我請問世尊七時具壽阿難以此事白世尊世尊曰阿難若爾即調阿難言盧夷若爾即調時摩羅子盧夷是夜過後調多量菜與堅餅供奉世尊而言世尊請受我菜與堅餅盧夷若爾施與諸比丘諸比丘疑懼不敢受世尊曰諸比丘受之食之八時摩羅子盧夷以多量菜與堅餅親手供養佛為上首比丘衆令飽滿至示謝見世尊洗手與鉢坐于一面坐于一面已世尊為摩羅子盧夷說法教示使之慶喜即從座起離去時世尊依此因緣說法告比丘等曰諸比丘許用一切菜及堅餅三七一時世尊于隨意間住拘尸那後與大比丘衆一千二百五十人俱向阿頭遊行爾時有一老年出家人住于阿頭舊為剃頭師彼有二兒聲音美妙而有辨才堪能承師傳己身之剃頭業悉能善巧二彼老年出家人聞言世尊與大比丘衆一千二百五十人俱來阿頭時彼老年出家人言彼二兒曰世尊與大比丘衆一千二百五十人俱來阿頭汝等即往手持剃具家家巡回以瓶集鹽油大米嚼食世尊若來我等作粥三唯唯彼二兒應諾彼老年出家人即持剃具家家巡回以瓶集鹽油米嚼食衆人見彼二兒聲音美妙而有辨才不欲行事者亦承起行之承行並給與甚多時彼二兒集得多量鹽油米嚼食矣四時世尊順次遊行到阿頭于是世尊住阿頭打穀場時彼老年出家人是夜過後調多量粥供奉世尊言世尊請受我粥如來知而故問同第一大犍度三一四制定聲聞學處時世尊言彼老年出家人曰比丘此粥從何處得耶時彼老年比丘以彼事白世尊五佛世尊呵責曰愚人非相合非隨順非相稱非沙門法非相應非事也愚人如何汝出家而受不相應物耶愚人如此令未信者不信呵責說法告諸比丘曰諸比丘出家不得受不相應物受者墮惡作諸比丘雖是舊剃師亦不得藏剃刀藏者墮惡作三八一時世尊于隨意間住阿頭後向舍衛城遊行次第遊行至舍衛城于是世尊住舍衛城祇樹給孤獨園爾時舍衛城多豐富果實嚼食時諸比丘心生思念世尊許果實嚼食耶或不許耶以此事白世尊世尊曰諸比丘許一切之果實嚼食三九一時以僧伽所有之種子種一在家人地以一在家人所有之種子種僧伽地彼等以此事白世尊世尊曰諸比丘以僧伽所有之種子種一在家人地者應與部分後受用以一在家人所有之種子種僧伽地者應與部分後受用四一爾時于各種事諸比丘心生疑懼世尊許耶或不許耶彼等以此事白世尊世尊曰諸比丘如此我雖未禁曰不相應若順不相應事違相應事者此汝等為不相應也諸比丘如此我雖未禁曰不相應若隨順相應事違不相應事者此汝等為相應也諸比丘如此我雖未許曰相應若順不相應事違相應事者此汝等為不相應也諸比丘如此我雖未許曰相應若順相應事違不相應事者此汝等為相應也二時諸比丘心生思念若以時藥和合于時分藥者是相應耶是不相應耶若以時藥和合于七日藥者是相應耶是不相應耶若以時藥和合于盡形壽藥者是相應耶是不相應耶若以時分藥和合于七日藥者是相應耶是不相應耶若以時分藥和合于盡形壽藥者是相應耶是不相應耶若以七日藥和合于盡形壽藥者是相應耶是不相應耶彼等以此事白世尊世尊曰三諸比丘以時藥和合時分藥即日受者于正時為相應但于非時即不相應諸比丘以時藥和合七日藥即日受者于正時為相應但于非時即不相應諸比丘以時藥和合于盡形壽藥即日受者于正時為相應但于非時即不相應諸比丘以時分藥和合于七日藥即日受者于時分為相應但過時分者即不相應諸比丘以時分藥和合于盡形壽藥即日受者于時分為相應但過時分者即不相應諸比丘以七日藥和合于盡形壽藥者于七日為相應但過七日者即不相應此犍度有一百另六事攝頌曰秋時病非時脂根及粉末澀葉果樹脂鹽牛糞粉末篩肉及塗藥香料塗藥筐蓋篦及篦筐袋肩紐纏絲頭油及灌鼻灌鼻筒烟筒蓋袋煮油酒混過多塗藥壺發汗法大發汗藥湯浴室血及角塗足藥足油刀澀胡麻膏敷著布繃帶芥子粉燻片瘡油亞麻布污物受及屎作者土灰汁溲浸呵利勒香料吐下藥澄明自然汁人工自然汁肉汁及山崖守園人七日糖豆及酸粥自煮及更煮再許與飢饉果實並胡麻嚼食前時食熱病無種子痔灌腸蘇卑人肉象馬狗蛇獅子虎豹熊及鬣狗肉輪班粥得新餘人須尼陀糖及休息堂此菴婆婆梨隸車人恆河拘利村諦論為己殺之肉豐饒及再禁雲及耶蘇奢旻荼並牛乳乃至道路糧翅及菴婆閻浮與俱羅芭蕉蜜蒲桃舍樓伽波樓乃至菜堅餅阿頭剃頭師舍衛城果實種子各種事以及時藥等
