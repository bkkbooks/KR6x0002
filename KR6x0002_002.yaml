body:
  text: 第二布薩犍度一一爾時佛世尊在王舍城耆闍崛山其時諸外道梵志于上半月之十四日十五日八日集會說法衆人為聽法至彼等處衆人于諸外道梵志得愛念得信心諸外道梵志即得宗徒二時摩竭國洗尼瓶沙王靜居宴默心生思念今諸外道梵志于上半月之十四日十五日八日集會說法衆人為聽法而至彼等處衆人于外道梵志得愛念得信心諸外道梵志即得宗徒當令諸尊者于上半月十四日十五日八日集會三時摩竭國洗尼瓶沙王詣世尊住處詣而敬禮世尊已坐于一面于一面坐已摩竭國洗尼瓶沙王白世尊言我于此處靜居宴默而心生思念今諸外道梵志尊者等亦于上半月之十四日十五日八日集會可乎四時世尊說法教示勸導獎勵令之慶喜時摩竭國洗尼瓶沙王聞世尊說法教示勸導獎勵而慶喜即從座起敬禮世尊右繞而去時世尊依此因緣于此時機說法告諸比丘曰諸比丘許于上半月之十四日十五日八日集會二一爾時世尊已許上半月之十四日十五日八日集會諸比丘集會默然而坐衆人等前來彼等處聽法衆人忿怒非難如何諸沙門釋子于上半月之十四日十五日八日集會默然而坐猶如啞豬耶集會者應不說法耶諸比丘聞衆人忿怒非難彼諸比丘乃以此事白世尊爾時世尊依此因緣于此時機說法告諸比丘曰諸比丘許于上半月之十四日十五日八日集會說法三一時世尊靜居宴默心生思念我為諸比丘制定學處我當許誦此為波羅提木叉以此為布薩羯磨二時世尊凌晨之時從宴默起依此因緣于此時機說法告諸比丘曰諸比丘今我靜居宴默心生思念我為諸比丘制定學處我當許誦此為波羅提木叉以此為布薩羯磨諸比丘許誦波羅提木叉三諸比丘誦時應如此行之聰明賢能比丘應告僧伽言諸大德請聽我言今日十五日布薩也若僧伽機熟者僧伽當行布薩誦波羅提木叉何為僧伽最初行事耶具壽等應告己清淨矣我應誦波羅提木叉我等全體一一于此處作意諦聽之有罪者應發露無罪者靜默諸具壽靜默故我知清淨正如每一問即有一答于似此會衆中亦如是唱言三次唱言三次已比丘憶念有罪而不發露者即故妄語也故犯妄語者諸具壽是世尊所言障法故已犯罪比丘憶念而欲清淨者應發露之若發露已即得安穩四波羅提木叉者是諸善法元是面是首故名波羅提木叉具壽者是愛語是敬語是尊重崇奉增上語是謂具壽誦者開釋教誨施設建立表白分別顯示是也此者謂波羅提木叉我等全體一一于此處者謂所有會衆長老新參中位是謂我等全體一一于此處諦聽者乃是作意思惟全心存念作意者謂傾聽而一境心心無散亂心不紛擾也五有罪者者于長老新參中位犯五種罪之某一罪或于七罪中犯某罪發露者于僧伽或于衆人或于一人前告白說明開闡顯示無罪者者未犯或犯而已出離也靜默者謂應意可而不得言說也我知清淨者我知持之也六正如每一問即有一答者乃如有一人蒙問一事而作答言此亦如是使會衆知彼問我矣似此會衆者謂比丘會衆也唱言三次者唱言一次唱言二次唱言三次也憶念者謂亦知亦想也有罪者疑犯或犯而未出離也不發露者謂于僧伽或于衆人或于一人前不告白不說明不開闡不顯示七故犯妄語者何為故犯妄語是犯惡作也世尊所言障法者所障者何初靜慮證得之障第二靜慮證得之障第三靜慮證得之障第四靜慮證得之障靜慮解脫三昧三鉢底出出離遠離善法證得之障故者謂以是故也憶念者謂亦知亦想念也欲清淨者謂欲出離欲清淨者也八有罪者疑犯或犯而未出離也發露者謂于僧伽或于衆人或于一人前以發露之若發露已即得安穩者且于何時有安穩耶初靜慮證得之安穩第二靜慮證得之安穩第三靜慮證得之安穩第四靜慮證得之安穩證得靜慮解脫三昧三鉢底出出離遠離善法即得安穩也四一爾時諸比丘以世尊許誦波羅提木叉乃日日誦彼波羅提木叉彼等以此事白世尊世尊曰諸比丘不得日日誦波羅提木叉誦者墮惡作諸比丘准于布薩日誦波羅提木叉二爾時諸比丘以世尊許于布薩日誦波羅提木叉諸比丘于半月即于半月之十四日十五日八日誦波羅提木叉三次彼等以此事白世尊世尊曰諸比丘不得于半月中誦波羅提木叉三次誦者墮惡作諸比丘許半月一次于十四日或十五日誦波羅提木叉五一爾時六群比丘于各自會衆前隨從會衆誦波羅提木叉彼等以此事白世尊世尊曰諸比丘不得于各自會衆前隨從會衆誦波羅提木叉誦者墮惡作諸比丘許和合布薩羯磨二時諸比丘思念世尊許和合布薩羯磨如何始為和合耶一住處耶或一切地耶彼等以此事白世尊世尊曰諸比丘許以一住處為和合三爾時具壽摩訶劫賓那住王舍城近處曼直鹿園時具壽摩訶劫賓那靜居宴默心生思念我往不往布薩往不往僧伽之羯磨然我以第一清淨為清淨四時世尊心知具壽摩訶劫賓那心所思念如力士伸其屈腕屈其伸腕彼亦如是從耆闍崛山隱沒出現于曼直鹿園具壽摩訶劫賓那之前世尊坐于所設座席具壽摩訶劫賓那敬禮世尊而坐一面五于一面坐已世尊告具壽摩訶劫賓那曰劫賓那汝于靜居宴默時心生我往不往布薩往不往僧伽之羯磨然我以第一清淨為清淨之思念否然若汝等婆羅門不恭敬尊重尊奉供養布薩者誰當恭敬尊重尊奉供養布薩耶婆羅門往布薩不得勿往唯唯世尊具壽摩訶劫賓那應諾六時世尊說法教示勸導獎勵具壽摩訶劫賓那使之慶喜已如力士屈其伸腕伸其屈腕彼亦如是隱沒于曼直鹿園具壽摩訶劫賓那前出現于耆闍崛山六一時諸比丘心生思念世尊已制定一住處為和合如何為一住處耶彼等以此事白世尊世尊曰諸比丘許協定境界諸比丘應如此協定應先唱相謂山相石相林相樹相道相蟻垤相河相水相也唱相之後聰明賢能比丘應告僧伽言諸大德請聽我言已唱四方相若僧伽機熟者僧伽依此等協定為同一住處同一布薩境界此表白也二諸大德請聽我言已唱四方相僧伽依此等相定為同一住處同一布薩境界依此等相定為同一住處同一布薩境界具壽聽者默然不聽者請言僧伽依此等相定為同一住處同一布薩境界具壽聽故默然我如此了知七一爾時六群比丘以世尊許定境界而協定過大之境界有四由旬五由旬六由旬諸比丘往布薩有正誦波羅提木叉時到達者有誦已之時到達者有宿于途中者彼等以此事白世尊世尊曰諸比丘不得協定四由旬五由旬六由旬之過大境界如此協定者墮惡作諸比丘許定三由旬為最大境界二爾時六群比丘協定跨河為境界諸比丘往布薩有被水沖去者有鉢被水沖去者有衣被水沖去者彼等以此事白世尊世尊曰諸比丘不得協定跨河為境界如此協定者墮惡作于常有船或有橋處許協定跨河為境界八一爾時諸比丘不作標示但于各個之房舍誦波羅提木叉客比丘等不知或心念今日何處行布薩耶彼等以此事白世尊世尊曰諸比丘不標示時不得于各個之房舍誦波羅提木叉誦者墮惡作諸比丘許以僧伽所欲精舍或平覆屋或殿樓或樓房或地窟協定為布薩堂以行布薩諸比丘應協定如次二聰明賢能比丘應告僧伽言諸大德請聽我言若僧伽機熟者僧伽應以某甲之精舍協定為布薩堂此乃表白諸大德請聽我言僧伽以某甲之精舍協定為布薩堂以某甲之精舍為布薩堂之協定具壽聽者默然不聽者請言僧伽已協定以某甲精舍為布薩堂具壽聽故默然我如是了知三爾時于一住處協定二布薩堂諸比丘于兩處集會心念此處將布薩此處將布薩彼等以此事白世尊世尊曰諸比丘不得于一住處協定二布薩堂協定者墮惡作諸比丘許廢除一處但于他一處行布薩四諸比丘廢除應如是行聰明賢能比丘應告僧伽言若僧伽機熟者僧伽廢除某甲之布薩堂此為表白諸大德請聽我言僧伽廢除某甲之布薩堂僧伽廢除某甲布薩堂具壽聽者默然不聽者請言僧伽廢除某甲布薩堂具壽聽故默然我如是了知九一爾時協定于一極小住處為布薩堂于布薩日大比丘僧團來集會諸比丘等坐協定以外地上聞波羅提木叉時彼諸比丘心生思念世尊規定于經協定布薩堂行布薩而我等坐協定以外地上聞布薩是彼布薩為我等行耶或未行耶彼等以此事白世尊世尊曰諸比丘如人坐地上不論已協定或未協定者若能聞波羅提木叉即為彼行布薩矣二是故諸比丘如一僧伽希求最大布薩堂寬窄若干即令其協定布薩堂如是寬窄諸比丘協定應如此行之應先唱相于唱相已聰明賢能比丘應告僧伽言諸大德請聽我言已唱四方相若僧伽機熟者僧伽應依此等相協定布薩堂最大限量此乃表白諸大德請聽我言已唱四方相僧伽應依此等相協定布薩堂最大限量依此等相協定布薩堂最大限量具壽聽者默然不聽者請言僧伽依此等相協定布薩堂最大限量具壽聽故默然我如是了知一一爾時于一住處在布薩日新參諸比丘首先集會曰長老等未來即去于非時行布薩彼等以此事白世尊世尊曰諸比丘許布薩日長老比丘等率先集會一一一爾時于王舍城同一境界有多住處諸比丘于此爭言于我等住處行布薩令于我等住處行布薩彼等以此事白世尊世尊曰諸比丘此同一境界有多住處諸比丘于此爭言于我等住處行布薩于我等住處行布薩諸比丘是比丘等皆應集會一處施行布薩或應于有長老比丘住處集會而行布薩不得于別衆施行布薩行者墮惡作一二一爾時具壽摩訶迦葉從阿那伽賓頭往王舍城行布薩于途中渡河時險被水所沖去而衣濺濕諸比丘言具壽摩訶迦葉曰如何汝衣濺濕耶我今從阿那伽賓頭往王舍城布薩途中渡河時險被水所沖去故我衣濺濕也彼等以此事白世尊世尊曰諸比丘僧伽協定同一住處同一布薩之境界已令彼僧伽協定彼境界內不離三衣二諸比丘協定應如是行聰明賢能比丘應告僧伽言諸大德請聽我言前僧伽協定同一住處同一布薩之境界已若僧伽機熟者僧伽即應協定于彼境界不離三衣此乃表白諸大德請聽我言先僧伽協定同一住處同一布薩之境界已即彼僧伽協定于此境界不離三衣協定于此境界不離三衣具壽聽者默然不聽者請言僧伽協定于此境界不離三衣具壽聽故默然我如是了知三爾時諸比丘以世尊許協定不離三衣置衣于屋內彼衣遺失被焚被鼠所咬嚙諸比丘乃服惡衣其衣壞薄諸比丘言如何汝諸尊者服惡衣而衣壞薄耶是我等比丘以世尊許協定不離三衣我等置衣屋內彼衣遺失被焚被鼠所咬嚙是故我等服粗惡衣我衣壞薄也彼等以此事白世尊世尊曰諸比丘前僧伽協定同一住處同一布薩之境界已應即令彼僧伽協定境界內不離三衣但除村里與村里近處四諸比丘協定應如是行聰明賢能比丘應告僧伽言諸大德請聽我言前僧伽協定同一住處同一布薩之境界已若僧伽機熟者僧伽協定于此境界不離三衣但除村里與村里近處此乃表白諸大德請聽我言前僧伽協定同一住處同一布薩之境界已僧伽協定于此境界不離三衣但除村里與村里近處協定于此境界不離三衣但除村里與村里近處具壽聽者默然不聽者請言僧伽協定于此境界不離三衣但除村里與村里近處具壽聽故默然我如是了知五諸比丘協定一境界時應先協定同一住處境界後定不離三衣處諸比丘廢除境界時應先廢除不離三衣處然後廢除同一住處境界諸比丘廢除不離三衣處應如是行聰明賢能比丘應告僧伽言諸大德請聽我言前僧伽協定不離三衣矣若僧伽機熟者僧伽可廢除不離三衣處此乃表白諸大德請聽我言前僧伽協定不離三衣處矣此僧伽廢除不離三衣處于廢除不離三衣處具壽聽者默然不聽者請言僧伽廢除不離三衣處具壽聽故默然我如是了知六諸比丘廢除境界應如是行聰明賢能比丘應告僧伽言諸大德請聽我言前僧伽協定同一住處同一布薩之境界已若僧伽機熟者僧伽應廢除此境界此乃表白諸大德請聽我言前僧伽協定同一住處同一布薩之境界已僧伽應廢除此境界于廢除同一住處同一布薩之此境界具壽聽者默然不聽者請言僧伽廢除同一住處同一布薩之此境界具壽聽故默然我如是了知七諸比丘當未協定未建立境界時住村里村落者以其村里之村里境界以其村落之村落境界為同一住處同一布薩境界諸比丘若人于無村落森林以四面七阿阪陀羅為同一住處同一布薩境界諸比丘于一切河無境界于一切海無境界于一切湖無境界諸比丘凡有河海湖處以之為同一住處同一布薩境界者乃一中等身材之人四面灑水所及之地也一三一爾時六群比丘以一境界合前一境界彼等以此事白世尊世尊曰諸比丘彼等既先為之協定境界者其人所作如法不動應理諸比丘彼等若後為之協定境界者其人所作不如法非不動非應理諸比丘不得以一境界合前一境界合者墮惡作二爾時六群比丘以一境界覆前一境界彼等以此事白世尊世尊曰諸比丘彼等既先為之協定境界者其人所作如法不動應理諸比丘彼等若後為之協定境界者其人所作不如法非不動非應理諸比丘不得以一境界覆前一境界覆者墮惡作諸比丘許協定境界時留出兩界中間地帶以協定一境界一四一時諸比丘心生思念布薩有幾日耶彼等以此事白世尊世尊曰諸比丘有二布薩日十四日與十五日也諸比丘此二為布薩日二時諸比丘心生思念布薩羯磨有幾種耶彼等以此事白世尊世尊曰諸比丘有四布薩羯磨非法別衆布薩羯磨非法和合布薩羯磨如法別衆布薩羯磨如法和合布薩羯磨是也諸比丘此中別衆布薩羯磨乃非如法諸比丘不得施行如此布薩羯磨亦不許如此布薩羯磨三諸比丘此中非法和合布薩羯磨諸比丘不許如此諸比丘此中如法別衆布薩羯磨諸比丘不許如此諸比丘如此中如法和合布薩羯磨諸比丘應行如此布薩羯磨亦許如此布薩羯磨諸比丘故當思念我行此如法和合布薩羯磨諸比丘于是汝等應修學也一五一時諸比丘心生思念有幾種誦波羅提木叉耶彼等以此事白世尊世尊曰諸比丘有五種誦波羅提木叉誦序已餘應唱如常所聞此第一種誦波羅提木叉誦序誦四波羅夷已餘應唱如常所聞此第二種誦波羅提木叉誦序誦四波羅夷誦十三僧殘已餘應唱如常所聞此第三種誦波羅提木叉誦序誦四波羅夷誦十三僧殘誦二不定已餘應唱如常所聞此第四種誦波羅提木叉第五為廣說也諸比丘如此有五種誦波羅提木叉二爾時以世尊許略誦波羅提木叉諸比丘于一切時略誦波羅提木叉彼等以此事白世尊世尊曰諸比丘不得略誦波羅提木叉略誦者墮惡作三爾時于拘薩羅國一住處布薩日生蠻族怖畏諸比丘未得廣說而誦波羅提木叉彼等以此事白世尊世尊曰諸比丘若生危害許略誦波羅提木叉四爾時六群比丘未生危害而略誦波羅提木叉彼等以此事白世尊世尊曰諸比丘若不生危害不得略誦波羅提木叉略誦者墮惡作諸比丘若生危害許略誦波羅提木叉此中危害者王之危害賊之危害火之危害水之危害人之危害非人之危害猛獸之危害蛇之危害危害于命危害于梵行也諸比丘若有如此諸危害者許略誦波羅提木叉若無危害者應廣說五爾時六群比丘于僧伽中未受請而說法彼等以此事白世尊世尊曰諸比丘于僧伽中未受請者不得說法說者墮惡作諸比丘許長老比丘自行說法或求于他人為彼說法六爾時六群比丘于僧伽中未選而問律彼等以此事白世尊世尊曰諸比丘于僧伽中未選不得問律問者墮惡作諸比丘于僧伽中許當選者問律諸比丘選應如此行選自己或選他人七如何選自己耶聰明賢能比丘應告僧伽言諸大德請聽我言若僧伽機熟者我當問某甲律如此選自己如何選他人耶聰明賢能比丘應告僧伽言諸大德請聽我言若僧伽機熟者應使某甲問律于某甲應如此選他人八爾時善行諸比丘當選于僧伽中問律六群比丘生嫌恨生忿怒作惡事以脅之彼等以此事白世尊世尊曰諸比丘于僧伽中當選者亦應觀察會衆計其人數後許以問律九爾時六群比丘于僧伽中未選而答律彼等以此事白世尊世尊曰諸比丘未選者不得答律諸比丘選應如此行選自己或選他人一如何選自己耶聰明賢能比丘應告僧伽言諸大德請聽我言若僧伽機熟者我當答某甲問律應如此選自己如何選他人耶聰明賢能比丘應告僧伽言諸大德請聽我言若僧伽機熟者應令某甲答某甲問律應如此選他人一一爾時諸善行比丘當選于僧伽中答律六群比丘生嫌恨生忿怒作惡事以脅之彼等以此事白世尊世尊曰諸比丘于僧伽中當選者亦應觀察會衆計其人數後許應答律一六一爾時六群比丘未得許可責罪比丘彼等以此事白世尊世尊曰諸比丘未得許可不應責罪比丘責者墮惡作諸比丘言具壽我欲向汝言與之許可以求許可之後方能責罪二爾時諸善行比丘求于六群比丘許可後責罪之六群比丘生嫌恨生忿怒作惡事以脅之彼等以此事白世尊世尊曰諸比丘即使得許可亦應計其人數之後方能責罪三爾時六群比丘思念諸善行比丘應先向我等求許可先向無事無因清淨無罪諸比丘求許可彼等以此事白世尊世尊曰諸比丘不可向無事無因清淨無罪諸比丘求許可求者墮惡作諸比丘許于計其人數之後方求許可四爾時六群比丘于僧伽中行非法羯磨彼等以此事白世尊世尊曰諸比丘于僧伽中不得行非法羯磨行者墮惡作彼等仍行非法羯磨彼等以此事白世尊世尊曰諸比丘許于行非法羯磨時可非議五爾時六群比丘行非法羯磨諸善行比丘非議之六群比丘生嫌恨生忿怒作惡事以脅之彼等以此事白世尊世尊曰諸比丘亦許說其所見于彼六群比丘現前言說所見六群比丘生嫌恨生忿怒作惡事以脅之彼等以此事白世尊世尊曰諸比丘許攝持若四五人非議若二三人說所見若一人我未聽此六爾時六群比丘于僧伽中誦波羅提木叉時故意不聞彼等以此事白世尊世尊曰諸比丘誦波羅提木叉時不得故意不聞不聞者墮惡作七爾時具壽優陀夷為僧伽誦波羅提木叉有烏之聲音時具壽優陀夷心生思念世尊規定誦波羅提木叉者應令能聽聞我有烏之聲音我應如何為之耶彼等以此事白世尊世尊曰諸比丘許誦波羅提木叉者應盡力聽聞盡力者無罪八爾時提婆達多于有在家會衆誦波羅提木叉彼等以此事白世尊世尊曰諸比丘于有在家會衆不得誦波羅提木叉誦者墮惡作九時六群比丘于僧伽中未受請誦波羅提木叉彼等以此事白世尊世尊曰諸比丘于僧伽中未受請不得誦波羅提木叉誦者墮惡作諸比丘許波羅提木叉依長老外道誦品終一七一時世尊于隨意間住王舍城已向周多那瓦睹遊行次第遊行至周多那瓦睹爾時一住處住甚多比丘其中有一長老比丘愚癡暗昧彼既不知布薩布薩羯磨波羅提木叉亦不知誦波羅提木叉二時彼諸比丘心生思念世尊制定波羅提木叉依長老而我等此長老愚癡暗昧而不知布薩或誦波羅提木叉我等如何為之耶彼等以此事白世尊世尊曰諸比丘許波羅提木叉可請求其中聰明賢能之比丘三爾時布薩日于一住處住多比丘愚癡無能彼等無論布薩布薩羯磨波羅提木叉誦波羅提木叉皆不知也彼等乞長老曰長老請誦波羅提木叉彼言非我所能乞第二長老曰長老請誦波羅提木叉彼亦言非我所能乞第三長老曰長老請誦波羅提木叉彼亦言非我所能以如此方便乃至乞諸僧伽新參曰具壽請誦波羅提木叉彼亦言非我所能彼等以此事白世尊世尊曰四諸比丘布薩日于此間一住處住多比丘愚癡暗昧彼等于布薩誦波羅提木叉盡皆不知彼等乞長老曰長老請誦波羅提木叉彼言非我所能乞第二長老曰長老請誦波羅提木叉彼亦言非我所能五乞第三長老曰長老請誦波羅提木叉彼亦言非我所能以如此方便乃至乞諸僧伽新參曰具壽請誦波羅提木叉彼亦言非我所能諸比丘彼諸比丘應急遣一比丘詣四方住處曰具壽往略或廣修學波羅提木叉來六時諸比丘心生思念應遣何人耶彼等以此事白世尊世尊曰諸比丘許長老比丘可命新參比丘長老所命新參比丘等亦不往彼等以此事白世尊世尊曰諸比丘長老命令時非病者不得不往不往者墮惡作一八一時世尊于周多那瓦睹隨意間住已再還王舍城爾時諸比丘往乞食時衆人問今是半月之何日耶諸比丘言我等不知衆人輕蔑責難此沙門釋子尚不知算半月如何知他善事耶彼等以此事白世尊世尊曰諸比丘許學算半月二時諸比丘心生思念何人應學算半月耶彼等以此事白世尊世尊曰諸比丘許皆學算半月三爾時諸比丘往乞食衆人問比丘有多少耶諸比丘言我等不知衆人忿怒非難此諸沙門釋子自己等互不相知如何知他善事耶彼等以此事白世尊世尊曰諸比丘許算比丘四時諸比丘心生思念應于何時算比丘耶彼等以此事白世尊世尊曰諸比丘許可于布薩日聚群或取籌以算一九一爾時諸比丘不知今日乃布薩日而往遠方村里乞食彼等或于正誦波羅提木叉時或誦畢時返彼等以此事白世尊世尊曰諸比丘許汝等告以今日布薩時諸比丘心生思念應以何人告之彼等以此事白世尊世尊曰諸比丘許汝等應以長老比丘于當時告爾時一長老于當時忘其憶念彼等以此事白世尊世尊曰諸比丘可于食時告彼于食時亦忘其憶念彼等以此事白世尊世尊曰諸比丘許汝等于彼長老能憶念時宣告二一爾時一住處布薩堂為塵所污諸客比丘忿怒非難如何諸比丘不淨掃布薩堂耶彼等以此事白世尊世尊曰諸比丘許汝等淨掃布薩堂二時諸比丘心生思念應以何人淨掃布薩堂耶彼等以此事白世尊世尊曰諸比丘許汝等由長老比丘命新參比丘長老命已新參比丘亦不淨掃彼等以此事白世尊世尊曰諸比丘長老命已非病者不得不淨掃不淨掃者墮惡作三爾時布薩堂未設座比丘等坐地上肢體及衣為灰塵所污彼等以此事白世尊世尊曰諸比丘許汝等于布薩堂設座時諸比丘心生思念應以何人于布薩堂設座耶彼等以此事白世尊世尊曰諸比丘許汝等由長老比丘命新參比丘長老比丘命已新參比丘亦不設座彼等以此事白世尊世尊曰諸比丘長老命時非病者不得不設座不設者墮惡作四爾時布薩堂無明燈諸比丘于暗中身衣被踏彼等以此事白世尊世尊曰諸比丘許汝于布薩堂設明燈時諸比丘心生思念應以何人于布薩堂設明燈耶彼等以此事白世尊世尊曰諸比丘許汝等由長老比丘命新參比丘長老命已新參比丘亦不設明燈彼等以此事白世尊世尊曰諸比丘長老命時非病者不得不設明燈不設明燈者墮惡作五爾時于一住處其住處之諸比丘不備飲水不備食物客比丘等忿怒非難如何此住處不備飲水不備食物耶彼等以此事白世尊世尊曰諸