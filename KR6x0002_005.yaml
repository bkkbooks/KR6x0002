集會比丘衆問彼惡比丘比丘汝令行殺生真實否世尊真實也愚人如何汝令行殺生耶愚人我豈非以無數方便呵責殺生讚歎不殺生耶愚人如此即令未信者不信呵責說法告諸比丘曰諸比丘不得令行殺生令行者應如法治之諸比丘不得用牛皮用者墮惡作諸比丘不得用任何獸皮用者墮惡作一一一爾時衆人以獸皮覆蓋以獸皮包卷牀與小牀比丘等疑惑不敢坐彼等以此事白世尊世尊曰諸比丘在家人所作者許坐但不得臥爾時精舍以皮結紐諸比丘疑慮不敢坐彼等以此事白世尊世尊曰諸比丘若唯皮紐者許坐一二一爾時六群比丘著履入村邑衆人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得著履入村邑入者墮惡作爾時有一比丘生病彼不著履不能入村邑彼等以此事白世尊世尊曰諸比丘許病比丘著履入村邑一三一爾時具壽摩訶迦旃延在阿槃提國拘留歡喜山曲中爾時優婆塞首樓那億耳為具壽摩訶迦旃延侍者時優婆塞首樓那億耳至具壽摩訶迦旃延住處至而敬禮具壽摩訶迦旃延于一面坐坐于一面已優婆塞首樓那億耳言具壽摩訶迦旃延曰我知摩訶迦旃延所說之法住家不易行一向圓滿一向清淨純白梵行我欲由家出家剃除鬚髮著袈娑衣摩訶迦旃延令我出家二首樓那乃至命終行一臥一食梵行甚難也首樓那汝于是處作在家人但以時節修諸佛所教一臥一食梵行可耳時優婆塞首樓那億耳出家志願經止滅但優婆塞首樓那億耳二次優婆塞首樓那億耳乃至三次至具壽摩訶迦旃延住處摩訶迦旃延令我出家時具壽摩訶迦旃延令優婆塞首樓那億耳出家爾時阿槃提與南路比丘甚少時具壽摩訶迦旃延經三年艱難辛苦由諸處令一群十比丘集會授具壽首樓那具足戒三時具壽首樓那住雨安居已靜居宴默時心生思念我如是如是唯聞世尊而未至現前拜見若和尚允許我願往拜見彼世尊應供等正覺時具壽首樓那于傍晚時從宴默起至具壽摩訶迦旃延住處至而敬禮具壽摩訶迦旃延坐于一面于一面坐已具壽首樓那言具壽摩訶迦旃延曰四我于此處靜居宴默心生思念我如是如是唯聞世尊而未至現前拜見若和尚允許我願往拜見彼世尊應供等正覺故若和尚允許我願往拜見彼世尊應供等正覺首樓那善哉善哉首樓那汝往拜見彼世尊應供等正覺五首樓那汝應拜見世尊彼殊妙歡喜根寂靜意寂靜得最上調伏寂靜已調已護增益制御諸根之龍象首樓那汝以我名頭面禮世尊足言我和尚是具壽摩訶迦旃延頭面禮拜世尊足更言阿槃提與南路比丘甚少經三年艱難辛苦由諸處令一群十比丘集會得具足戒願世尊許于阿槃提與南路以少數衆授具足戒六于阿槃提與南路地面因黑牛蹄踐踏而堅硬願世尊許于阿槃提與南路著數重履于阿槃提與南路人人尊重沐浴以水淨之願世尊許于阿槃提與南路屢屢沐浴于阿槃提與南路以獸皮為敷具羊皮山羊皮鹿皮是也猶于中國伊羅具摩羅具摩奢如氈陀如此于阿槃提與南路亦以獸皮為敷具即羊皮山羊皮鹿皮是也故願世尊許于阿槃提與南路以獸皮為敷具即羊皮山羊皮鹿皮是也七今衆人施衣與已往境界外之諸比丘言此衣與某甲彼等還時言某甲與汝衣彼等以墮尼薩耆疑慮而不受願世尊說衣法唯唯具壽首樓那應諾具壽摩訶迦旃延已從座而起敬禮具壽摩訶迦旃延右繞而去收納臥具牀座攜持衣鉢向舍衛城而去八次第詣舍衛國祇樹給孤獨園世尊住處詣而敬禮世尊坐于一面時世尊告具壽阿難曰阿難為此客比丘設臥具牀座時具壽阿難心知世尊命我曰阿難為此客比丘設臥具牀座世尊欲與此比丘俱住一精舍世尊欲與具壽首樓那俱住一精舍乃于世尊所住精舍為具壽首樓那設臥具牀座九時世尊于露處過夜之多分後而入精舍具壽首樓那亦于露處過夜之多分後而入精舍時世尊夜分凌晨起身訪具壽首樓那曰比丘應誦法應辨法唯唯具壽首樓那應諾世尊唱誦全八部品時具壽首樓那唱誦已世尊甚為歡喜比丘善哉善哉比丘汝善受持八部品善作意善思惟汝音聲具足善美分明清亮而能述其義比丘汝幾臘耶世尊我一臘也一比丘汝如何如此遲緩耶我見諸欲過患已久但家事繁多多應作多事務也時世尊了知此義即于此時唱此頌曰見世間過患無著了知法聖者不欣惡清淨者樂教一一時具壽首樓那心知世尊悅我現在乃白我師所說時機從座而起偏袒上衣以頭面禮拜世尊足白世尊言我和尚具壽摩訶迦旃延言禮世尊足曰阿槃提與南路請說衣法時世尊依此因緣于此時機說法告諸比丘曰諸比丘于阿槃提與南路比丘甚少諸比丘許于如此邊地集持律五人衆以授具足戒一二此中邊地如此東方有名加將伽羅聚落其外有摩訶沙羅從此以外為邊地從此以內為中國東南有名薩拉瓦提河從此以外為邊地從此以內為中國南方有名世達康名尼加聚落從此以外為邊地從此以內為中國西方有名陀那之婆羅門村從此以外為邊地從此以內為中國北方有名宇尸羅達奢山從此以外為邊地從此以內為中國諸比丘許于如此邊地集持律五人衆以授具足戒一三諸比丘于阿槃提與南路地面為黑色牛蹄所踏而堅硬諸比丘許于一切邊地著數重履諸比丘于阿槃提與南路人人尊重沐浴以水淨之諸比丘許于一切邊地屢屢沐浴諸比丘于阿槃提與南路以獸皮為敷具謂羊皮山羊皮鹿皮是也諸比丘猶如于中國伊羅具摩羅具摩奢如氈陀如此于阿槃提與南路亦以獸皮為敷具謂羊皮山羊皮鹿皮是也諸比丘許于阿槃提與南路以獸皮為敷具謂羊皮山羊皮鹿皮是也諸比丘于此處衆人施衣與已往境界外比丘言此衣與某甲諸比丘許受納尚未入手期間不入日數也此犍度有六十三事攝頌曰摩竭國之王以及首樓那及八萬之主具壽娑竭陀于耆闍崛山多示上人法出家及精勤足傷琴一重青黃赤茜黑紅藍落葉色禁緣覆踵履覆腳覆上腳以及滿綿履沙雞翼乃至羊角作尖履山羊角尖履蝎尾孔雀履彩色獅子皮虎皮豹皮履羚羊皮獺皮貓栗鼠皮履及梟皮飾履足傷履胼胝足不洗樹株喧騷多羅竹草乃至們叉波羅漢陀羅迦摩羅褐金銀摩尼琉璃水晶鍮鍮石錫鉛銅牡牛乘車與病者牡牛牽車輿臥牀大獸皮牛皮惡比丘在家人所作獸皮紐著履入村邑病者摩訶迦旃延以及首樓那讀誦八部品五人具足戒乃至數重履屢屢之沐浴許獸皮敷具不入于日數以上五許乃導師與首樓那長老者
