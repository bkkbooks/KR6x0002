body:
  text: 第五皮革犍度一一爾時世尊在王舍城耆闍崛山爾時摩竭國洗尼瓶沙王乃八萬村邑主之王其時于瞻波城名首樓那二十億長者子生來手腳柔軟于足下生毛時摩竭國洗尼瓶沙王令集會彼八萬村邑首長時有一事而遣使至首樓那二十億處曰首樓那令來我欲首樓那來二時首樓那二十億父母言首樓那二十億曰首樓那王欲見汝足首樓那勿伸足于王在方向于王之前應結跏趺坐坐時王可見汝足時彼等令首樓那二十億乘轎而伴隨之時首樓那二十億到摩竭國洗尼瓶沙王處到而敬禮摩竭國洗尼瓶沙王于王之前結跏趺坐摩竭國洗尼瓶沙王見首樓那二十億足下生毛三時摩竭國洗尼瓶沙王對彼八萬村邑首長于現法義教誡後勸導而言我對汝等行現法義教誡矣汝等往恭敬禮拜世尊彼世尊將以來世義行教誡時彼八萬村邑首長往耆闍崛山四爾時具壽娑竭陀為世尊侍者時彼八萬村邑首長到具壽娑竭陀處到而言具壽娑竭陀曰此等八萬村邑首長為見世尊來到此處我等心願得見世尊來諸具壽汝等于此處待須臾我往白世尊五時具壽娑竭陀于彼八萬村邑首長眼前沒于踏石之處現于世尊前白世尊言此等八萬村邑首長為見世尊來到此處世尊知是時否娑竭陀然即設座于精舍之後六唯唯具壽娑竭陀應諾世尊乃持小牀沒于世尊之前現于彼八萬村邑首長眼前踏石處設座于精舍之後時世尊從精舍出坐于精舍後所設座上七時彼八萬村邑首長詣世尊住處詣而敬禮世尊坐于一面時彼八萬村邑首長唯尊崇具壽娑竭陀而不如此尊崇世尊時世尊心知彼八萬村邑首長心所思量而告具壽娑竭陀曰娑竭陀顯種種上人法神通神變唯唯具壽娑竭陀應諾世尊騰于空中于虛空或經行或止或坐或臥或出烟出焰或隱沒八時具壽娑竭陀于虛空顯示種種上人法神通神變後以頭面禮世尊足白世尊言世尊是我師我是聲聞世尊是我師我是聲聞時彼八萬村邑首長心生思念希有哉未曾有哉聲聞尚且有如此大神通大威力何況師耶彼等唯尊崇世尊不如此尊崇具壽娑竭陀九時世尊心知彼八萬村邑首長心所思量次第說教謂施論戒論生天論諸欲過患邪害出離雜染功德世尊知彼等生堪任心柔軟心離障心歡喜心明淨心說諸佛本真教法謂苦集滅道譬如清淨無緇斑衣正受染色如此彼八萬村邑首長亦于其座遠塵離垢得法眼謂凡有集法者皆有此滅法一彼等已見法得法知法入于法超越疑惑棄除猶豫得無畏以行師教不依他緣白世尊言妙哉妙哉譬如扶起倒者如揭露覆者為迷者說道于暗中揭舉燈明有眼者見色如此世尊亦以種種方便說法我等歸依世尊與法及比丘衆世尊容我等從今日起至命終止歸依為優婆塞一一時首樓那二十億心生思念我知世尊所說之法在家而行一向圓滿一向清淨純白之梵行不易也我當由家而出出家剃除鬚髮著袈娑衣時彼八萬村邑首長歡喜隨喜世尊所說從座而起敬禮世尊右繞而去一二時首樓那二十億于彼八萬村邑首長離去未久詣世尊住處詣而敬禮世尊坐于一面于一面坐首樓那二十億白世尊言知世尊所說之法行梵行不易也我欲由家而出出家剃除鬚髮著袈娑衣世尊許我出家首樓那二十億得于世尊之處出家得具足戒受具足戒未久具壽首樓那住于尸陀林一三彼精進勉力過甚經行而足傷血塗經行處猶如屠牛場時具壽首樓那靜居宴默心生思念世尊有聲聞力行精進而住者我乃其中一人而我未離執著無出諸漏心解脫我家有財寶我可娛樂財寶而享福我當還俗娛樂財寶而得享福一四時世尊心知具壽首樓那心所思惟譬如力士伸其屈腕屈其伸腕彼亦如此迅沒于耆闍崛山現于尸陀林時世尊與衆多諸比丘俱巡回臥處座處到具壽首樓那經行處世尊見具壽首樓那經行處塗血見而告諸比丘曰諸比丘此誰之經行處耶塗血猶如屠牛場具壽首樓那精進過于勤勉經行而足傷故彼經行處塗血猶如屠牛場一五時世尊到具壽首樓那精舍到而坐于所設座上具壽首樓那敬禮世尊坐于一面時世尊向一面坐之具壽首樓那曰首樓那汝靜居宴默時心生思念為世尊聲聞可以作福然首樓那汝于意如何汝在家時善調琴絃否然首樓那汝于意如何若汝調琴絃過急者汝之琴聲其時善堪任否否一六首樓那汝于意如何若汝琴絃過于緩者汝之琴聲其時善堪任否否首樓那汝于意如何若汝之琴絃不過急不過緩平均之時汝之琴聲其時善堪任否堪首樓那如此精進過于勤勉者即至掉舉精進過少者即至懈怠一七首樓那故汝精進攝持平等諸根平等通達請于是處取相唯唯具壽首樓那應諾世尊時世尊以此教誡具壽首樓那教誡之後譬如力士伸其屈腕屈其伸腕亦復如此迅沒于尸陀林具壽首樓那之前而現于耆闍崛山一八時具壽首樓那自後于精進攝持平等諸根平等通達于是處取相時彼具壽首樓那獨住遠離不放逸力行而心住精進不久彼于現法究竟無上梵行自證知現證具足而住證知此生已盡梵行已立所作已辦不受後有具壽首樓那成為阿羅漢之一此諸善男子正行自家出家之本懷也一九時具壽首樓那得阿羅漢如此心生思念我當于世尊處作自記別時具壽首樓那詣世尊住處詣已敬禮世尊坐于一面于一面坐具壽首樓那白世尊言二比丘若成阿羅漢諸漏已盡梵行已立所作已辦捨棄重擔逮得己利斷除有結正知解脫者即信解六處謂信解出離信解寂靜信解不瞋恚信解取蘊盡信解渴愛盡信解無癡二一或有具壽心生思念此具壽依唯信而信解出離不應作如是觀漏盡比丘梵行已立所作已辦凡己所作已作聚集盡皆不見依滅盡以離貪故信解出離依滅盡以離瞋故信解出離依滅盡以離癡故信解出離二二或有具壽心生思念此具壽欲以利養恭敬名聞而信解寂靜不應作如是觀依滅盡以離貪故信解寂靜依滅盡以離瞋故信解寂靜依滅盡以離癡故信解寂靜二三世尊或有具壽心生思念此具壽實為戒禁取歸此而信解不瞋恚不應作如是觀依滅盡以離貪故信解不瞋恚依滅盡以離瞋故信解不瞋恚依滅盡以離癡故信解不瞋恚二四依滅盡離貪故信解取蘊盡依滅盡離瞋故信解取蘊盡依滅盡離癡故信解取蘊盡依滅盡離貪故信解渴愛盡依滅盡離瞋故信解渴愛盡依滅盡離癡故信解渴愛盡依滅盡離貪故信解無癡依滅盡離瞋故信解無癡依滅盡離癡故信解無癡二五如此正心解脫比丘若衆多眼所識色顯現于眼其心亦不攝取其心不雜而得安住不動以觀滅盡若衆多耳所識聲鼻所識香舌所識味身所識觸意所識法顯現于耳乃至于意其心亦不攝取其心不雜而得安住不動以觀滅盡二六譬如石山不穿無孔成為一團若從東方大風雨來亦不震不動不搖從西方乃至北方乃至南方不搖如此于正心解脫比丘若衆多眼所識色意所識法現于眼乃至于意其心亦不動以觀滅盡二七信解心出離乃至心寂靜信解不瞋恚取蘊之滅盡信解心無癡渴愛之滅盡雖見處生起但心正解脫已得正解脫心寂靜比丘無已作聚集亦無有所作譬如一石山不為風所動聲香味與觸如此一切色不搖如是人可愛非可愛以觀其滅盡心安立解脫二八時世尊告諸比丘曰諸比丘善男子如此作自記別說義而不顯自我于此但有一類愚人嬉戲作自記別彼等日後將受損壞二九時世尊告具壽首樓那曰首樓那汝乃柔軟首樓那許汝一重履我捨棄八十車量金錠與七象扈從由家出家有言我者首樓那二十億捨棄八十車量金錠與七象扈從由家出家彼今竟貪一重履三若世尊許比丘衆則我亦用若世尊不許比丘衆我亦不用時世尊依此因緣而說法告諸比丘曰諸比丘許一重履諸比丘不得著二重履不得著三重履不得著數重履著者墮惡作二一爾時六群比丘著全青履乃至著全黃履著全赤履著全茜履著全黑履著全紅藍色履著全落葉色履衆人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得著全青履不得著全黃履不得著全落葉色履著者墮惡作二爾時六群比丘著青緣履著黃緣履著赤緣履著茜緣履著黑緣履著紅藍緣履著落葉色緣履衆人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得著青緣履不得著落葉色緣履著者墮惡作三爾時六群比丘著覆踵履著覆腳履著覆上腳履著全滿綿履著沙若雞翼履著羊角作履著山羊角作尖履著蝎尾飾履著孔雀羽飾履著彩色履衆人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得著覆踵履不得著彩色履著者墮惡作四爾時六群比丘著獅子皮飾履著虎皮飾履著豹皮飾履著羚羊皮飾履著獺皮飾履著貓皮飾履著栗鼠皮飾履著梟皮飾履衆人忿怒非難猶如享諸欲樂諸在家人彼等以此事白世尊世尊曰諸比丘不得著獅子皮飾履不得著梟皮飾履著者墮惡作三一時世尊于早晨時著下裳持衣鉢為乞食入王舍城與為隨從沙門一比丘俱時彼比丘跛行隨世尊後時有一優婆塞著數重履見世尊從遠處來見之脫履詣世尊處詣已敬禮世尊後至彼比丘處至而敬禮彼比丘言二如何尊者跛足耶我足受傷請著履止世尊禁著數重履世尊曰比丘且受其履時世尊依此因緣說法告諸比丘曰諸比丘許被棄之數重履諸比丘不得著新作數重履著者墮惡作四一爾時世尊于露地不著履經行諸長老比丘知師不著履經行故亦不著履經行師不著履經行長老比丘亦不著履經行而六群比丘著履經行少欲諸比丘忿怒非難師不著履經行長老比丘亦不著履經行為何六群比丘著履經行耶二時彼諸比丘以此事白世尊世尊曰諸比丘師經行六群比丘著履經行真實耶世尊真實也佛世尊呵責諸比丘師經行如何彼諸愚人著履經行耶諸比丘彼白衣在家人為工巧活命故尚且尊重恭敬和順而住三諸比丘若汝等如此于所善說法律出家于阿闍梨阿闍梨等人和尚和尚等人如不尊重恭敬和順而住此未可也諸比丘如此者使未信者不信乃至呵責說法告諸比丘曰諸比丘阿闍梨阿闍梨等人和尚和尚等人不著履經行時不得著履經行著經行者墮惡作諸比丘于園內不得著履著者墮惡作五一爾時有一比丘患足胼胝病餘諸比丘挽扶此比丘往大小便世尊巡回臥處座處時見彼諸比丘挽扶此比丘往大小便見而至彼諸比丘住處至而言彼諸比丘曰二諸比丘此比丘患何病耶此具壽患足胼胝我等挽扶彼往大小便時世尊依此因緣說法告諸比丘曰諸比丘足痛足傷或患足胼胝病者許著履六一爾時諸比丘不洗足而上牀上小牀污衣與臥具牀座彼等以此事白世尊世尊曰諸比丘當汝思念我將上牀或小牀時即許著履二爾時諸比丘夜分往布薩堂集會場于暗中足踏樹株荊棘而痛彼等以此事白世尊世尊曰諸比丘于園內許著履持炬火燈明與杖三爾時六群比丘夜分凌晨起身穿木履于露地經行出高聲大聲喧騷聲說種種野論謂王論盜賊論大臣論軍論怖畏論戰爭論食論飲論衣服論臥具論華鬘論香論親族論車乘論村里論聚落論都城論地方論女人論勇士論街路論池邊論亡靈論異論世間談海談有無如是談論如此彼等踏殺蟲類且亂諸比丘禪定四少欲諸比丘忿怒非難如何六群比丘夜分凌晨起身穿木履于露地經行出高聲踏殺蟲類且亂諸比丘禪定耶時諸比丘以此事白世尊世尊曰諸比丘六